*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#b8952a;--glt:#e8d48a;--gpal:#fdf8ec;--bdr:#d4b87a;--parch:#f4efe0;--shd:rgba(80,50,5,.15)}
body{background:var(--parch);font-family:Amiri,serif;min-height:100vh;direction:rtl}
header{background:linear-gradient(135deg,#1a1208,#2d1f0a);padding:12px 16px;text-align:center;border-bottom:2px solid var(--gold)}
.ht{font-size:1.2rem;color:var(--glt)}
.hs{color:#c9a84c;font-size:.72rem;margin-top:3px}
.page-wrap{max-width:460px;margin:0 auto;padding:12px 8px 150px}
.mushaf{background:#faf6ec;border:1px solid #d4c9a8;border-radius:4px;padding:20px 16px 16px;box-shadow:0 2px 18px var(--shd);direction:rtl}
.line{
  display:block;
  width:100%;
  white-space:nowrap;
  direction:rtl;
  margin-bottom:10px;
  line-height:1.9;
  font-family:QCF_P562;
  font-size:28px;
  color:#0d0d0d;
  overflow:hidden;
}
.surah-banner{margin:0 0 14px;direction:rtl}
.line-basmala{
  font-family:Amiri,serif;font-size:1.3rem;
  text-align:center;text-align-last:center;
  padding:4px 0 14px;color:#0d0d0d;
  background:#faf6ec;
}
.qw{display:inline-block;cursor:pointer;border-radius:2px;transition:background .12s;padding:0 1px;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.qw:hover{background:rgba(184,149,42,.22)}
.qw.marked{
  box-shadow: 0 3px 0 0 var(--gold);
}
.vnum.marked{
  box-shadow: 0 0 0 2px var(--gold);
  border-radius:50%;
}
.qw.sel-w{background:rgba(184,149,42,.55);border-radius:3px;box-shadow:0 0 0 1px rgba(184,149,42,.8)}
.qw.sel-v{background:#ffe066;border-radius:2px;color:#0d0d0d}
.vnum.sel-v{background:transparent}
.vnum{
  display:inline;font-family:QCF_P562;
  color:var(--gold);cursor:pointer;
  transition:background .12s;border-radius:2px;
}
.vnum:hover{background:rgba(184,149,42,.2)}
.vnum.sel-v{background:rgba(184,149,42,.3)}
.panel{display:none}
.panel.open{display:none}
.pbar{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;background:linear-gradient(90deg,var(--gpal),#fff8e8);border-bottom:1px solid var(--bdr);cursor:pointer;flex-shrink:0}
.ptit{font-size:1rem;color:#0d0d0d;font-family:Amiri,serif;direction:rtl}
.pcl{background:none;border:none;font-size:1.3rem;color:var(--gold);cursor:pointer;padding:2px 6px}
.tabs{display:flex;border-bottom:1px solid var(--bdr);background:var(--gpal);flex-shrink:0}
.tab{flex:1;padding:9px;background:none;border:none;font-family:Amiri,serif;font-size:.9rem;color:#7a6030;cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:#0d0d0d;font-weight:bold;border-bottom-color:var(--gold);background:white}
.pbody{overflow-y:auto;flex:1;padding:14px 18px;direction:rtl}
.sb{margin-bottom:18px}
.sl{font-size:.9rem;font-weight:bold;color:var(--gold);border-right:3px solid var(--gold);padding-right:8px;margin-bottom:6px}
.st{font-size:.92rem;line-height:2.1;color:#2a1f08}
.wroot{color:#888;font-size:.82rem;margin-bottom:6px}
.wmean{font-size:1rem;line-height:2;color:#0d0d0d;font-weight:bold}
.vg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.vc{border:1px solid var(--bdr);border-radius:8px;overflow:hidden;cursor:pointer;background:white}
.vth{background:linear-gradient(135deg,#1a1208,#3d2a10);height:64px;display:flex;align-items:center;justify-content:center}
.vpl{width:32px;height:32px;background:rgba(184,149,42,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:.85rem}
.vi{padding:7px 9px}
.vsc{font-weight:bold;font-size:.82rem;color:#0d0d0d;font-family:Amiri,serif}
@media(max-width:380px){.vg{grid-template-columns:1fr}}

/* BUBBLE */
.bubble{
  position:fixed;
  background:white;
  border:2px solid var(--gold);
  border-radius:12px;
  box-shadow:0 4px 24px rgba(0,0,0,.18);
  padding:12px 14px;
  max-width:85vw;
  width:auto;
  z-index:200;
  direction:rtl;
  display:none;
  animation:popIn .18s ease;
  cursor:grab;
  touch-action:none;
}
.bubble:active{cursor:grabbing}
.bubble-drag-handle{
  width:50px;height:6px;
  background:#b8952a;border-radius:3px;
  margin:0 auto 10px;cursor:grab;
  touch-action:none;
  -webkit-user-select:none;
  user-select:none;
}
.bubble.show{display:block}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.bubble-arrow{
  position:absolute;
  bottom:-10px;
  left:50%;
  transform:translateX(-50%);
  width:0;height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-top:10px solid var(--gold);
}
.bubble-arrow-inner{
  position:absolute;
  bottom:-8px;
  left:50%;
  transform:translateX(-50%);
  width:0;height:0;
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-top:8px solid white;
}

.bubble-title{display:none}
.bubble-body{
  font-family:Amiri,serif;font-size:.88rem;
  line-height:1.9;color:#2a1f08;
  max-height:38vh;overflow-y:auto;
}
.bubble-tabs{
  display:flex;border-bottom:1px solid var(--bdr);
  margin-bottom:8px;
}
.bubble-tab{
  flex:1;padding:5px;background:none;border:none;
  font-family:Amiri,serif;font-size:.82rem;
  color:#7a6030;cursor:pointer;
  border-bottom:2px solid transparent;
}
.bubble-tab.on{color:#0d0d0d;font-weight:bold;border-bottom-color:var(--gold)}
.bubble-tab{font-size:.72rem;padding:6px 4px}
.vtab{flex:1;padding:8px 4px;border:none;border-bottom:3px solid transparent;font-family:Amiri,serif;font-size:.82rem;cursor:pointer;background:white;color:#7a6030}
.vtab:first-child{border-bottom:3px solid #b8952a;font-weight:bold;color:#0d0d0d}
.bsl{font-size:.85rem;font-weight:bold;color:var(--gold);
  border-right:3px solid var(--gold);padding-right:7px;margin-bottom:4px}
.bst{font-size:1rem;line-height:2.1;color:#0d0d0d;font-weight:bold;margin-bottom:12px}
.bvg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bvc{border:1px solid var(--bdr);border-radius:8px;overflow:hidden;cursor:pointer;background:white}
.bvth{background:linear-gradient(135deg,#1a1208,#3d2a10);height:50px;display:flex;align-items:center;justify-content:center}
.bvpl{width:26px;height:26px;background:rgba(184,149,42,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:.75rem}
.bvi{padding:5px 7px}
.bvsc{font-weight:bold;font-size:.75rem;color:#0d0d0d;font-family:Amiri,serif}
</style>

var D={"tafsir":{"67:1":{"tafsir":[{"scholar":"التفسير المختصر","text":"تعاظم وكثر خير الله الذي بيده وحده الملك، وهو على كل شيء قدير، لا يعجزه شيء."},{"scholar":"تفسير الجلالين","text":"«تبارك» تنزه عن صفات المحدثين «الذي بيده» في تصرفه «الملك» السلطان والقدرة «وهو على كل شيءٍ قدير»."},{"scholar":"تفسير السعدي","text":"تَبَارَكَ الَّذِي بِيَدِهِ الْمُلْكُ أي: تعاظم وتعالى، وكثر خيره، وعم إحسانه، من عظمته أن بيده ملك العالم العلوي والسفلي، فهو الذي خلقه، ويتصرف فيه بما شاء، من الأحكام القدرية، والأحكام الدينية، التابعة لحكمته، ومن عظمته، كمال قدرته التي يقدر بها على كل شيء، وبها أوجد ما أوجد من المخلوقات العظيمة، كالسماوات والأرض."}],"videos":[{"scholar":"الشيخ النابلسي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D9%86%D8%A7%D8%A8%D9%84%D8%B3%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+1"},{"scholar":"الشيخ الشعراوي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B4%D8%B9%D8%B1%D8%A7%D9%88%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+1"},{"scholar":"الشيخ عمر عبد الكافي","url":"https://www.youtube.com/results?search_query=%D8%B9%D9%85%D8%B1+%D8%B9%D8%A8%D8%AF+%D8%A7%D9%84%D9%83%D8%A7%D9%81%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83"},{"scholar":"د. طارق السويدان","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B3%D9%88%D9%8A%D8%AF%D8%A7%D9%86+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+1"}]},"67:2":{"tafsir":[{"scholar":"التفسير المختصر","text":"الذي خلق الموت وخلق الحياة ليختبركم - أيها الناس - أيكم أحسن عملًا، وهو العزيز الذي لا يغلبه أحد، الغفور لذنوب من تاب من عباده."},{"scholar":"تفسير الجلالين","text":"«الذي خلق الموت» في الدنيا «والحياة» في الآخرة أو هما في الدنيا فالنطفة تعرض لها الحياة وهي ما به الإحساس، والموت ضدها أو عدمها قولان، والخلق على الثاني بمعنى لتقدير «ليبلوكم» ليختبركم في الحياة «أيكم أحسن عملا» أطوع لله «وهو العزيز» في انتقامه ممن عصاه «الغفور» لمن تاب إليه."},{"scholar":"تفسير السعدي","text":"وخلق الموت والحياة أي: قدر لعباده أن يحييهم ثم يميتهم؛ لِيَبْلُوَكُمْ أَيُّكُمْ أَحْسَنُ عَمَلًا أي: أخلصه وأصوبه، فإن الله خلق عباده، وأخرجهم لهذه الدار، وأخبرهم أنهم سينقلون منها، وأمرهم ونهاهم، وابتلاهم بالشهوات المعارضة لأمره، فمن انقاد لأمر الله وأحسن العمل، أحسن الله له الجزاء في الدارين، ومن مال مع شهوات النفس، ونبذ أمر الله، فله شر الجزاء.\nوَهُوَ الْعَزِيزُ الذي له العزة كلها، التي قهر بها جميع الأشياء، وانقادت له المخلوقات.\nالْغَفُورُ عن المسيئين والمقصرين والمذنبين، خصوصًا إذا تابوا وأنابوا، فإنه يغفر ذنوبهم، ولو بلغت عنان السماء، ويستر عيوبهم، ولو كانت ملء الدنيا."}],"videos":[{"scholar":"الشيخ النابلسي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D9%86%D8%A7%D8%A8%D9%84%D8%B3%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+2"},{"scholar":"الشيخ الشعراوي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B4%D8%B9%D8%B1%D8%A7%D9%88%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+2"},{"scholar":"الشيخ عمر عبد الكافي","url":"https://www.youtube.com/results?search_query=%D8%B9%D9%85%D8%B1+%D8%B9%D8%A8%D8%AF+%D8%A7%D9%84%D9%83%D8%A7%D9%81%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83"},{"scholar":"د. طارق السويدان","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B3%D9%88%D9%8A%D8%AF%D8%A7%D9%86+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+2"}]},"67:3":{"tafsir":[{"scholar":"التفسير المختصر","text":"الذي خلق سبع سماوات، كل سماء طبقة فوق ما قبلها دون تماسّ بين سماء وسماء.\nلا تشاهد - أيها الرائي - فيما خلق الله أي تفاوت أو عدم تناسب.\nفارجع البصر هل ترى من تَشَقُّق أو تَصَدُّع؟! لن ترى ذلك، وإنما ترى خلقًا محكمًا متقنًا."},{"scholar":"تفسير الجلالين","text":"«الذي خلق سبع سماوات طباقا» بعضها فوق بعض من غير مماسة «ما ترى في خلق الرحمن» لهن أو لغيرهن «من تفاوت» تباين وعدم تناسب «فارجع البصر» أعده إلى السماء «هل ترى» فيها «من فطور» صدوع وشقوق."},{"scholar":"تفسير السعدي","text":"الَّذِي خَلَقَ سَبْعَ سَمَاوَاتٍ طِبَاقًا أي: كل واحدة فوق الأخرى، ولسن طبقة واحدة، وخلقها في غاية الحسن والإتقان مَا تَرَى فِي خَلْقِ الرَّحْمَنِ مِنْ تَفَاوُتٍ أي: خلل ونقص.\nوإذا انتفى النقص من كل وجه، صارت حسنة كاملة، متناسبة من كل وجه، في لونها وهيئتها وارتفاعها، وما فيها من الشمس والقمر والكواكب النيرات، الثوابت منهن والسيارات.\nولما كان كمالها معلومًا، أمر [الله] تعالى بتكرار النظر إليها والتأمل في أرجائها، قال: فَارْجِعِ الْبَصَرَ أي: أعده إليها، ناظرًا معتبرًا هَلْ تَرَى مِنْ فُطُورٍ أي: نقص واختلال."}],"videos":[{"scholar":"الشيخ النابلسي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D9%86%D8%A7%D8%A8%D9%84%D8%B3%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+3"},{"scholar":"الشيخ الشعراوي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B4%D8%B9%D8%B1%D8%A7%D9%88%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+3"},{"scholar":"الشيخ عمر عبد الكافي","url":"https://www.youtube.com/results?search_query=%D8%B9%D9%85%D8%B1+%D8%B9%D8%A8%D8%AF+%D8%A7%D9%84%D9%83%D8%A7%D9%81%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83"},{"scholar":"د. طارق السويدان","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B3%D9%88%D9%8A%D8%AF%D8%A7%D9%86+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+3"}]},"67:4":{"tafsir":[{"scholar":"التفسير المختصر","text":"ثم ارجع البصر مرّة بعد مرّة يرجع إليك بصرك ذليلًا دون أن يرى عيبًا أو خللًا في خلق السماء، وهو كَلِيل منقطع عن النظر."},{"scholar":"تفسير الجلالين","text":"«ثم ارجع البصر كرتين» كرة بعد كرة «ينقلب» يرجع «إليك البصر خاسئا» ذليلا لعدم إدراك خلل «وهو حسير» منقطع عن رؤية خلل."},{"scholar":"تفسير السعدي","text":"ثُمَّ ارْجِعِ الْبَصَرَ كَرَّتَيْنِ المراد بذلك: كثرة التكرار يَنْقَلِبْ إِلَيْكَ الْبَصَرُ خَاسِئًا وَهُوَ حَسِيرٌ أي: عاجزًا عن أن يرى رفة وعملًا.\nوالأدلة العقلية: المعرفة للهدى من الضلال، والحسن من القبيح، والخير من الشر، وهم -في الإيمان- بحسب ما من الله عليهم به من الاقتداء بالمعقول والمنقول، فسبحان من يختص بفضله من يشاء، ويمن على من يشاء من عباده، ويخذل من لا يصلح للخير."}],"videos":[{"scholar":"الشيخ النابلسي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D9%86%D8%A7%D8%A8%D9%84%D8%B3%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+10"},{"scholar":"الشيخ الشعراوي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B4%D8%B9%D8%B1%D8%A7%D9%88%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+10"},{"scholar":"الشيخ عمر عبد الكافي","url":"https://www.youtube.com/results?search_query=%D8%B9%D9%85%D8%B1+%D8%B9%D8%A8%D8%AF+%D8%A7%D9%84%D9%83%D8%A7%D9%81%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83"},{"scholar":"د. طارق السويدان","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B3%D9%88%D9%8A%D8%AF%D8%A7%D9%86+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+10"}]},"67:11":{"tafsir":[{"scholar":"التفسير المختصر","text":"فأقرّوا على أنفسهم بالكفر والتكذيب فاستحقوا النار، فبُعْدًا لأصحاب النار."},{"scholar":"تفسير الجلالين","text":"«فاعترفوا» حيث لا ينفع الأعتراف «بذنبهم» وهو تكذيب النذر «فسحقا» بسكون الحاء وضمها «لأصحاب السعير» فبعدا لهم عن رحمة الله."},{"scholar":"تفسير السعدي","text":"قال تعالى عن هؤلاء الداخلين للنار، المعترفين بظلمهم وعنادهم: فَاعْتَرَفُوا بِذَنْبِهِمْ فَسُحْقًا لِأَصْحَابِ السَّعِيرِ أي: بعدًا لهم وخسارة وشقاء.\nفما أشقاهم وأرداهم، حيث فاتهم ثواب الله، وكانوا ملازمين للسعير، التي تستعر في أبدانهم، وتطلع على أفئدتهم!"}],"videos":[{"scholar":"الشيخ النابلسي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D9%86%D8%A7%D8%A8%D9%84%D8%B3%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+11"},{"scholar":"الشيخ الشعراوي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B4%D8%B9%D8%B1%D8%A7%D9%88%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+11"},{"scholar":"الشيخ عمر عبد الكافي","url":"https://www.youtube.com/results?search_query=%D8%B9%D9%85%D8%B1+%D8%B9%D8%A8%D8%AF+%D8%A7%D9%84%D9%83%D8%A7%D9%81%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83"},{"scholar":"د. طارق السويدان","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B3%D9%88%D9%8A%D8%AF%D8%A7%D9%86+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+11"}]},"67:12":{"tafsir":[{"scholar":"التفسير المختصر","text":"إن الذين يخافون الله في خلواتهم، لهم مغفرة لذنوبهم، ولهم ثواب عظيم وهو الجنة."},{"scholar":"تفسير الجلالين","text":"«إن الذين يخشون ربهم» يخافونه «بالغيب» في غيبتهم عن أعين الناس فيطيعونه سرا فيكون علانية أولى «لهم مغفرة وأجر كبير» أي الجنة."},{"scholar":"تفسير السعدي","text":"لما ذكر حالة الأشقياء الفجار، ذكر حالة السعداء الأبرار فقال: إِنَّ الَّذِينَ يَخْشَوْنَ رَبَّهُمْ بِالْغَيْبِ أي: في جميع أحوالهم، حتى في الحالة التي لا يطلع عليهم فيها إلا الله، فلا يقدمون على معاصيه، ولا يقصرون فيما أمر به لَهُمْ مَغْفِرَةٌ لذنوبهم، وإذا غفر الله ذنوبهم؛ وقاهم شرها، ووقاهم عذاب الجحيم، ولهم أجر كبير وهو ما أعده لهم في الجنة، من النعيم المقيم، والملك الكبير، واللذات [المتواصلات]، والمشتهيات، والقصور [والمنازل] العاليات، والحور الحسان، والخدم والولدان.\nوأعظم من ذلك وأكبر، رضا الرحمن، الذي يحله الله على أهل الجنان."}],"videos":[{"scholar":"الشيخ النابلسي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D9%86%D8%A7%D8%A8%D9%84%D8%B3%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+12"},{"scholar":"الشيخ الشعراوي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B4%D8%B9%D8%B1%D8%A7%D9%88%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+12"},{"scholar":"الشيخ عمر عبد الكافي","url":"https:// مختصر","text":"ألا يعلم الذي خلق الخلائق كلها السرّ وما هو أخفى من السرّ؟! وهو اللطيف بعباده، الخبير بأمورهم، لا يخفى عليه منها شيء."},{"scholar":"تفسير الجلالين","text":"«ألا يعلم من خلق» ما تسرون أي، أينتفي علمه بذلك «وهو اللطيف» في علمه «الخبير» فيه."},{"scholar":"تفسير السعدي","text":"ثم قال -مستدلا بدليل عقلي على علمه-: أَلَا يَعْلَمُ مَنْ خَلَقَ فمن خلق الخلق وأتقنه وأحسنه، كيف لا يعلمه؟! وَهُوَ اللَّطِيفُ الْخَبِيرُ الذي لطف علمه وخبره، حتى أدرك السرائر والضمائر، والخبايا [والخفايا والغيوب]، وهو الذي يعلم السر وأخفى ومن معاني اللطيف، أنه الذي يلطف بعبده ووليه، فيسوق إليه البر والإحسان من حيث لا يشعر، ويعصمه من الشر، من حيث لا يحتسب، ويرقيه إلى أعلى المراتب، بأسباب لا تكون من [العبد] على بال، حتى إنه يذيقه المكاره، ليتوصل بها إلى المحاب الجليلة، والمقامات النبيلة."}],"videos":[{"scholar":"الشيخ النابلسي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D9%86%D8%A7%D8%A8%D9%84%D8%B3%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+14"},{"scholar":"الشيخ الشعراوي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B4%D8%B9%D8%B1%D8%A7%D9%88%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+14"},{"scholar":"الشيخ عمر عبد الكافي","url":"https://www.youtube.com/results?search_query=%D8%B9%D9%85%D8%B1+%D8%B9%D8%A8%D8%AF+%D8%A7%D9%84%D9%83%D8%A7%D9%81%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83"},{"scholar":"د. طارق السويدان","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B3%D9%88%D9%8A%D8%AF%D8%A7%D9%86+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+14"}]},"67:15":{"tafsir":[{"scholar":"التفسير المختصر","text":"هو الذي جعل لكم الأرض سهلة ليّنة للسكن عليها، فسيروا في جوانبها وأطرافها، وكلوا من رزقه الذي أعدّ لكم فيها، وإليه وحده بعثكم للحساب والجزاء."},{"scholar":"تفسير الجلالين","text":"«هو الذي جعل لكم الأرض ذلولا» سهلة للمشي فيها «فامشوا في مناكبها» جوانبها «وكلوا من رزقه» المخلوق لأجلكم «وإليه النشور» من القبور للجزاء."},{"scholar":"تفسير السعدي","text":"أي: هو الذي سخر لكم الأرض وذللها، لتدركوا منها كل ما تعلقت به حاجتكم، من غرس وبناء وحرث، وطرق يتوصل بها إلى الأقطار النائية والبلدان الشاسعة، فَامْشُوا فِي مَنَاكِبِهَا أي: لطلب الرزق والمكاسب.\nوَكُلُوا مِنْ رِزْقِهِ وَإِلَيْهِ النُّشُورُ أي: بعد أن تنتقلوا من هذه الدار التي جعلها الله امتحانًا، وبلغة يتبلغ بها إلى الدار الآخرة، تبعثون بعد موتكم، وتحشرون إلى الله، ليجازيكم بأعمالكم الحسنة والسيئة."}],"videos":[{"scholar":"الشيخ النابلسي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D9%86%D8%A7%D8%A8%D9%84%D8%B3%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+15"},{"scholar":"الشيخ الشعراوي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B4%D8%B9%D8%B1%D8%A7%D9%88%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+15"},{"scholar":"الشيخ عمر عبد الكافي","url":"https://www.youtube.com/results?search_query=%D8%B9%D9%85%D8%B1+%D8%B9%D8%A8%D8%AF+%D8%A7%D9%84%D9%83%D8%A7%D9%81%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83"},{"scholar":"د. طارق السويدان","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B3%D9%88%D9%8A%D8%AF%D8%A7%D9%86+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+15"}]},"67:16":{"tafsir":[{"scholar":"التفسير المختصر","text":"أأمنتم الله الذي في السماء أن يشق الأرض من تحتكم كما شقها من تحت قارون بعد أن كانت سهلة مذللة للسكن عليها، فإذا هي تضطرب بكم بعد استقرارها؟!"},{"scholar":"تفسير الجلالين","text":"«أأمنتم» بتحقيق الهمزتين وتسهيل الثانية وإدخال ألف بينهما وبين الأخرى وتركه وإبدالها ألفا «من في السماء» سلطانه وقدرته «أن يخسف» بدل من مَن «بكم الأرض فإذا هي تمور» تتحرك بكم وترتفع فوقكم."},{"scholar":"تفسير السعدي","text":"هذا تهديد ووعيد، لمن استمر في طغيانه وتعديه، وعصيانه الموجب للنكال وحلول العقوبة، فقال: أَأَمِنْتُمْ مَنْ فِي السَّمَاءِ وهو الله تعالى، العالي على خل ل وحال من اتبعه، وهي الحال التي تتعين للفلاح، وتتوقف عليها السعادة، وحالة أعدائه بضدها، فلا إيمان [لهم] ولا توكل، علم بذلك من هو على هدى، ومن هو في ضلال مبين."}],"videos":[{"scholar":"الشيخ النابلسي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D9%86%D8%A7%D8%A8%D9%84%D8%B3%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+29"},{"scholar":"الشيخ الشعراوي","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B4%D8%B9%D8%B1%D8%A7%D9%88%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+29"},{"scholar":"الشيخ عمر عبد الكافي","url":"https://www.youtube.com/results?search_query=%D8%B9%D9%85%D8%B1+%D8%B9%D8%A8%D8%AF+%D8%A7%D9%84%D9%83%D8%A7%D9%81%D9%8A+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83"},{"scholar":"د. طارق السويدان","url":"https://www.youtube.com/results?search_query=%D8%A7%D9%84%D8%B3%D9%88%D9%8A%D8%AF%D8%A7%D9%86+%D8%B3%D9%88%D8%B1%D8%A9+%D8%A7%D9%84%D9%85%D9%84%D9%83+%D8%A7%D9%84%D8%A2%D9%8A%D8%A9+29"}]},"67:30":{"tafsir":[{"scholar":"التفسير المختصر","text":"قل - أيها الرسول - لهؤلاء المشركين: أخبروني إن أصبح ماؤكم الذي تشربون منه غائرًا في الأرض لا تستطيعون الوصول إليه، من يأتيكم بماء كثيرٍ جارٍ؟! لا أحد غير الله."},{"scholar":"تفسير الجلالين","text":"(قل أرأيتم إن أصبح ماؤكم غورا) غائرا في الأرض (فمن يأتيكم بماء معين) جار تناله الأيدي والدلاء كمائكم، أي لا يأتي به إلا الله تعالى فكيف تنكرون أن يبعثكم؟ ويستحب أن يقول القارئ عقب \"\" معين \"\": الله رب العالمين، كما ورد في الحديث، وتليت هذه الآية عند بعض المتجبرين فقال: تأتي به الفؤوس والمعاول فذهب ماء عينه وعمي نعوذ بالله من الجراءة على الله وعلى آياته."},{"scholar":"تفسير السعدي","text":"ثم أخبر عن انفراده بالنعم، خصوصًا، بالماء الذي جعل الله منه كل شيء حي فقال: قُلْ أَرَأَيْتُمْ إِنْ أَصْبَحَ مَاؤُكُمْ غَوْرًا أي: غائرًا فَمَنْ يَأْتِيكُمْ بِمَاءٍ مَعِينٍ تشربون منه، وتسقون أنعامكم وأشجاركم وزروعكم؟ وهذا استفهام بمعنى النفي، أي: لا يقدر أحد على ذلك غير الله تعالى."}],"videos var JAL={"67:1":"تَبَارَكَ تعالى وتعاظم الَّذِي بِيَدِهِ الْمُلْكُ أي ملك الدنيا والآخرة وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ","67:2":"الَّذِي خَلَقَ الْمَوْتَ وَالْحَيَاةَ أي قدّرهما لِيَبْلُوَكُمْ ليختبركم أَيُّكُمْ أَحْسَنُ عَمَلاً وَهُوَ الْعَزِيزُ الْغَفُورُ لمن تاب","67:3":"الَّذِي خَلَقَ سَبْعَ سَمَاوَاتٍ طِبَاقًا بعضها فوق بعض مَّا تَرَى فِي خَلْقِ الرَّحْمَنِ مِن تَفَاوُتٍ اختلاف فَارْجِعِ الْبَصَرَ هَلْ تَرَى مِن فُطُورٍ شقوق","67:4":"ثُمَّ ارْجِعِ الْبَصَرَ كَرَّتَيْنِ مرة بعد مرة يَنقَلِبْ إِلَيْكَ الْبَصَرُ خَاسِئًا ذليلاً وَهُوَ حَسِيرٌ كليل منقطع","67:5":"وَلَقَدْ زَيَّنَّا السَّمَاءَ الدُّنْيَا بِمَصَابِيحَ كواكب وَجَعَلْنَاهَا رُجُومًا لِّلشَّيَاطِينِ وَأَعْتَدْنَا لَهُمْ عَذَابَ السَّعِيرِ النار","67:6":"وَلِلَّذِينَ كَفَرُوا بِرَبِّهِمْ عَذَابُ جَهَنَّمَ وَبِئْسَ الْمَصِيرُ أي المرجع","67:7":"إِذَا أُلْقُوا فِيهَا سَمِعُوا لَهَا شَهِيقًا صوتاً كصوت الحمار وَهِيَ تَفُورُ تغلي بهم","67:8":"تَكَادُ تَمَيَّزُ تتفرق مِنَ الْغَيْظِ كُلَّمَا أُلْقِيَ فِيهَا فَوْجٌ جماعة سَأَلَهُمْ خَزَنَتُهَا أَلَمْ يَأْتِكُمْ نَذِيرٌ رسول","67:9":"قَالُوا بَلَى قَدْ جَاءَنَا نَذِيرٌ فَكَذَّبْنَا وَقُلْنَا مَا نَزَّلَ اللَّهُ مِن شَيْءٍ إِنْ أَنتُمْ إِلَّا فِي ضَلَالٍ كَبِيرٍ","67:10":"وَقَالُوا لَوْ كُنَّا نَسْمَعُ سماع قبول أَوْ نَعْقِلُ نتدبر مَا كُنَّا فِي أَصْحَابِ السَّعِيرِ","67:11":"فَاعْتَرَفُوا بِذَنبِهِمْ بالكفر فَسُحْقًا بُعداً لِّأَصْحَابِ السَّعِيرِ","67:12":"إِنَّ الَّذِينَ يَخْشَوْنَ رَبَّهُم بِالْغَيْبِ يخافونه ولم يروه لَهُم مَّغْفِرَةٌ وَأَجْرٌ كَبِيرٌ"};
var TABARI={"67:1":"القول في تأويل قوله تعالى: ﴿تَبَارَكَ الَّذِي بِيَدِهِ الْمُلْكُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ (١) الَّذِي خَلَقَ الْمَوْتَ وَالْحَيَاةَ لِيَبْلُوَكُمْ أَيُّكُمْ أَحْسَنُ عَمَلا وَهُوَ الْعَزِيزُ الْغَفُورُ (٢) ﴾ يعني بقوله تعالى ذكره: ﴿تَبَارَكَ﴾ : تعاظم وتعالى ﴿الَّذِي بِيَدِهِ الْمُلْكُ﴾ بيده ملك الدنيا والآخرة وسُلطانهما نافذ فيهما أمره وقضاؤه ﴿وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ﴾ يقول: وهو على ما يشاء فعله ذو قدرة لا يمنعه من فعله مانع، ولا يحول بينه وبينه عجز. * * وقوله: ﴿الَّذِي خَلَقَ الْمَوْتَ وَالْحَيَاةَ﴾ فأمات من شاء وما شاء، وأحيا من أراد وما أراد إلى أجل معلوم ﴿لِيَبْلُوَكُمْ أَيُّكُمْ أَحْسَنُ عَمَلا﴾ يقول: ليختبركم فينظر أيكم له أيها الناس أطوع، وإلى طلب رضاه أسرع. ⁕ وقد حدثني ابن عبد الأعلى، قال: ثنا ابن ثور، عن معمر، عن قتادة، في قوله: ﴿الَّذِي خَلَقَ الْمَوْتَ وَالْحَيَاةَ﴾ قال: أذل الله ابن آدم بالموت، وجعل الدنيا دار حياة ودار فناء، وجعل الآخرة دار جزاء وبقاء. ⁕ حدثنا بشر، قال: ثنا يزيد، قال: ثنا سعيد، عن قتادة ﴿الَّذِي خَلَقَ الْمَوْتَ وَالْحَيَاةَ لِيَبْلُوَكُمْ﴾ ذكر أن نبيّ الله ﷺ أكان يقول: \"إنَّ الله أذَلَّ ابْنَ آدَمَ بالمَوْتِ\". * * وقوله: ﴿وَهُوَ الْعَزِيزُ﴾ يقول: وهو القويّ الشديد انتقامه ممن عصاه، وخالف أمره ﴿الْغَفُورُ﴾ ذنوب من أناب إليه وتاب من ذنوبه.","67:3":"القول في تأويل قوله تعالى: ﴿الَّذِي خَلَقَ سَبْعَ سَمَاوَاتٍ طِبَاقًا مَا تَرَى فِي خَلْقِ الرَّحْمَنِ مِنْ تَفَاوُتٍ فَارْجِعِ الْبَصَرَ هَلْ تَرَى مِنْ فُطُورٍ (٣) ثُمَّ ارْجِعِ الْبَصَرَ كَرَّتَيْنِ يَنْقَلِبْ إِلَيْكَ الْبَصَرُ خَاسِئًا وَهُوَ حَسِيرٌ (٤) ﴾ يقول تعالى ذكره: مخبرا عن صفته: ﴿الَّذِي خَلَقَ سَبْعَ سَمَاوَاتٍ طِبَاقًا﴾ طبقا فوق طبق، بعضها فوق بعض. * * وقوله: ﴿مَا تَرَى فِي خَلْقِ الرَّحْمَنِ مِنْ تَفَاوُتٍ﴾ يقول جل ثناؤه: ما ترى في خلق الرحمن الذي خلق لا في سماء ولا في أرض، ولا في غير ذلك من تفاوت، يعني من اختلاف. وبنحو الذي قلنا في ذلك قال أهل التأويل. ذكر من قال ذلك: ⁕ حدثنا بشر، قال: ثنا يزيد، قال: ثنا سعيد، عن قتادة، قوله: ﴿مَا تَرَى فِي خَلْقِ الرَّحْمَنِ مِنْ تَفَاوُتٍ﴾ : ما ترى فيهم من اختلاف. ⁕ حدثنا ابن عبد الأعلى، قال: ثنا ابن ثور، عن معمر، عن قتادة، في قوله: ﴿مِنْ تَفَاوُتٍ﴾ قال: من اختلاف. واختلفت القرّاء في قراءة ذلك، فقرأته عامة قرّاء المدينة والبصرة وبعض الكوفيين: ﴿مِنْ تَفَاوُتٍ﴾ بألف. وقرأ ذلك عامة قرّاء الكوفة: ﴿مِنْ تَفَوُّتٍ﴾ بتشديد الواو بغير ألف. والصواب من القول في ذلك أنهما قراءتان معروفتان بمعنى واحد، كما قيل: ولا تُصَاعِرْ، ولا تُصَعِّر؛ وتعهَّدت فلانا، وتعاهدته؛ وتظهَّرت، وتظاهرت؛ وكذلك التفاوت والتفوّت. * * وقوله: ﴿فَارْجِعِ الْبَصَرَ هَلْ تَرَى مِنْ فُطُورٍ﴾ يقول: فرد البصر، هل ترى فيه من صُدوع؟ وهي من قول الله: ﴿تَكَادُ السَّمَاوَاتُ يَتَفَطَّرْنَ مِنْ فَوْقِهِنَّ﴾ بمعنى يتشققن ويتصدّعن، الفُطُور مصدر فُطِر فطُورا. وبنحو الذي قلنا في ذلك قال أهل التأويل. ذكر من قال ذلك: ⁕ حدثني محمد بن سعد، قال: ثني أبي، قال: ثني عمي، قال: ثني أبي، عن أبيه، عن ابن عباس ﴿هَلْ تَرَى مِنْ فُطُورٍ﴾ قال: الفطور: الوهي. ⁕ حدثنا بشر، قال: ثنا يزيد، قال: ثنا سعيد، عن قتادة، قوله: ﴿هَلْ تَرَى مِنْ فُطُورٍ﴾ يقول: هل ترى من خلل يا ابن آدم. ⁕ حدثنا ابن عبد الأعلى، قال: ثنا ابن ثور، عن معمر، عن قتادة ﴿مِنْ فُطُورٍ﴾ قال: من خلل ⁕ حدثنا ابن حميد، قال: ثنا مهران، عن سفيان ﴿هَلْ تَرَى مِنْ فُطُورٍ﴾ قال: من شقوق. * * وقوله: ﴿ثُمَّ ارْجِعِ الْبَصَرَ كَرَّتَيْنِ﴾ يقول جل ثناؤه: ثم ردّ البصر يا ابن آدم كرّتين، مرة بعد أخرى، فانظر ﴿هَلْ تَرَى مِنْ فُطُورٍ﴾ أو تفاوت ﴿يَنْقَلِبْ إِلَيْكَ الْبَصَرُ خَاسِئًا﴾ يقول: يرجع إليك بصرك صاغرًا مُبْعَدا من قولهم للكلب: اخسأ، إذا طردوه أي أبعد صاغرا ﴿وَهُوَ حَسِيرٌ﴾ يقول: وهو مُعْيٍ كالّ. وبنحو الذي قلنا في ذلك قال أهل التأويل. ذكر من قال ذلك: ⁕ حدثني محمد بن سعد، قال: ثني أبي، قال: ثني عمي، قال: ثني أبي، عن أبيه، عن ابن عباس ﴿ثُمَّ ارْجِعِ الْبَصَرَ كَرَّتَيْنِ﴾ يقول: هل ترى في السماء من خَلل؟ ﴿يَنْقَلِبْ إِلَيْكَ الْبَصَرُ خَاسِئًا وَهُوَ حَسِيرٌ﴾ بسواد الليل. ⁕ حدثني عليّ، قال: ثنا أبو صالح، قال: ثني معاوية، عن عليّ، عن ابن عباس، في قوله: ﴿خَاسِئًا وَهُوَ حَسِيرٌ﴾ يقول: ذليلا وقوله: ﴿وَهُوَ حَسِيرٌ﴾ يقول: مرجف. ⁕ حدثنا بشر، قال: ثنا يزيد، قال: ثنا سعيد، عن قتادة، قوله: ﴿يَنْقَلِبْ إِلَيْكَ الْبَصَرُ خَاسِئًا﴾ أي حاسرا ﴿وَهُوَ حَسِيرٌ﴾ أي مُعْيٍ ⁕ حدثني ابن عبد الأعلى، قال: ثنا ابن ثور، عن معمر، عن قتادة، في قوله: ﴿خَاسِئًا﴾ قال: صاغرا، ﴿وَهُوَ حَسِيرٌ﴾ يقول: مُعْيٍ لم ير خَلَلا ولا تفاوتا. وقال بعضهم: الخاسئ والحسير واحد. ذكر من قال ذلك: ⁕ حدثني يونس قال أخبرنا ابن وهب، قال، قال ابن زيد، في قوله: (","67:5":"القول في تأويل قوله تعالى: ﴿وَلَقَدْ زَيَّنَّا السَّمَاءَ الدُّنْيَا بِمَصَابِيحَ وَجَعَلْنَاهَا رُجُومًا لِلشَّيَاطِينِ وَأَعْتَدْنَا لَهُمْ عَذَابَ السَّعِيرِ (٥) ﴾ يقول تعالى ذكره: ﴿وَلَقَدْ زَيَّنَّا السَّمَاءَ الدُّنْيَا بِمَصَابِيحَ﴾ وهي النجوم، وجعلها مصابيح لإضاءتها، وكذلك الصبح إنما قيل له صبح للضوء الذي يضئ للناس من النهار ﴿وَجَعَلْنَاهَا رُجُومًا لِلشَّيَاطِينِ﴾ يقول: وجعلنا المصابيح التي زيَّنا بها السماء الدنيا رجوما للشياطين تُرْجم بها. ⁕ وقد حدثنا بشر، قال: ثنا يزيد، قال: ثنا سعيد، عن قتادة ﴿وَلَقَدْ زَيَّنَّا السَّمَاءَ الدُّنْيَا بِمَصَابِيحَ وَجَعَلْنَاهَا رُجُومًا لِلشَّيَاطِينِ﴾ إن الله جلّ ثناؤه إنما خلق هذه النجوم لثلاث خصال: خلقها زينة للسماء الدنيا، ورجومًا للشياطين، وعلامات يهتدي بها؛ فمن يتأوّل منها غير ذلك، فقد قال برأيه، وأخطأ حظه، وأضاع نصيبه، وتكلَّف ما لا علم له به. * * وقوله: ﴿وَأَعْتَدْنَا لَهُمْ عَذَابَ السَّعِيرِ﴾ يقول جلّ ثناؤه: وأعتدنا للشياطين في الآخرة عذاب السعير، تُسْعَر عليهم فتُسْجَر. * * القول في تأويل قوله تعالى: ﴿وَلِلَّذِينَ كَفَرُوا بِرَبِّهِمْ عَذَابُ جَهَنَّمَ وَبِئْسَ الْمَصِيرُ (٦) إِذَا أُلْقُوا فِيهَا سَمِعُوا لَهَا شَهِيقًا وَهِيَ تَفُورُ (٧) ﴾ يقول تعالى ذكره: ﴿وَلِلَّذِينَ كَفَرُوا بِرَبِّهِمْ﴾ الذي خلقهم في الدنيا ﴿عَذَابَ جَهَنَّمَ﴾ في الآخرة ﴿وَبِئْسَ الْمَصِيرُ﴾ يقول: وبئس المصير عذاب جهنم. * * وقوله: ﴿إِذَا أُلْقُوا فِيهَا﴾ يعني إذا ألقى الكافرون في جهنم ﴿سَمِعُوا لَهَا﴾ يعني لجهنم ﴿شَهِيقًا﴾ يعني بالشهيق: الصوت الذي يخرج من الجوف بشدّة كصوت الحمار، كما قال رؤبة في صفة حمار: حَشْرج في الجَوْفِ سَحيلا أوْ شهَقْ حَتَّى يُقَال ناهِق ومَا نَهَقْ * * وقوله: ﴿وَهِيَ تَفُورُ﴾ يقول: تَغْلِي. وبنحو الذي قلنا في ذلك قال أهل التأويل. ذكر من قال ذلك: ⁕ حدثنا ابن حميد، قال: ثنا مهران، عن سفيان، عن مجاهد ﴿سَمِعُوا لَهَا شَهِيقًا وَهِيَ تَفُورُ﴾ يقول: تغلي كما يغلي القدر.","67:8":"القول في تأويل قوله تعالى: ﴿تَكَادُ تَمَيَّزُ مِنَ الْغَيْظِ كُلَّمَا أُلْقِيَ فِيهَا فَوْجٌ سَأَلَهُمْ خَزَنَتُهَا أَلَمْ يَأْتِكُمْ نَذِيرٌ (٨) قَالُوا بَلَى قَدْ جَاءَنَا نَذِيرٌ فَكَذَّبْنَا وَقُلْنَا مَا نزلَ اللَّهُ مِنْ شَيْءٍ إِنْ أَنْتُمْ إِلا فِي ضَلالٍ كَبِيرٍ (٩) ﴾ يقول تعالى ذكره: ﴿تَكَادُ﴾ جهنم ﴿تَمَيَّزُ﴾ يقول: تتفرّق وتتقطع ﴿مِنَ الْغَيْظِ﴾ على أهلها. وبنحو الذي قلنا في ذلك قال أهل التأويل. ذكر من قال ذلك: ⁕ حدثني عليّ، قال: ثنا أبو صالح، قال: ثني معاوية، عن عليّ، عن ابن عباس، قوله: ﴿تَكَادُ تَمَيَّزُ مِنَ الْغَيْظِ﴾ يقول: تتفرّق. ⁕ حدثني محمد بن سعد، قال: ثني أبي، قال: ثني عمي، قال: ثني أبي، عن أبيه، عن ابن عباس، قوله: ﴿تَكَادُ تَمَيَّزُ مِنَ الْغَيْظِ﴾ تكاد يفارق بعضها بعضا وتنفطر. ⁕ حُدثت عن الحسين، قال: سمعت أبا معاذ يقول: ثنا عبيد، قال: سمعت الضحاك يقول في قوله: ﴿تَكَادُ تَمَيَّزُ مِنَ الْغَيْظِ﴾ يقول: تفرّق. ⁕ حدثني يونس، قال: أخبرنا ابن وهب، قال، قال ابن زيد، في قوله: ﴿تَكَادُ تَمَيَّزُ مِنَ الْغَيْظِ﴾ قال: التميز: التفرّق من الغيظ على أهل معاصي الله غضبا لله، وانتقاما له. * * وقوله: ﴿كُلَّمَا أُلْقِيَ فِيهَا فَوْجٌ سَأَلَهُمْ﴾ يقول جلّ ثناؤه: كلما ألقي في جهنم جماعة ﴿سَأَلَهُمْ خَزَنَتُهَا أَلَمْ يَأْتِكُمْ نَذِيرٌ﴾ يقول: سأل الفوجَ خزنة جهنم، فقالوا لهم: ألم يأتكم ي الدنيا نذير ينذركم هذا العذاب الذي أنتم فيه؟ فأجابهم المساكين ﴿قَالُوا بَلَى قَدْ جَاءَنَا نَذِيرٌ﴾ ينذرنا هذا، فَكَذَّبْناهُ وَقُلْنَا له ﴿مَا نزلَ اللَّهُ مِنْ شَيْءٍ إِنْ أَنْتُمْ إِلا فِي ضَلالٍ كَبِيرٍ﴾ يقول: في ذهاب عن الحقّ بعيد.","67:10":"القول في تأويل قوله تعالى: ﴿وَقَالُوا لَوْ كُنَّا نَسْمَعُ أَوْ نَعْقِلُ مَا كُنَّا فِي أَصْحَابِ السَّعِيرِ (١٠) فَاعْتَرَفُوا بِذَنْبِهِمْ فَسُحْقًا لأصْحَابِ السَّعِيرِ (١١) ﴾ يقول تعالى ذكره: وقال الفوج الذي ألقي في النار للخزنة: ﴿لَوْ كُنَّا﴾ في الدنيا ﴿نَسْمَعُ أَوْ نَعْقِلُ﴾ من النذر ما جاءونا به من النصيحة، أو نعقل عنهم ما كانوا يدعوننا إليه ﴿مَا كُنَّا﴾ اليوم ﴿فِي أَصْحَابِ السَّعِيرِ﴾ يعني: أهل النار. * * وقوله: ﴿فَاعْتَرَفُوا بِذَنْبِهِمْ﴾ يقول: فأقرّوا بذنبهم ووحَّد الذنب، وقد أضيف إلى الجمع لأن فيه معنى فعل، فأدى الواحد عن الجمع، كما يقال: خرج عطاء الناس، وأعطية الناس ﴿فَسُحْقًا لأصْحَابِ السَّعِيرِ﴾ يقول: فبُعدا لأهل النار. وبنحو الذي قلنا في ذلك قال أهل التأويل. ذكر من قال ذلك: ⁕ حدثني عليّ، قال ثنا أبو صالح، قال: ثني معاوية، عن عليّ، عن ابن عباس، قوله: ﴿فَسُحْقًا لأصْحَابِ السَّعِيرِ﴾ يقول: بُعدا. ⁕ حدثنا ابن حميد، قال: ثنا مهران، عن سفيان، عن سلمة بن كهيل، عن سعيد بن جبير ﴿فَسُحْقًا لأصْحَابِ السَّعِيرِ﴾ قال: قال سُحقا واد في جهنم، والقرّاء على تخفيف الحاء من السُّحْق، وهو الصواب عندنا لأن الفصيح من كلام العرب ذلك، ومن العرب من يحرّكها بالضمّ.","67:12":"القول في تأويل قوله تعالى: ﴿إِنَّ الَّذِينَ يَخْشَوْنَ رَبَّهُمْ بِالْغَيْبِ لَهُمْ مَغْفِرَةٌ وَأَجْرٌ كَبِيرٌ (١٢) وَأَسِرُّوا قَوْلَكُمْ أَوِ اجْهَرُوا بِهِ إِنَّهُ عَلِيمٌ بِذَاتِ الصُّدُورِ (١٣) ﴾ يقول تعالى ذكره: إن الذين يخافون ربهم بالغيب، يقول: وهم لم يرَوُه ﴿لَهُمْ مَغْفِرَةٌ﴾ يقول: لهم عفو من الله عن ذنوبهم ﴿وَأَجْرٌ كَبِيرٌ﴾ يقول: وثواب من الله لهم على خشيتهم إياه بالغيب جزيل. * * وقوله: ﴿وَأَسِرُّوا قَوْلَكُمْ أَوِ اجْهَرُوا بِهِ﴾ يقول جلّ ثناؤه: وأخفوا قولكم وكلامكم أيها الناس أو أعلنوه وأظهروه ﴿إِنَّهُ عَلِيمٌ بِذَاتِ الصُّدُورِ﴾ يقول: إنه ذو علم بضمائر الصدور التي لم يُتَكَلَّم بها، فكيف بما نطق به وتكلم به، أخفي ذلك أو أعلن، لأن من لم تخف عليه ضمائر الصدور فغيرها أحرى أن لا يخفي عليه. * * القول في تأويل قوله تعالى: ﴿أَلا يَعْلَمُ مَنْ خَلَقَ وَهُوَ اللَّطِيفُ الْخَبِيرُ (١٤) هُوَ الَّذِي جَعَلَ لَكُمُ الأرْضَ ذَلُولا فَامْشُوا فِي مَنَاكِبِهَا وَكُلُوا مِنْ رِزْقِهِ وَإِلَيْهِ النُّشُورُ (١٥) ﴾ يقول تعالى ذكره: ﴿أَلا يَعْلَمُ﴾ الربّ جلّ ثناؤه ﴿مَنْ خَلَقَ﴾ من خلقه؟ يقول: كيف يخفي عليه خلقه الذي خلق ﴿وَهُوَ اللَّطِيفُ﴾ بعباده ﴿الْخَبِيرُ﴾ بهم وبأعمالهم. * * وقوله: ﴿هُوَ الَّذِي جَعَلَ لَكُمُ الأرْضَ ذَلُولا﴾ يقول تعالى ذكره: الله الذي جعل لكم الأرض ذَلُولا سَهْلا سَهَّلها لكم ﴿فَامْشُوا فِي مَنَاكِبِهَا﴾ . اختلف أهل العلم في معنى ﴿مَنَاكِبِهَا﴾ فقال بعضهم: مناكبها: جبالها. ذكر من قال ذلك: ⁕ حدثني عليّ، قال: ثنا أبو صالح، قال: ثني معاوية، عن عليّ، عن ابن عباس، قوله: ﴿فِي مَنَاكِبِهَا﴾ يقول: جبالها. ⁕ حدثنا ابن بشار، قال: ثنا عبد الأعلى، قال: ثنا سعيد، عن قتادة، عن بشير بن كعب أنه قرأ هذه الآية ﴿فَامْشُوا فِي مَنَاكِبِهَا﴾ فقال لجارية له: إن دَريْت ما مناكبها، فأنت حرة لوجه الله؛ قالت: فإن مناكبها: جبالها، فكأنما سُفِع في وجهه، ورغب في جاريته، فسأل، منهم من أمره، ومنهم من نهاه، فسأل أبا الدرداء، فقال: الخير في طمأنينة، والشرّ في ريبة، فَذرْ ما يريبك إلى ما لا يريبك. ⁕ حدثنا ابن بشار، قال: ثنا معاذ بن هشام، قال: ثني أبي، عن قتادة، عن بشير بن كعب، بمثله سواء. ⁕ حدثنا بشر، قال: ثنا يزيد، قال: ثنا سعيد، عن قتادة ﴿فَامْشُوا فِي مَنَاكِبِهَا﴾ : جبالها. ⁕ حدثنا ابن عبد الأعلى، قال: ثنا ابن ثور، عن معمر، عن قتادة، في قوله: ﴿فِي مَنَاكِبِهَا﴾ قال: في جبالها. وقال آخرون: ﴿مَنَاكِبِهَا﴾ : أطرافها ونواحيها. ذكر من قال ذلك: ⁕ حدثني محمد بن سعد، قال: ثني أبي، قال: ثني عمي، قال: ثني أبي، عن أبيه، عن ابن عباس قوله: ﴿فَامْشُوا فِي مَنَاكِبِهَا﴾ يقول: امشوا في أطرافها. ⁕ حدثني يعقوب بن إبراهيم، قال: ثنا ابن علية، عن سعيد، عن قتادة، أن بشير بن كعب العدويّ، قرأ هذه الآية ﴿فَامْشُوا فِي مَنَاكِبِهَا﴾ فقال لجاريته: إن أخبرتني ما مناكبها، فأنت حرّة، فقالت: نواحيها؛ فأراد أن يتزوّجها، فسأل أبا الدرداء، فقال: إن الخير في طمأنينة، وإن الشرّ في ريبة، فدع ما يَريبك إلى ما لا يريبك. ⁕ حدثني محمد بن عمرو، قال: ثنا أبو عاصم، قال: ثنا عيسى؛ وحدثني الحارث، قال: ثنا الحسن، قال: ثنا ورقاء، جميعا عن ابن أبي نجيح، عن مجاهد، قوله: ﴿فَامْشُوا فِي مَنَاكِبِهَا﴾ قال: طرقها وفجاجها. وأولى القولين عندي بالصواب قول من قال: معنى ذلك: فامشوا في نواحيها وجوانبها، وذلك أن نواحيها نظير مناكب الإنسان التي هي من أطرافه. * * وقوله: ﴿وَكُلُوا مِنْ رِزْقِهِ﴾ يقول: وكلوا من رزق الله الذ","67:16":"القول في تأويل قوله تعالى: ﴿أَأَمِنْتُمْ مَنْ فِي السَّمَاءِ أَنْ يَخْسِفَ بِكُمُ الأرْضَ فَإِذَا هِيَ تَمُورُ (١٦) أَمْ أَمِنْتُمْ مَنْ فِي السَّمَاءِ أَنْ يُرْسِلَ عَلَيْكُمْ حَاصِبًا فَسَتَعْلَمُونَ كَيْفَ نَذِيرِ (١٧) ﴾ يقول تعالى ذكره: ﴿أَأَمِنْتُمْ مَنْ فِي السَّمَاءِ﴾ أيها الكافرون ﴿أَنْ يَخْسِفَ بِكُمُ الأرْضَ فَإِذَا هِيَ تَمُورُ﴾ يقول: فإذا الأرض تذهب بكم وتجيئ وتضطرب ﴿أَمْ أَمِنْتُمْ مَنْ فِي السَّمَاءِ﴾ وهو الله ﴿أَنْ يُرْسِلَ عَلَيْكُمْ حَاصِبًا﴾ وهو التراب فيه الحصباء الصغار ﴿فَسَتَعْلَمُونَ كَيْفَ نَذِيرِ﴾ يقول: فستعلمون أيها الكفرة كيف عاقبة نذيري لكم، إذ كذبتم به، ورددتموه على رسولي. * * القول في تأويل قوله تعالى: ﴿وَلَقَدْ كَذَّبَ الَّذِينَ مِنْ قَبْلِهِمْ فَكَيْفَ كَانَ نَكِيرِ (١٨) أَوَلَمْ يَرَوْا إِلَى الطَّيْرِ فَوْقَهُمْ صَافَّاتٍ وَيَقْبِضْنَ مَا يُمْسِكُهُنَّ إِلا الرَّحْمَنُ إِنَّهُ بِكُلِّ شَيْءٍ بَصِيرٌ (١٩) ﴾ يقول تعالى ذكره: ولقد كذّب الذين من قبل هؤلاء المشركين من قريش من الأمم الخالية رسلهم. ﴿فَكَيْفَ كَانَ نَكِيرِ﴾ يقول: فكيف كان نكيري تكذيبهم إياهم ﴿أَوَلَمْ يَرَوْا إِلَى الطَّيْرِ فَوْقَهُمْ صَافَّاتٍ﴾ يقول: أو لم ير هؤلاء المشركون إلى الطير فوقهم صافات أجنحتهنّ ﴿وَيَقْبِضْنَ﴾ يقول: ويقبضن أجنحتهنّ أحيانا. وإنما عُنِي بذلك أنها تصُفُّ أجنحتها أحيانا، وتقبض أحيانا. وبنحو الذي قلنا في ذلك قال أهل التأويل. ذكر من قال ذلك: ⁕ حدثنا ابن عبد الأعلى، مقال: ثنا ابن ثور، عن معمر، عن قتادة، في قوله: ﴿صَافَّاتٍ﴾ قال: الطير يصفّ جناحه كما رأيت، ثم يقبضه. ⁕ حدثني محمد بن عمرو، قال: ثنا أبو عاصم، قال: ثنا عيسى؛ وحدثني الحارث، قال: ثنا الحسن، قال: ثنا ورقاء، جميعا عن ابن أبي نجيح، عن مجاهد، قوله: ﴿صَافَّاتٍ وَيَقْبِضْنَ﴾ بسطهنّ أجنحتهنّ وقبضهنّ. * * وقوله: ﴿مَا يُمْسِكُهُنَّ إِلا الرَّحْمَنُ﴾ يقول: ما يمسك الطير الصافات فوقكم إلا الرحمن. يقول: فلهم بذلك مذكر إن ذكروا، ومعتبر إن اعتبروا، يعلمون به أن ربهم واحد لا شريك له ﴿إِنَّهُ بِكُلِّ شَيْءٍ بَصِيرٌ﴾ يقول: إن الله بكل شيء ذو بصر وخبرة، لا يدخل تدبيره خلل، ولا يرى في خلقه تفاوت.","67:20":"القول في تأويل قوله تعالى: ﴿أَمْ مَنْ هَذَا الَّذِي هُوَ جُنْدٌ لَكُمْ يَنْصُرُكُمْ مِنْ دُونِ الرَّحْمَنِ إِنِ الْكَافِرُونَ إِلا فِي (٢٠) ﴾ يقول تعالى ذكره: للمشركين به من قريش: من هذا الذي هو جند لكم أيها الكافرون به، ينصركم من دون الرحمن إن أراد بكم سوءا، فيدفع عنكم ما أراد بكم من ذلك ﴿إِنِ الْكَافِرُونَ إِلا فِي غُرُورٍ﴾ يقول تعالى ذكره: ما الكافرون بالله إلا في غرور من ظنهم أن آلهتهم تقرّبهم إلى الله زلفى، وأنها تنفع أو تضر. * * القول في تأويل قوله تعالى: ﴿أَمْ مَنْ هَذَا الَّذِي يَرْزُقُكُمْ إِنْ أَمْسَكَ رِزْقَهُ بَلْ لَجُّوا فِي عُتُوٍّ (٢١) ﴾ يقول تعالى ذكره: أم من هذا الذي يطعمكم ويسقيكم، ويأتي بأقواتكم إن أمسك بكم رزقه الذي يرزقه عنكم. * * وقوله: ﴿بَلْ لَجُّوا فِي عُتُوٍّ وَنُفُورٍ﴾ يقول: بل تمادوا في طغيان ونفور عن الحقّ واستكبار. وبنحو الذي قلنا في ذلك قال أهل التأويل. ذكر من قال ذلك: ⁕ حدثني محمد بن سعد، قال: ثني أبي، قال: ثني عمي، قال: ثني أبي، عن أبيه، عن ابن عباس، قوله: ﴿بَلْ لَجُّوا فِي عُتُوٍّ وَنُفُورٍ﴾ يقول: في ضلال. ⁕ حدثني محمد بن عمرو، قال: ثنا أبو عاصم، قال: ثنا عيسى؛ وحدثني الحارث، قال: ثنا الحسن، قال: ثنا ورقاء، جميعا عن ابن أبي نجيح، عن مجاهد، في قول الله: ﴿بَلْ لَجُّوا فِي عُتُوٍّ وَنُفُورٍ﴾ قال: كفور.","67:22":"القول في تأويل قوله تعالى: ﴿أَفَمَنْ يَمْشِي مُكِبًّا عَلَى وَجْهِهِ أَهْدَى أَمْ مَنْ يَمْشِي سَوِيًّا عَلَى صِرَاطٍ (٢٢) ﴾ يقول تعالى ذكره: ﴿أَفَمَنْ يَمْشِي﴾ أيها الناس ﴿مُكِبًّا عَلَى وَجْهِهِ﴾ لا يبصر ما بين يديه، وما عن يمينه وشماله ﴿أَهْدَى﴾ : أشدّ استقامة على الطريق، وأهدى له، ﴿أَمَّنْ يَمْشِي سَوِيًّا﴾ مشي بني آدم على قدميه ﴿عَلَى صِرَاطٍ مُسْتَقِيمٍ﴾ يقول: على طريق لا اعوجاج فيه؛ وقيل ﴿مُكِبًّا﴾ لأنه فعل غير واقع، وإذا لم يكن واقعا أدخلوا فيه الألف، فقالوا: أكبّ فلان على وجهه، فهو مكبّ؛ ومنه قول الأعشى: مُكِبا على رَوْقَيْه يَحْفِرُ عِرْقَها عَلَى ظَهْر عُرْيان الطَّرِيقةِ أهْيَما فقال: مكبا، لأنه فعل غير واقع، فإذا كان واقعا حُذفت منه الألف، فقيل: كببت فلانا على وجهه وكبه الله على وجهه. وبنحو الذي قلنا في ذلك قال أهل التأويل. ذكر من قال ذلك: ⁕ حدثني محمد بن سعد، قال: ثني أبي، قال: ثني عمي، قال: ثني أبي، عن أبيه، عن ابن عباس، قوله: ﴿أَفَمَنْ يَمْشِي مُكِبًّا عَلَى وَجْهِهِ أَهْدَى أَمَّنْ يَمْشِي سَوِيًّا عَلَى صِرَاطٍ مُسْتَقِيمٍ﴾ يقول: من يمشي في الضلالة أهدى، أم من يمشي مهتديا؟. ⁕ حدثني محمد بن عمرو، قال: ثنا أبو عاصم، قال: ثنا عيسى؛ وحدثني الحارث، قال: ثنا الحسن، قال: ثنا ورقاء، جميعا عن ابن أبي نجيح، عن مجاهد، قوله: ﴿مُكِبًّا عَلَى وَجْهِهِ﴾ قال: في الضلالة ﴿أَمَّنْ يَمْشِي سَوِيًّا عَلَى صِرَاطٍ مُسْتَقِيمٍ﴾ قال: حقّ مستقيم. ⁕ حدثنا عن الحسين، قال: سمعت أبا معاذ يقول: ثنا عبيد، قال: سمعت الضحاك يقول في قوله: ﴿أَفَمَنْ يَمْشِي مُكِبًّا عَلَى وَجْهِهِ﴾ يعني الكافر أهدى ﴿أَمَّنْ يَمْشِي سَوِيًّا﴾ المؤمن؟ ضرب الله مثلا لهما. وقال آخرون: بل عنى بذلك أن الكافر يحشره الله يوم القيامة على وجهه، فقال: ﴿أَفَمَنْ يَمْشِي مُكِبًّا عَلَى وَجْهِهِ﴾ يوم القيامة ﴿أَهْدَى أَمَّنْ يَمْشِي سَوِيًّا﴾ يومئذ. ذكر من قال ذلك: ⁕ حدثنا بشر، قال: ثنا يزيد، قال: ثنا سعيد، عن قتادة، قوله: ﴿أَفَمَنْ يَمْشِي مُكِبًّا عَلَى وَجْهِهِ أَهْدَى﴾ \"هو الكافر أكبّ على معاصي الله في الدنيا، حشره الله يوم القيامة على وجهه، فقيل: يا نبيّ الله كيف يحشر الكافر على وجهه؟ قال: \"إن الذي أمشاه على رجليه قادر أن يحشره يوم القيامة على وجهه\" ⁕ حدثنا ابن عبد الأعلى، قال: ثنا ابن ثور، عن معمر، عن قتادة ﴿أَفَمَنْ يَمْشِي مُكِبًّا عَلَى وَجْهِهِ﴾ قال: هو الكافر يعمل بمعصية الله، فيحشره الله يوم القيامة على وجهه. قال معمر: قيل للنبيّ ﷺ: كيف يمشون على وجوههم؟ قال: \"إنَّ الَّذِي أمْشاهُم على أقْدَامِهمْ قادِرٌ عَلى أنْ يُمْشيَهُمْ عَلى وُجُوهِهِمْ\" ⁕ حدثنا ابن عبد الأعلى، قال: ثنا ابن ثور، عن معمر، عن قتادة ﴿يَمْشِي سَوِيًّا عَلَى صِرَاطٍ مُسْتَقِيمٍ﴾ قال المؤمن عمل بطاعة الله، فيحشره الله على طاعته.","67:23":"القول في تأويل قوله تعالى: ﴿قُلْ هُوَ الَّذِي أَنْشَأَكُمْ وَجَعَلَ لَكُمُ السَّمْعَ وَالأبْصَارَ وَالأفْئِدَةَ قَلِيلا مَا تَشْكُرُونَ (٢٣) ﴾ يقول تعالى ذكره: قل يا محمد للذين يكذّبون بالبعث من المشركين. الله الذي أنشأكم فخلقكم، ﴿وَجَعَلَ لَكُمُ السَّمْعَ﴾ تسمعون به ﴿وَالأبْصَارَ﴾ تبصرون بها ﴿وَالأفْئِدَةَ﴾ تعقلون بها ﴿قَلِيلا مَا تَشْكُرُونَ﴾ يقول: قليلا ما تشكرون ربكم على هذه النعم التي انعمها عليكم. * * القول في تأويل قوله تعالى: ﴿قُلْ هُوَ الَّذِي ذَرَأَكُمْ فِي الأرْضِ وَإِلَيْهِ تُحْشَرُونَ (٢٤) وَيَقُولُونَ مَتَى هَذَا الْوَعْدُ إِنْ كُنْتُمْ صَادِقِينَ (٢٥) ﴾ يقول تعالى ذكره لنبيه محمد ﷺ: قل يا محمد، الله ﴿الَّذِي ذَرَأَكُمْ فِي الأرْضِ﴾ يقول: الله الذي خلقكم في الأرض ﴿وَإِلَيْهِ تُحْشَرُونَ﴾ يقول: وإلى الله تحشرون، فتجمعون من قبوركم لموقف الحساب ﴿وَيَقُولُونَ مَتَى هَذَا الْوَعْدُ إِنْ كُنْتُمْ صَادِقِينَ﴾ يقول جلّ ثناؤه: ويقول المشركون: متى يكون ما تعدنا من الحشر إلى الله إن كنتم صادقين في وعدكم إيانا ما تعدوننا. * * القول في تأويل قوله تعالى: ﴿قُلْ إِنَّمَا الْعِلْمُ عِنْدَ اللَّهِ وَإِنَّمَا أَنَا نَذِيرٌ مُبِينٌ (٢٦) ﴾","67:27":"القول في تأويل قوله تعالى: ﴿فَلَمَّا رَأَوْهُ زُلْفَةً سِيئَتْ وُجُوهُ الَّذِينَ كَفَرُوا وَقِيلَ هَذَا الَّذِي كُنْتُمْ بِهِ تَدَّعُونَ (٢٧) ﴾ يقول تعالى ذكره لنبيه ﷺ: قل يا محمد لهؤلاء المستعجليك بالعذاب وقيام الساعة: إنما علم الساعة، ومتى تقوم القيامة عند الله لا يعلم ذلك غيره ﴿وَإِنَّمَا أَنَا نَذِيرٌ مُبِينٌ﴾ يقول: وما أنا إلا نذير لكم أنذركم عذاب الله على كفركم به ﴿مُبِينٌ﴾ : قد أبان لكم إنذاره. * * وقوله: ﴿فَلَمَّا رَأَوْهُ زُلْفَةً سِيئَتْ وُجُوهُ الَّذِينَ كَفَرُوا﴾ يقول تعالى ذكره: فلما رأى هؤلاء المشركون عذاب الله زلفة، يقول: قريبا، وعاينوه، ﴿سِيئَتْ وُجُوهُ الَّذِينَ كَفَرُوا﴾ يقول: ساء الله بذلك وجوه الكافرين. وبنحو الذي قلنا في قوله: ﴿زُلْفَةً﴾ قال أهل التأويل. ذكر من قال ذلك: ⁕ حدثني يعقوب بن إبراهيم، قال: ثنا ابن علية، عن أبي رجاء، عن الحسن، في قوله: ﴿فَلَمَّا رَأَوْهُ زُلْفَةً سِيئَتْ﴾ قال: لما عاينوه. ⁕ حدثنا ابن المثنى، قال: ثنا يحيى بن أبي بكير، قال: ثنا شعبة، عن أبي رجاء، قال: سألت الحسن، عن قوله: ﴿فَلَمَّا رَأَوْهُ زُلْفَةً﴾ قال: معاينة. ⁕ حدثني محمد بن عمرو، قال: ثنا أبو عاصم، قال: ثنا عيسى؛ وحدثني الحارث، قال: ثنا الحسن، قال: ثنا ورقاء، جميعا عن ابن أبي نجيح، عن مجاهد، قوله: ﴿فَلَمَّا رَأَوْهُ زُلْفَةً﴾ قال: قد اقترب. ⁕ حدثنا بشر، قال: ثنا يزيد، قال: ثنا سعيد، عن قتادة، قوله: ﴿فَلَمَّا رَأَوْهُ زُلْفَةً سِيئَتْ وُجُوهُ الَّذِينَ كَفَرُوا﴾ لما عاينت من عذاب الله. ⁕ حدثنا ابن عبد الأعلى، قال: ثنا ابن ثور، عن معمر، عن قتادة ﴿فَلَمَّا رَأَوْهُ زُلْفَةً﴾ قال: لما رأوا عذاب الله زلفة، يقول: سيئت وجوههم حين عاينوا من عذاب الله وخزيه ما عاينوا. ⁕ حدثني يونس، قال: أخبرنا ابن وهب، قال، قال ابن زيد، في قوله: ﴿فَلَمَّا رَأَوْهُ زُلْفَةً سِيئَتْ﴾ قيل: الزلفة حاضر قد حضرهم عذاب الله عزّ وجلّ. : ﴿وَقِيلَ هَذَا الَّذِي كُنْتُمْ بِهِ تَدَّعُونَ﴾ يقول: وقال الله لهم: هذا العذاب الذي كنتم به تذكرون ربكم أن يعجله لكم. وبنحو الذي قلنا في ذلك قال أهل التأويل. ذكر من قال ذلك: ⁕ حدثني يونس، قال: أخبرنا ابن وهب، قال، قال ابن زيد، في قوله: ﴿وَقِيلَ هَذَا الَّذِي كُنْتُمْ بِهِ تَدَّعُونَ﴾ قال: استعجالهم بالعذاب. واختلفت القرّاء في قراءة ذلك، فقرأته عامة قرّاء الأمصار ﴿هَذَا الَّذِي كُنْتُمْ بِهِ تَدَّعُونَ﴾ بتشديد الدال بمعنى تفتعلون من الدعاء. وذكر عن قتادة والضحاك أنهما قرءا ذلك ﴿تَدَّعُونَ﴾ بمعنى تفعلون في الدنيا. ⁕ حدثني أحمد بن يوسف، قال: ثنا القاسم، قال: ثنا حجاج، عن هارون، قال: أخبرنا أبان العطار وسعيد بن أبي عروبة، عن قتادة أنه قرأها ﴿الذِي كُنْتُمْ بِهِ تَدَّعُونَ﴾ خفيفة؛ ويقول: كانوا يدعون بالعذاب، ثم قرأ: ﴿وَإِذْ قَالُوا اللَّهُمَّ إِنْ كَانَ هَذَا هُوَ الْحَقَّ مِنْ عِنْدِكَ فَأَمْطِرْ عَلَيْنَا حِجَارَةً مِنَ السَّمَاءِ أَوِ ائْتِنَا بِعَذَابٍ أَلِيمٍ﴾ . والصواب من القراءة في ذلك، ما عليه قراء الأمصار لإجماع الحجة من القرّاء عليه.","67:28":"القول في تأويل قوله تعالى: ﴿قُلْ أَرَأَيْتُمْ إِنْ أَهْلَكَنِيَ اللَّهُ وَمَنْ مَعِيَ أَوْ رَحِمَنَا فَمَنْ يُجِيرُ الْكَافِرِينَ مِنْ عَذَابٍ أَلِيمٍ (٢٨) ﴾ يقول تعالى ذكره لنبيه محمد ﷺ: ﴿قُلْ﴾ يا محمد للمشركين من قومك، ﴿أَرَأَيْتُمْ﴾ أيها الناس ﴿إِنْ أَهْلَكَنِيَ اللَّهُ﴾ فأماتني ﴿وَمَنْ مَعِيَ أَوْ رَحِمَنَا﴾ فأخَّر في آجالنا ﴿فَمَنْ يُجِيرُ الْكَافِرِينَ﴾ بالله ﴿مِنْ عَذَابِ﴾ موجع مؤلم، وذلك عذاب النار. يقول: ليس ينجي الكفار من عذاب الله موتُنا وحياتنا، فلا حاجة بكم إلى أن تستعجلوا قيام الساعة، ونزول العذاب، فإن ذلك غير نافعكم، بل ذلك بلاء عليكم عظيم. * * القول في تأويل قوله تعالى: ﴿قُلْ هُوَ الرَّحْمَنُ آمَنَّا بِهِ وَعَلَيْهِ تَوَكَّلْنَا فَسَتَعْلَمُونَ مَنْ هُوَ فِي ضَلالٍ مُبِينٍ (٢٩) ﴾ يقول تعالى ذكره لنبيه محمد ﷺ قل يا محمد: ربنا ﴿الرَّحْمَنُ آمَنَّا بِهِ﴾ يقول: صدّقنا به ﴿وَعَلَيْهِ تَوَكَّلْنَا﴾ يقول: وعليه اعتمدنا في أمورنا، وبه وثقنا فيها ﴿فَسَتَعْلَمُونَ مَنْ هُوَ فِي ضَلالٍ مُبِينٍ﴾ يقول: فستعلمون أيها المشركون بالله الذي هو في ذهاب عن الحقّ، والذي هو على غير طريق مستقيم منا ومنكم إذا صرنا إليه، وحشرنا جميعا.","67:30":"القول في تأويل قوله تعالى: ﴿قُلْ أَرَأَيْتُمْ إِنْ أَصْبَحَ مَاؤُكُمْ غَوْرًا فَمَنْ يَأْتِيكُمْ بِمَاءٍ مَعِينٍ (٣٠) ﴾ يقول تعالى ذكره لنبيه محمد ﷺ: ﴿قُلْ﴾ يا محمد لهؤلاء المشركين: ﴿أَرَأَيْتُمْ﴾ أيها القوم العادلون بالله ﴿إِنْ أَصْبَحَ مَاؤُكُمْ غَوْرًا﴾ يقول: غائرا لا تناله الدلاء ﴿فَمَنْ يَأْتِيكُمْ بِمَاءٍ مَعِينٍ﴾ يقول: فمن يجيئكم بماء معين، يعني بالمعين: الذي تراه العيون ظاهرا وبنحو الذي قلنا في ذلك قال أهل التأويل. ذكر من قال ذلك: ⁕ حدثني محمد بن سعد، قال: ثني أبي، قال: ثني عمي، قال: ثني أبي، عن أبيه، عن ابن عباس، قوله: ﴿فَمَنْ يَأْتِيكُمْ بِمَاءٍ مَعِينٍ﴾ يقول: بماء عذب. ⁕ حدثنا ابن عبد الأعلى بن واصل، قال: ثني عبيد بن قاسم البزاز، قال: ثنا شريك، عن سالم، عن سعيد بن جُبير في قوله: ﴿إِنْ أَصْبَحَ مَاؤُكُمْ غَوْرًا﴾ لا تناله الدلاء ﴿فَمَنْ يَأْتِيكُمْ بِمَاءٍ مَعِينٍ﴾ قال: الظاهر. ⁕ حدثنا بشر، قال: ثنا يزيد، قال: ثنا سعيد، عن قتادة، قوله: ﴿قُلْ أَرَأَيْتُمْ إِنْ أَصْبَحَ مَاؤُكُمْ غَوْرًا﴾ : أي ذاهبا ﴿فَمَنْ يَأْتِيكُمْ بِمَاءٍ مَعِينٍ﴾ قال: الماء المعين: الجاري. ⁕ حُدثت عن الحسين، قال: سمعت أبا معاذ يقول: ثنا عبيد، قال: سمعت الضحاك يقول، في قوله: ﴿مَاؤُكُمْ غَوْرًا﴾ ذاهبا ﴿فَمَنْ يَأْتِيكُمْ بِمَاءٍ مَعِينٍ﴾ جار. وقيل غورا فوصف الماء بالمصدر، كما يقال: ليلة عم، يراد: ليلة عامة. آخر تفسير سورة الملك"};
var DILAL_FULL=`{تَبَٰرَكَ ٱلَّذِي بِيَدِهِ ٱلۡمُلۡكُ وَهُوَ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرٌ} (1) مقدمة السورة: سورة الملك مكية وآياتها ثلاثون هذا الجزء كله من السور المكية . كما كان الجزء الذي سبقه كله من السور المدنية . ولكل منهما طابع مميز ، وطعم خاص . . وبعض مطالع السور في هذا الجزء من بواكير ما نزل من القرآن كمطلع سورة " المدثر " ومطلع سورة " المزمل " . كما أن فيه سورا يحتمل أن تكون قد نزلت بعد البعثة بحوالي ثلاث سنوات كسورة " القلم " . وبحوالي عشر سنوات كسورة " الجن " التي يروى أنها نزلت في عودة رسول الله صلى الله عليه وسلم من الطائف ، حيث أوذي من ثقيف . ثم صرف الله إليه نفرا من الجن فاستمعوا إليه وهو يرتل القرآن ، مما حكته سورة الجن في هذا الجزء . وكانت هذه الرحلة بعد وفاة خديجة وأبي طالب قبيل الهجرة بعام أو عامين . وإن كانت هناك رواية أخرى هي الأرجح بأن السورة نزلت في أوائل البعثة . والقرآن المكي يعالج - في الغالب - إنشاء العقيدة . في الله وفي الوحي ، وفي اليوم الآخر . وإنشاء التصور المنبثق من هذه العقيدة لهذا الوجود وعلاقته بخالقه . والتعريف بالخالق تعريفا يجعل الشعور به حيا في القلب ، مؤثرا موجها موحيا بالمشاعر اللائقة بعبد يتجه إلى رب ، وبالأدب الذي يلزمه العبد مع الرب ، وبالقيم والموازين التي يزن بها المسلم الأشياء والأحداث والأشخاص . وقد رأينا نماذج من هذا في السور المكية السابقة ، وسنرى نماذج منه في هذا الجزء . والقرآن المدني يعالج - في الغالب - تطبيق تلك العقيدة وذاك التصور وهذه الموازين في الحياة الواقعية ؛ وحمل النفوس على الإضطلاع بأمانة العقيدة والشريعة في معترك الحياة ، والنهوض بتكاليفها في عالم الضمير وعالم الظاهر سواء . وقد رأينا نماذج من هذا في السور المدنية السابقة ومنها سور الجزء الماضي . وهذه السورة الأولى - سورة تبارك - تعالج إنشاء تصور جديد للوجود وعلاقاته بخا

---

{ٱلَّذِي خَلَقَ ٱلۡمَوۡتَ وَٱلۡحَيَوٰةَ لِيَبۡلُوَكُمۡ أَيُّكُمۡ أَحۡسَنُ عَمَلٗاۚ وَهُوَ ٱلۡعَزِيزُ ٱلۡغَفُورُ} (2) ( الذي خلق الموت والحياة ليبلوكم أيكم أحسن عملا ، وهو العزيز الغفور ) . . ومن آثار تمكنه المطلق من الملك وتصريفه له ، وآثار قدرته على كل شيء وطلاقة إرادته . . أنه خلق الموت والحياة . والموت يشمل الموت السابق على الحياة والموت اللاحق لها . والحياة تشمل الحياة الأولى والحياة الآخرة . وكلها من خلق الله كما تقرر هذه الآية ، التي تنشئ هذه الحقيقة في التصور الإنساني ؛ وتثير إلى جانبها اليقظة لما وراءها من قصد وابتلاء . فليست المسألة مصادفة بلا تدبير . وليست كذلك جزافا بلا غاية . إنما هو الإبتلاء لأظهار المكنون في علم الله من سلوك الأناسي على الأرض ، واستحقاقهم للجزاء على العمل : ( ليبلوكم أيكم أحسن عملا ) . . واستقرار هذه الحقيقة في الضمير يدعه أبدا يقظا حذرا متلفتا واعيا للصغيرة والكبيرة في النية المستسرة والعمل الظاهر . ولا يدعه يغفل أو يلهو . كذلك لا يدعه يطمئن أو يستريح . ومن ثم يجيء التعقيب : ( وهو العزيز الغفور ) ليسكب الطمأنينة في القلب الذي يرعى الله ويخشاه . فالله عزيز غالب ولكنه غفور مسامح . فإذا استيقظ القلب ، وشعر أنه هنا للإبتلاء والاختبار ، وحذر وتوقى ، فإن له أن يطمئن إلى غفران الله ورحمته وأن يقر عندها ويستريح ! إن الله في الحقيقة التي يصورها الإسلام لتستقر في القلوب ، لا يطارد البشر ، ولا يعنتهم ، ولا يحب أن يعذبهم . إنما يريد لهم أن يتيقظوا لغاية وجودهم ؛ وأن يرتفعوا إلى مستوى حقيقتهم ؛ وأن يحققوا تكريم الله لهم بنفخة روحه في هذا الكيان وتفضيله على كثير من خلقه . فإذا تم لهم هذا فهناك الرحمة السابغة والعون الكبير والسماحة الواسعة والعفو عن كثير .`;

var DILAL={"67:1":"- سيد قطب مقدمة السورة: سورة الملك مكية وآياتها ثلاثون هذا الجزء كله من السور المكية . كما كان الجزء الذي سبقه كله من السور المدنية . ولكل منهما طابع مميز ، وطعم خاص . . وبعض مطالع السور في هذا الجزء من بواكير ما نزل من القرآن كمطلع سورة \" المدثر \" ومطلع سورة \" المزمل \" . كما أن فيه سورا يحتمل أن تكون قد نزلت بعد البعثة بحوالي ثلاث سنوات كسورة \" القلم \" . وبحوالي عشر سنوات كسورة \" الجن \" التي يروى أنها نزلت في عودة رسول الله صلى الله عليه وسلم من الطائف ، حيث أوذي من ثقيف . ثم صرف الله إليه نفرا من الجن فاستمعوا إليه وهو يرتل القرآن ، مما حكته سورة الجن في هذا الجزء . وكانت هذه الرحلة بعد وفاة خديجة وأبي طالب قبيل الهجرة بعام أو عامين . وإن كانت هناك رواية أخرى هي الأرجح بأن السورة نزلت في أوائل البعثة . والقرآن المكي يعالج - في الغالب - إنشاء العقيدة . في الله وفي الوحي ، وفي اليوم الآخر . وإنشاء التصور المنبثق من هذه العقيدة لهذا الوجود وعلاقته بخالقه . والتعريف بالخالق تعريفا يجعل الشعور به حيا في القلب ، مؤثرا موجها موحيا بالمشاعر اللائقة بعبد يتجه إلى رب ، وبالأدب الذي يلزمه العبد مع الرب ، وبالقيم والموازين التي يزن بها المسلم الأشياء والأحداث والأشخاص . وقد رأينا نماذج من هذا في السور المكية السابقة ، وسنرى نماذج منه في هذا الجزء . والقرآن المدني يعالج - في الغالب - تطبيق تلك العقيدة وذاك التصور وهذه الموازين في الحياة الواقعية ؛ وحمل النفوس على الإضطلاع بأمانة العقيدة والشريعة في معترك الحياة ، والنهوض بتكاليفها في عالم الضمير وعالم الظاهر سواء . وقد رأينا نماذج من هذا في السور المدنية السابقة ومنها سور الجزء الماضي . وهذه السورة الأولى - سورة تبارك - تعالج إنشاء تصور","67:2":"- سيد قطب ( الذي خلق الموت والحياة ليبلوكم أيكم أحسن عملا ، وهو العزيز الغفور ) . . ومن آثار تمكنه المطلق من الملك وتصريفه له ، وآثار قدرته على كل شيء وطلاقة إرادته . . أنه خلق الموت والحياة . والموت يشمل الموت السابق على الحياة والموت اللاحق لها . والحياة تشمل الحياة الأولى والحياة الآخرة . وكلها من خلق الله كما تقرر هذه الآية ، التي تنشئ هذه الحقيقة في التصور الإنساني ؛ وتثير إلى جانبها اليقظة لما وراءها من قصد وابتلاء . فليست المسألة مصادفة بلا تدبير . وليست كذلك جزافا بلا غاية . إنما هو الإبتلاء لأظهار المكنون في علم الله من سلوك الأناسي على الأرض ، واستحقاقهم للجزاء على العمل : ( ليبلوكم أيكم أحسن عملا ) . . واستقرار هذه الحقيقة في الضمير يدعه أبدا يقظا حذرا متلفتا واعيا للصغيرة والكبيرة في النية المستسرة والعمل الظاهر . ولا يدعه يغفل أو يلهو . كذلك لا يدعه يطمئن أو يستريح . ومن ثم يجيء التعقيب : ( وهو العزيز الغفور ) ليسكب الطمأنينة في القلب الذي يرعى الله ويخشاه . فالله عزيز غالب ولكنه غفور مسامح . فإذا استيقظ القلب ، وشعر أنه هنا للإبتلاء والاختبار ، وحذر وتوقى ، فإن له أن يطمئن إلى غفران الله ورحمته وأن يقر عندها ويستريح ! إن الله في الحقيقة التي يصورها الإسلام لتستقر في القلوب ، لا يطارد البشر ، ولا يعنتهم ، ولا يحب أن يعذبهم . إنما يريد لهم أن يتيقظوا لغاية وجودهم ؛ وأن يرتفعوا إلى مستوى حقيقتهم ؛ وأن يحققوا تكريم الله لهم بنفخة روحه في هذا الكيان وتفضيله على كثير من خلقه . فإذا تم لهم هذا فهناك الرحمة السابغة والعون الكبير والسماحة الواسعة والعفو عن كثير . الآية السابقة الآية التالية المقارنة مع تفسير آخر × التفاسير تفاسير مختارة المنتخب في تفسير القرآن الكريم للم","67:3":"- سيد قطب ثم يربط هذه الحقيقة بالكون كله في أكبر وأرفع مجاليه ؛ كما يربط به من الناحية الأخرى حقيقة الجزاء في الآخرة ، بعد الابتلاء بالموت والحياة : الذي خلق سبع سماوات طباقا ، ما ترى في خلق الرحمن من تفاوت ، فارجع البصر هل ترى من فطور ? ثم ارجع البصر كرتين ينقلب إليك البصر خاسئا وهو حسير . ولقد زينا السماء الدنيا بمصابيح ، وجعلناها رجوما للشياطين ، واعتدنا لهم عذاب السعير . وللذين كفروا بربهم عذاب جهنم ، وبئس المصير . إذا ألقوا فيها سمعوا لها شهيقا وهي تفور . تكاد تميز من الغيظ ، كلما ألقي فيها فوج سألهم خزنتها : ألم يأتكم نذير ? قالوا : بلى ! قد جاءنا نذير فكذبنا وقلنا : ما نزل الله من شيء ، إن أنتم إلا في ضلال كبير . وقالوا : لو كنا نسمع أو نعقل ما كنا في أصحاب السعير . فاعترفوا بذنبهم فسحقا لأصحاب السعير ! . وكل ما في هذه الآيات آثار لمدلول الآية الأولى ، ومظاهر للهيمنة المتصرفة في الملك ، وللقدرة التي لا يقيدها قيد . ثم هي بعد ذلك تصديق للآية الثانية من خلق الموت والحياة للابتلاء ، ثم الجزاء . . والسماوات السبع الطباق التي تشير إليها الآية لا يمكن الجزم بمدلولها ، استقاء من نظريات الفلك ، فهذه النظريات قابلة للتعديل والتصحيح ، كلما تقدمت وسائل الرصد والكشف . ولا يجوز تعليق مدلول الآية بمثل هذه الكشوف القابلة للتعديل والتصحيح . ويكفي أن نعرف أن هناك سبع سماوات . وأنها طباق بمعنى أنها طبقات على أبعاد متفاوتة . والقرآن يوجه النظر إلى خلق الله ، في السماوات بصفة خاصة وفي كل ما خلق بصفة عامة . يوجه النظر إلى خلق الله ، وهو يتحدى بكماله كمالا يرد البصر عاجزا كليلا مبهورا مدهوشا . ( ما ترى في خلق الرحمن من تفاوت ) . . فليس هناك خلل ولا نقص ولا اضطراب . . ( فارجع البصر ) . . وان","67:4":"- سيد قطب ( ثم ارجع البصر كرتين ) فربما فاتك شيء في النظرة السابقة لم تتبينه ، فأعد النظر ثم أعده ( ينقلب إليك البصر خاسئا وهو حسير ) . . وأسلوب التحدي من شأنه أن يثير الاهتمام والجد في النظر إلى السماوات وإلى خلق الله كله . وهذه النظرة الحادة الفاحصة المتأملة المتدبرة هي التي يريد القرآن أن يثيرها وأن يبعثها . فبلادة الألفة تذهب بروعة النظرة إلى هذا الكون الرائع العجيب الجميل الدقيق ، الذي لا تشبع العين من تملي جماله وروعته ، ولا يشبع القلب من تلقي إيحاءاته وأيماءاته ؛ ولا يشبع العقل من تدبر نظامه ودقته . والذي يعيش منه من يتأمله بهذه العين في مهرجان إلهي باهر رائع ، لا تخلق بدائعه ، لأنها أبدا متجددة للعين والقلب والعقل . والذي يعرف شيئا عن طبيعة هذا الكون ونظامه - كما كشف العلم الحديث عن جوانب منها - يدركه الدهش والذهول . ولكن روعة الكون لا تحتاج إلى هذا العلم . فمن نعمة الله على البشر أن أودعهم القدرة على التجاوب مع هذا الكون بمجرد النظر والتأمل ؛ فالقلب يتلقى إيقاعات هذا الكون الهائل الجميل تلقيا مباشرا حين يتفتح ويستشرف . ثم يتجاوب مع هذه الإيقاعات تجاوب الحي مع الحي ؛ قبل أن يعلم بفكره وبأرصاده شيئا عن هذا الخلق الهائل العجيب . ومن ثم يكل القرآن الناس إلى النظر في هذا الكون ، وإلى تملي مشاهده وعجائبه . ذلك أن القرآن يخاطب الناس جميعا ، وفي كل عصر . يخاطب ساكن الغابة وساكن الصحراء ، كما يخاطب ساكن المدينة ورائد البحار . وهو يخاطب الأمي الذي لم يقرأ ولم يخط حرفا ، كما يخاطب العالم الفلكي والعالم الطبيعي والعالم النظري سواء . وكل واحد من هؤلاء يجد في القرآن ما يصله بهذا الكون ، وما يثير في قلبه التأمل والاستجابة والمتاع . الآية السابقة الآية التالية المقارنة مع تفسير آخر ","67:5":"- سيد قطب والجمال في تصميم هذا الكون مقصود كالكمال . بل إنهما اعتباران لحقيقة واحدة . فالكمال يبلغ درجة الجمال . ومن ثم يوجه القرآن النظر إلى جمال السماوات بعد أن وجه النظر إلى كمالها : ( ولقد زينا السماء الدنيا بمصابيح ) . . وما السماء الدنيا ? لعلها هي الأقرب إلى الأرض وسكانها المخاطبين بهذا القرآن . ولعل المصابيح المشار إليها هنا هي النجوم والكواكب الظاهرة للعين ، التي نراها حين ننظر إلى السماء . فذلك يتسق مع توجيه المخاطبين إلى النظر في السماء . وما كانوا يملكون إلا عيونهم ، وما تراه من أجرام مضيئة تزين السماء . ومشهد النجوم في السماء جميل . ما في هذا شك . جميل جمالا يأخذ بالقلوب . وهو جمال متجدد تتعدد ألوانه بتعدد أوقاته ؛ ويختلف من صباح إلى مساء ، ومن شروق إلى غروب ، ومن الليلة القمراء إلى الليلة الظلماء . ومن مشهد الصفاء إلى مشهد الضباب والسحاب . . بل إنه ليختلف من ساعة لساعة . ومن مرصد لمرصد . ومن زاوية لزاوية . . وكله جمال وكله يأخذ بالألباب . هذه النجمة الفريدة التي توصوص هناك ، وكأنها عين جميلة ، تلتمع بالمحبة والنداء ! وهاتان النجمتان المنفردتان هناك ، وقد خلصتا من الزحام تتناجيان ! وهذه المجموعات المتضامة المتناثرة هنا وهناك ، وكأنها في حلقة سمر في مهرجان السماء . وهي تجتمع وتفترق كأنها رفاق ليلة في مهرجان ! وهذا القمر الحالم الساهي ليلة . والزاهي المزهو ليلة . والمنكسر الخفيض ليلة . والوليد المتفتح للحياة ليلة . والفاني الذي يدلف للفناء ليلة . . ! وهذا الفضاء الوسيع الذي لا يمل البصر امتداده ، ولا يبلغ البصر آماده . إنه الجمال . الجمال الذي يملك الإنسان أن يعيشه ويتملاه ، ولكن لا يجد له وصفا فيما يملك من الألفاظ والعبارات ! والقرآن يوجه النفس إلى جمال السماء ، و","67:6":"- سيد قطب فالرجوم في الدنيا وعذاب السعير في الآخرة لأولئك الشياطين . ولعل مناسبة ذكر هذا ، الذي أعده الله للشياطين في الدنيا والآخرة هي ذكر السماء أولا ، ثم يجيء بعد من ذكر الذين كفروا . والعلاقة بين الشياطين والذين كفروا علاقة ملحوظة . فلما ذكر مصابيح السماء ذكر اتخاذها رجوما للشياطين . ولما ذكر ما أعد للشياطين من عذاب السعير ذكر بعده ما أعده للذين كفروا من أتباع هؤلاء الشياطين : ( وللذين كفروا بربهم عذاب جهنم وبئس المصير ) . . الآية السابقة الآية التالية المقارنة مع تفسير آخر × التفاسير تفاسير مختارة المنتخب في تفسير القرآن الكريم للمجلس الأعلى للشؤون الإسلامية (المنتخب) [حول التفسير] العنوان: المنتخب في تفسير القرآن الكريم. المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (البغوي) [حول التفسير] العنوان: معالم التنزيل للبغوي (ت 516هـ). المؤلف: الحسين بن مسعود بن محمد البغوي، المعروف بابن الفراء أو الفراء، ويلقب بمحيي السنة. حافظ محدث مفسر من فقهاء الشافعية، والبغوي نسبة إلى بَغَا من قرى خراسان. نبذة عن الكتاب: من أجلّ الكتب وأنبلها حاوٍ للصحيح من الأقوال , عارٍ عن الغموض والتكلف محلى بالأحاديث النبوية والآثار الغالب عليها الصحة . قال ابن تيمية رحمه الله: \"والبغوي تفسيرة مختصر من الثعلبي لكنه صان تفسيرة عن الأحاديث الموضوعة والآراء المبتدعة\" . وقد سئل رحمه الله عن أي التفاسير أ","67:7":"- سيد قطب ثم يرسم مشهدا لجهنم هذه ، وهي تستقبل الذين كفروا في غيظ وحنق شديد : ( إذا ألقوا فيها سمعوا لها شهيقا وهي تفور . تكاد تميز من الغيظ ! ) . . وجهنم هنا مخلوقة حية ، تكظم غيظها ، فترتفع أنفاسها في شهيق وتفور ؛ ويملأ جوانحها الغيظ فتكاد تتمزق من الغيظ الكظيم وهي تنطوي على بغض وكره يبلغ إلى حد الغيظ والحنق على الكافرين ! والتعبير في ظاهره يبدو مجازا تصويريا لحالة جهنم . ولكنه - فيما نحس - يقرر حقيقة . فكل خليقة من خلائق الله حية ذات روح من نوعها . وكل خليقة تعرف ربها وتسبح بحمده ؛ وتدهش حين ترى الإنسان يكفر بخالقه ، وتتغيظ لهذا الجحود المنكر الذي تنكره فطرتها وتنفر منه روحها . وهذه الحقيقة وردت في القرآن في مواضع شتى تشعر بأنها تقرر حقيقة مكنونة في كل شيء في هذا الوجود . فقد جاء بصريح العبارة في القرآن : ( تسبح له السماوات السبع والأرض ومن فيهن ، وإن من شيء إلا يسبح بحمده ، ولكن لا تفقهون تسبيحهم ) . . وورد كذلك : ( يا جبال أوبي معه والطير ) . . وهي تعبيرات صريحة مباشرة لا مجال فيها للتأويل . كذلك ورد ( ثم استوى إلى السماء وهي دخان فقال لها وللأرض : ائتيا طوعا أو كرها قالتا : أتينا طائعين ) . . مما يحتمل أن يقال فيه إنه مجاز تصويري لحقيقة خضوع السماء والأرض لناموس الله . ولكن هذا التأويل لا ضرورة له . بل هو أبعد من المعنى المباشر الصريح . ووردت صفة جهنم هذه . كما ورد في موضع آخر تعبير عن دهشة الكائنات وغيظها للشرك بربها : ( لقد جئتم شيئا إدا . تكاد السماوات يتفطرن منه وتنشق الأرض ، وتخر الجبال هدا ، أن دعوا للرحمن ولدا ، وما ينبغي للرحمن أن يتخذ ولدا ) . . وكل هذه النصوص تشير إلى حقيقة ، حقيقة إيمان الوجود كله بخالقه ، وتسبيح كل شيء بحمده . ودهشة الخلائق وارتياعها لشذوذ ا","67:8":"- سيد قطب ثم يرسم مشهدا لجهنم هذه ، وهي تستقبل الذين كفروا في غيظ وحنق شديد : ( إذا ألقوا فيها سمعوا لها شهيقا وهي تفور . تكاد تميز من الغيظ ! ) . . وجهنم هنا مخلوقة حية ، تكظم غيظها ، فترتفع أنفاسها في شهيق وتفور ؛ ويملأ جوانحها الغيظ فتكاد تتمزق من الغيظ الكظيم وهي تنطوي على بغض وكره يبلغ إلى حد الغيظ والحنق على الكافرين ! والتعبير في ظاهره يبدو مجازا تصويريا لحالة جهنم . ولكنه - فيما نحس - يقرر حقيقة . فكل خليقة من خلائق الله حية ذات روح من نوعها . وكل خليقة تعرف ربها وتسبح بحمده ؛ وتدهش حين ترى الإنسان يكفر بخالقه ، وتتغيظ لهذا الجحود المنكر الذي تنكره فطرتها وتنفر منه روحها . وهذه الحقيقة وردت في القرآن في مواضع شتى تشعر بأنها تقرر حقيقة مكنونة في كل شيء في هذا الوجود . فقد جاء بصريح العبارة في القرآن : ( تسبح له السماوات السبع والأرض ومن فيهن ، وإن من شيء إلا يسبح بحمده ، ولكن لا تفقهون تسبيحهم ) . . وورد كذلك : ( يا جبال أوبي معه والطير ) . . وهي تعبيرات صريحة مباشرة لا مجال فيها للتأويل . كذلك ورد ( ثم استوى إلى السماء وهي دخان فقال لها وللأرض : ائتيا طوعا أو كرها قالتا : أتينا طائعين ) . . مما يحتمل أن يقال فيه إنه مجاز تصويري لحقيقة خضوع السماء والأرض لناموس الله . ولكن هذا التأويل لا ضرورة له . بل هو أبعد من المعنى المباشر الصريح . ووردت صفة جهنم هذه . كما ورد في موضع آخر تعبير عن دهشة الكائنات وغيظها للشرك بربها : ( لقد جئتم شيئا إدا . تكاد السماوات يتفطرن منه وتنشق الأرض ، وتخر الجبال هدا ، أن دعوا للرحمن ولدا ، وما ينبغي للرحمن أن يتخذ ولدا ) . . وكل هذه النصوص تشير إلى حقيقة ، حقيقة إيمان الوجود كله بخالقه ، وتسبيح كل شيء بحمده . ودهشة الخلائق وارتياعها لشذوذ ا","67:9":"- سيد قطب والجواب في ذلة وانكسار واعتراف بالحمق والغفلة ، بعد التبجح والإنكار واتهام الرسل بالضلال : ( قالوا : بلى ! قد جاءنا نذير فكذبنا ، وقلنا : ما نزل الله من شيء . إن أنتم إلا في ضلال كبير . وقالوا : لو كنا نسمع أو نعقل ما كنا في أصحاب السعير ! ) . . فالذي يسمع أو يعقل ، لا يورد نفسه هذا المورد الوبيء . ولا يجحد بمثل ما جحد به أولئك المناكيد . ولا يسارع باتهام الرسل بالضلال على هذا النحو المتبجح الوقح ، الذي لا يستند في الإنكار إلى دليل . ثم ينكر ويدعي ذلك الادعاء العريض على رسل الله الصادقين يقول : ( ما نزل الله من شيء : إن أنتم إلا في ضلال كبير ) ! الآية السابقة الآية التالية المقارنة مع تفسير آخر × التفاسير تفاسير مختارة المنتخب في تفسير القرآن الكريم للمجلس الأعلى للشؤون الإسلامية (المنتخب) [حول التفسير] العنوان: المنتخب في تفسير القرآن الكريم. المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (البغوي) [حول التفسير] العنوان: معالم التنزيل للبغوي (ت 516هـ). المؤلف: الحسين بن مسعود بن محمد البغوي، المعروف بابن الفراء أو الفراء، ويلقب بمحيي السنة. حافظ محدث مفسر من فقهاء الشافعية، والبغوي نسبة إلى بَغَا من قرى خراسان. نبذة عن الكتاب: من أجلّ الكتب وأنبلها حاوٍ للصحيح من الأقوال , عارٍ عن الغموض والتكلف محلى بالأحاديث النبوية والآثار الغالب عليها الصحة . قال ابن تيمية رحمه ا","67:10":"- سيد قطب الآية السابقة الآية التالية المقارنة مع تفسير آخر × التفاسير تفاسير مختارة المنتخب في تفسير القرآن الكريم للمجلس الأعلى للشؤون الإسلامية (المنتخب) [حول التفسير] العنوان: المنتخب في تفسير القرآن الكريم. المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعق
