مسخها وشناعتها . فكل شيء روحه مؤمنة ، وكل شيء يسبح بحمد ربه ، وكل شيء فيه هذا الخير ، وفيه هذه الوشيجة التي تشده إلى محور الوجود . . ما عدا هذه النفوس الشاردة المفلتة من أواصر الوجود ، الآبدة الشريرة ، الجاسية الممسوخة النفور . فأي مكان في الوجود كله تنتهي إليه ، وهي مبتوتة الصلة بكل شيء في الوجود ? إنها تنتهي إلى جهنم المتغيظة المتلمظة ، الحارقة ، المهدرة لكل معنى ولكل حق ولكل كرامة ؛ بعد أن لم يعد لتلك النفوس معنى ولا حق ولا كرامة ! الآية السابقة الآية التالية المقارنة مع تفسير آخر × التفاسير تفاسير مختارة المنتخب في تفسير القرآن الكريم للمجلس الأعلى للشؤون الإسلامية (المنتخب) [حول التفسير] العنوان: المنتخب في تفسير القرآن ","67:12":"- سيد قطب والمألوف في سياق القرآن أن يعرض صفحتين متقابلتين في مشاهد القيامة . فهو يعرض هنا صفحة المؤمنين في مقابل صفحة الكافرين ، تتمة لمدلول الآية الثانية في السورة : ( ليبلوكم أيكم أحسن عملا ) . . بذكر الجزاء بعد ذكر الإبتلاء : ( إن الذين يخشون ربهم بالغيب ، لهم مغفرة وأجر كبير ) . . والغيب المشار إليه هنا يشمل خشيتهم لربهم الذي لم يروه ، كما يشمل خشيتهم لربهم وهم في خفية عن الأعين ، وكلاهما معنى كبير ، وشعور نظيف ، وإدراك بصير . يؤهل لهذا الجزاء العظيم الذي يذكره السياق في إجمال : وهو المغفرة والتكفير ، والأجر الكبير . ووصل القلب بالله في السر والخفية ، وبالغيب الذي لا تطلع عليه العيون ، هو ميزان الحساسية في القلب البشري وضمانة الحياة للضمير . . قال الحافظ أبو بكر البزار في مسنده : حدثنا طالوت بن عباد ، حدثنا الحارث بن عبيد ، عن ثابت ، عن أنس ، قال : قالوا : يا رسول الله إنا نكون عندك على حال ، فإذا فارقناك كنا على غيره . قال : \" كيف أنتم وربكم ? \" قالوا : الله ربنا في السر والعلانية . قال : \" ليس ذلكم النفاق \" . . فالصلة بالله هي الأصل . فمتى انعقدت في القلب فهو مؤمن صادق موصول . الآية السابقة الآية التالية المقارنة مع تفسير آخر × التفاسير تفاسير مختارة المنتخب في تفسير القرآن الكريم للمجلس الأعلى للشؤون الإسلامية (المنتخب) [حول التفسير] العنوان: المنتخب في تفسير القرآن الكريم. المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح","67:13":"- سيد قطب وهذه الآية السابقة تربط ما قبلها في السياق بما بعدها ، في تقرير علم الله بالسر والجهر ، وهو يتحدى البشر . وهو الذي خلق نفوسهم ، ويعلم مداخلها ومكامنها ، التي أودعها إياها : وأسروا قولكم أو اجهروا به ، أنه عليم بذات الصدور . ألا يعلم من خلق وهو اللطيف الخبير ? . أسروا أو اجهروا فهو مكشوف لعلم الله سواء . وهو يعلم ما هو أخفى من الجهر والسر . ( إنه عليم بذات الصدور ) التي لم تفارق الصدور ! عليم بها ، فهو الذي خلقها في الصدور ، كما خلق الصدور ! /خ14 الآية السابقة الآية التالية المقارنة مع تفسير آخر × التفاسير تفاسير مختارة المنتخب في تفسير القرآن الكريم للمجلس الأعلى للشؤون الإسلامية (المنتخب) [حول التفسير] العنوان: المنتخب في تفسير القرآن الكريم. المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (البغوي) [حول التفسير] العنوان: معالم التنزيل للبغوي (ت 516هـ). المؤلف: الحسين بن مسعود بن محمد البغوي، المعروف بابن الفراء أو الفراء، ويلقب بمحيي السنة. حافظ محدث مفسر من فقهاء الشافعية، والبغوي نسبة إلى بَغَا من قرى خراسان. نبذة عن الكتاب: من أجلّ الكتب وأنبلها حاوٍ للصحيح من الأقوال , عارٍ عن الغموض والتكلف محلى بالأحاديث النبوية والآثار الغالب عليها الصحة . قال ابن تيمية رحمه الله: \"والبغوي تفسيرة مختصر من الثعلبي لكنه صان تفسيرة عن الأحاديث المو","67:14":"- سيد قطب ( ألا يعلم من خلق ? ) ألا يعلم وهو الذي خلق ? ( وهو اللطيف الخبير ? ) الذي يصل علمه إلى الدقيق الصغير والخفي المستور . /خ14 الآية السابقة الآية التالية المقارنة مع تفسير آخر × التفاسير تفاسير مختارة المنتخب في تفسير القرآن الكريم للمجلس الأعلى للشؤون الإسلامية (المنتخب) [حول التفسير] العنوان: المنتخب في تفسير القرآن الكريم. المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (البغوي) [حول التفسير] العنوان: معالم التنزيل للبغوي (ت 516هـ). المؤلف: الحسين بن مسعود بن محمد البغوي، المعروف بابن الفراء أو الفراء، ويلقب بمحيي السنة. حافظ محدث مفسر من فقهاء الشافعية، والبغوي نسبة إلى بَغَا من قرى خراسان. نبذة عن الكتاب: من أجلّ الكتب وأنبلها حاوٍ للصحيح من الأقوال , عارٍ عن الغموض والتكلف محلى بالأحاديث النبوية والآثار الغالب عليها الصحة . قال ابن تيمية رحمه الله: \"والبغوي تفسيرة مختصر من الثعلبي لكنه صان تفسيرة عن الأحاديث الموضوعة والآراء المبتدعة\" . وقد سئل رحمه الله عن أي التفاسير أقرب إلى الكتاب والسنة ؟ الزمخشري أم القرطبي أم البغوي ؟ أو غير هؤلاء ؟ فأجاب : وأما التفاسير الثلاثة المسؤول عنها فأسلمها من البدعة والأحاديث الضعيفة - البغوي . تصفح التفسير تيسير الكريم المنان في تفسير القرآن لابن سعدي (ابن سعدي) [حول التفسير] العنوان: تيسير الكريم الرحمن في تفسير كلام المنان للسع","67:15":"- سيد قطب ثم ينتقل بهم السياق من ذوات أنفسهم التي خلقها الله ، إلى الأرض التي خلقها لهم ، وذللها وأودعها أسباب الحياة : ( هو الذي جعل لكم الأرض ذلولا ، فامشوا في مناكبها وكلوا من رزقه ، وإليه النشور ) . . والناس لطول ألفتهم لحياتهم على هذه الأرض ؛ وسهولة استقرارهم عليها ، وسيرهم فيها ، واستغلالهم لتربتها ومائها وهوائها وكنوزها وقواها وأرزاقها جميعا . . ينسون نعمة الله في تذليلها لهم وتسخيرها . والقرآن يذكرهم هذه النعمة الهائلة ، ويبصرهم بها ، في هذا التعبير الذي يدرك منه كل أحد وكل جيل بقدر ما ينكشف له من علم هذه الأرض الذلول . والأرض الذلول كانت تعني في أذهان المخاطبين القدامى ، هذه الأرض المذللة للسير فيها بالقدم وعلى الدابة ، وبالفلك التي تمخر البحار . والمذللة للزرع والجني والحصاد . والمذللة للحياة فيها بما تحويه من هواء وماء وتربة تصلح للزرع والإنبات . وهي مدلولات مجملة يفصلها العلم - فيما اهتدى إليه حتى اليوم - تفصيلا يمد في مساحة النص القرآني في الإدراك . فمما يقوله العلم في مدلول الأرض الذلول : إن هذا الوصف : ( ذلولا ) . . الذي يطلق عادة على الدابة ، مقصود في إطلاقه على الأرض ! فالأرض هذه التي نراها ثابتة مستقرة ساكنة ، هي دابة متحركة . . بل رامحة راكضة مهطعة ! ! وهي في الوقت ذاته ذلول لا تلقي براكبها على ظهرها ، ولا تتعثر خطاها ، ولا تخضه وتهزه وترهقه كالدابة غير الذلول ! ثم هي دابة حلوب مثلما هي ذلول ! إن هذه الدابة التي نركبها تدور حول نفسها بسرعة ألف ميل في الساعة ، ثم تدور مع هذا حول الشمس بسرعة حوالي خمسة وستين ألف ميل في الساعة . ثم تركض هي والشمس والمجموعة الشمسية كلها","67:16":"- سيد قطب والآن - وبينما هم في هذا الأمان على ظهر الأرض الذلول ، وفي هذا اليسر الفائض بإذن الله وأمره . . الآن يهز هذه الأرض الساكنة من تحت أقدامهم هزا ويرجها رجا فإذا هي تمور . ويثير الجو من حولهم فإذا هو حاصب يضرب الوجوه والصدور . . يهز هذه الأرض في حسهم ويثير هذا الحاصب في تصورهم ، لينتبهوا من غفلة الأمان والقرار ، ويمدوا بأبصارهم إلى السماء وإلى الغيب ، ويعلقوا قلوبهم بقدر الله : ( أأمنتم من في السماء أن يخسف بكم الأرض فإذا هي تمور ? أم أمنتم من في السماء أن يرسل عليكم حاصبا ? فستعلمون كيف نذير ! ولقد كذب الذين من قبلهم . فكيف كان نكير ? ) . . والبشر الذين يعيشون على ظهر هذه الدابة الذلول ، ويحلبونها فينالون من رزق الله فيها نصيبهم المعلوم ! يعرفون كيف تتحول إلى دابة غير ذلول ولا حلوب ، في بعض الأحيان ، عندما يأذن الله بأن تضطرب قليلا فيرتج كل شيء فوق ظهرها أو يتحطم ! ويمور كل ما عليها ويضطرب فلا تمسكه قوة ولا حيلة . ذلك عند الزلازل والبراكين ، التي تكشف عن الوحش الجامح ، الكامن في الدابة الذلول ، التي يمسك الله بزمامها فلا تثور إلا بقدر ، ولا تجمح إلا ثواني معدودات يتحطم فيها كل ما شيد الإنسان على ظهرها ؛ أو يغوص في جوفها عندما تفتح أحد أفواهها وتخسف كسفه منها . . وهي تمور . . البشر ولا يملكون من هذا الأمر شيئا ولا يستطيعون . وهم يبدون في هول الزلزال والبركان والخسف كالفئران الصغيرة محصورة في قفص الرعب ، من حيث كانت آمنة لاهية غافلة عن القدرة الكبرى الممسكة بالزمام ! والبشر كذلك يشهدون العواصف الجامحة الحاصبة التي تدمر وتخرب ، وتحرق وتصعق . وهم بإزائها ضعاف عاجزون ، بكل ما يعلمون وما يعملون . والعاصفة حين تزأر وتضرب ب","67:17":"- سيد قطب والآن - وبينما هم في هذا الأمان على ظهر الأرض الذلول ، وفي هذا اليسر الفائض بإذن الله وأمره . . الآن يهز هذه الأرض الساكنة من تحت أقدامهم هزا ويرجها رجا فإذا هي تمور . ويثير الجو من حولهم فإذا هو حاصب يضرب الوجوه والصدور . . يهز هذه الأرض في حسهم ويثير هذا الحاصب في تصورهم ، لينتبهوا من غفلة الأمان والقرار ، ويمدوا بأبصارهم إلى السماء وإلى الغيب ، ويعلقوا قلوبهم بقدر الله : ( أأمنتم من في السماء أن يخسف بكم الأرض فإذا هي تمور ? أم أمنتم من في السماء أن يرسل عليكم حاصبا ? فستعلمون كيف نذير ! ولقد كذب الذين من قبلهم . فكيف كان نكير ? ) . . والبشر الذين يعيشون على ظهر هذه الدابة الذلول ، ويحلبونها فينالون من رزق الله فيها نصيبهم المعلوم ! يعرفون كيف تتحول إلى دابة غير ذلول ولا حلوب ، في بعض الأحيان ، عندما يأذن الله بأن تضطرب قليلا فيرتج كل شيء فوق ظهرها أو يتحطم ! ويمور كل ما عليها ويضطرب فلا تمسكه قوة ولا حيلة . ذلك عند الزلازل والبراكين ، التي تكشف عن الوحش الجامح ، الكامن في الدابة الذلول ، التي يمسك الله بزمامها فلا تثور إلا بقدر ، ولا تجمح إلا ثواني معدودات يتحطم فيها كل ما شيد الإنسان على ظهرها ؛ أو يغوص في جوفها عندما تفتح أحد أفواهها وتخسف كسفه منها . . وهي تمور . . البشر ولا يملكون من هذا الأمر شيئا ولا يستطيعون . وهم يبدون في هول الزلزال والبركان والخسف كالفئران الصغيرة محصورة في قفص الرعب ، من حيث كانت آمنة لاهية غافلة عن القدرة الكبرى الممسكة بالزمام ! والبشر كذلك يشهدون العواصف الجامحة الحاصبة التي تدمر وتخرب ، وتحرق وتصعق . وهم بإزائها ضعاف عاجزون ، بكل ما يعلمون وما يعملون . والعاصفة","67:18":"- سيد قطب ويضرب لهم الأمثلة من واقع البشرية ، ومن وقائع الغابرين المكذبين : ( ولقد كذب الذين من قبلهم ، فكيف كان نكير ? ) . . والنكير الإنكار وما يتبعه من الآثار ، ولقد أنكر الله ممن كذبوا قبلهم أن يكذبوا . وهو يسألهم : ( فكيف كان نكير ? ) وهم يعلمون كيف كان ، فقد كانت آثار الدمار والخراب تصف لهم كيف كان هذا النكير ! وكيف كان ما أعقبه من تدمير ! والأمان الذي ينكره الله على الناس ، هو الأمان الذي يوحي بالغفلة عن الله وقدرته وقدره ، وليس هو الاطمئنان إلى الله ورعايته ورحمته . فهذا غير ذاك . فالمؤمن يطمئن إلى ربه ، ويرجو رحمته وفضله . ولكن هذا لا يقوده إلى الغفلة والنسيان والانغمار في غمرة الأرض ومتاعها ، إنما يدعوه إلى التطلع الدائم ، والحياء من الله ، والحذر من غضبه ، والتوقي من المخبوء في قدره ، مع الإخبات والاطمئنان . قال الإمام أحمد - بإسناده - عن عائشة - رضي الله عنها - أنها قالت : \" ما رأيت رسول الله [ صلى الله عليه وسلم ] مستجمعا ضاحكا حتى أرى منه لهواته . إنما كان يبتسم . وقالت : كان رسول الله [ صلى الله عليه وسلم ] إذا رأى غيما أو ريحا عرف ذلك في وجهه . قالت : يا رسول الله إن الناس إذا رأوا الغيم فرحوا رجاء أن يكون فيه المطر ، وأراك إذا رأيته عرفت في وجهك الكراهية . فقال رسول الله - صلى الله عليه وعلى آله وسلم - : \" يا عائشة ما يؤمنني أن يكون فيه عذاب ? قد عذب قوم بالريح . وقد رأى قوم العذاب وقالوا ، هذا عارض ممطرنا \" فهذا هو الإحساس اليقظ الدائم بالله وقدره ، وبما قصه القرآن من هذا في سيره . وهو لا ينافي الاطمئنان إلى رحمة الله وتوقع فضله . ثم هو إرجاع جميع الأسباب الظاهرة إلى السبب الأول . ورد الأمر بحاله وكليته إلى من بيده الملك وهو على كل","67:19":"- سيد قطب بعدئذ ينتقل بهم من لمسة التهديد والنذير ، إلى لمسة التأمل والتفكير . في مشهد يرونه كثيرا ، ولا يتدبرونه إلا قليلا . وهو مظهر من مظاهر القدرة ، وأثر من آثار التدبير الإلهي اللطيف . ( أولم يروا إلى الطير فوقهم صافات ويقبضن ? ما يمسكهن إلا الرحمن ، إنه بكل شيء بصير ) . . وهذه الخارقة التي تقع في كل لحظة ، تنسينا بوقوعها المتكرر ، ما تشي به من القدرة والعظمة . ولكن تأمل هذا الطير ، وهو يصف جناحيه ويفردهما ، ثم يقبضهما ويضمهما ، وهو في الحالين : حالة الصف الغالبة ، وحالة القبض العارضة يظل في الهواء ، يسبح فيه سباحة في يسر وسهولة ؛ ويأتي بحركات يخيل إلى الناظر أحيانا أنها حركات استعراضية لجمال التحليق والانقضاض والارتفاع ! تأمل هذا المشهد ، ومتابعة كل نوع من الطير في حركاته الخاصة بنوعه ، لا يمله النظر ، ولا يمله القلب . وهو متعة فوق ما هو مثار تفكير وتدبر في صنع الله البديع ، الذي يتعانق فيه الكمال والجمال ! والقرآن يشير بالنظر إلى هذا المشهد المثير : ( أولم يروا إلى الطير فوقهم صافات ويقبضن ? ) . . ثم يوحي بما وراءه من التدبير والتقدير : ( ما يمسكهن إلا الرحمن ) . . والرحمن يمسكهن بنواميس الوجود المتناسقة ذلك التناسق العجيب ، الملحوظ فيه كل صغيرة وكبيرة ، المحسوب فيه حساب الخلية والذرة . . النواميس التي تكفل توافر آلاف الموافقات في الأرض والجو وخلقة الطير ، لتتم هذه الخارقة وتتكرر ، وتظل تتكرر بانتظام . والرحمن يمسكهن بقدرته القادرة التي لا تكل ، وعنايته الحاضرة التي لا تغيب . وهي التي تحفظ هذه النواميس أبدا في عمل وفي تناسق وفي انتظام . فلا تفتر ولا تختل ولا","67:20":"- سيد قطب ثم يلمس قلوبهم لمسة أخرى تعود بهم إلى مشهد البأس والفزع من الخسف والحاصب ، بعد أن جال بهم هذه الجولة مع الطير السابح الآمن . فيردد قلوبهم بين شتى اللمسات عودا وبدءا كما يعلم الله من أثر هذا الترداد في قلوب العباد : ( أم من هذا الذي هو جند لكم ينصركم من دون الرحمن ? إن الكافرون إلا في غرور ) . . وقد خوفهم الخسف وخوفهم الحاصب ، وذكرهم مصائر الغابرين الذين أنكر الله عليهم فأصابهم التدمير . فهو يعود ليسألهم : من هو هذا الذي ينصرهم ويحميهم من الله ، غير الله ? من هو هذا الذي يدفع عنهم بأس الرحمن إلا الرحمن ? ( إن الكافرون إلا في غرور ) . . غرور يهيئ لهم أنهم في أمن وفي حماية وفي اطمئنان ، وهم يتعرضون لغضب الرحمن وبأس الرحمن ، بلا شفاعة لهم من إيمان ولا عمل يستنزل رحمة الرحمن . الآية السابقة الآية التالية المقارنة مع تفسير آخر × التفاسير تفاسير مختارة المنتخب في تفسير القرآن الكريم للمجلس الأعلى للشؤون الإسلامية (المنتخب) [حول التفسير] العنوان: المنتخب في تفسير القرآن الكريم. المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (البغوي) [حول التفسير] العنوان: معالم التنزيل للبغوي (ت 516هـ). المؤلف: الحسين بن مسعود بن محمد البغوي، المعروف بابن الفراء أو الفراء، ويلقب بمحيي السنة. حافظ محدث مفسر من فقهاء الشافعية، والبغوي","67:21":"- سيد قطب ولمسة أخرى في الرزق الذي يستمتعون به ، وينسون مصدره ، ثم لا يخشون ذهابه ، ثم يلجون في التبجح والإعراض : ( أم من هذا الذي يرزقكم إن أمسك رزقه ? بل لجوا في عتو ونفور ) . . ورزق البشر كله - كما سلف - معقود بإرادة الله في أول أسبابه ، في تصميم هذا الكون وفي عناصر الأرض والجو وهي أسباب لا قدرة للبشر عليها إطلاقا ، ولا تتعلق بعملهم بتاتا . فهي أسبق منهم في الوجود ، وهي أكبر منهم في الطاقة ، وهي أقدر منهم على محو كل أثر للحياة حين يشاء الله . فمن يرزق البشر إن أمسك الماء ، أو أمسك الهواء ، أو أمسك العناصر الأولى التي منها ينشأ وجود الأشياء ? إن مدلول الرزق أوسع مدى وأقدم عهدا وأعمق جذورا مما يتبادر إلى الذهن عندما يسمع هذه الكلمة . ومرد كل صغيرة وكبيرة فيه إلى قدرة الله وقدره ، وإرساله للأسباب وإمساكها حين يشاء . وفي هذا المدلول الكبير الواسع العميق تنطوي سائر المدلولات القريبة لكلمة الرزق ، مما يتوهم الإنسان أنها من كسبه وفي طوقه ، كالعمل ، والإبداع ، والإنتاج . . وكلها مرتبطة بقيام الأسباب والعناصر الأولى من جهة ومتوقفة على هبة الله للأفراد والأمم من جهة أخرى . فأي نفس يتنفسه العامل ، وأي حركة يتحركها ، إلا من رزق الله ، الذي أنشأه ، ومنحه المقدرة والطاقة ، وخلق له النفس الذي يتنفسه ، والمادة التي تحترق في جسده فتمنحه القدرة على الحركة ? وأي جهد عقلي يبذله مخترع إلا وهو من رزق الله الذي منحه القدرة على التفكير والإبداع ? وأي إنتاج ينتجه عامل أو مبدع إلا في مادة هي من صنع الله ابتداء ، وإلا بأسباب كونية وإنسانية هي من رزق الله أصلا ? . . ( أم من هذا الذي يرزقكم إن أمسك رزقه ? ! ) . . ( بل لجوا في عتو ونفور ) . و","67:22":"- سيد قطب ولقد كانوا - مع هذا - يتهمون النبي [ صلى الله عليه وسلم ] ومن معه بالضلال ؛ ويزعمون لأنفسهم أنهم أهدى سبيلا ! كما يصنع أمثالهم مع الدعاة إلى الله في كل زمان . ومن ثم يصور لهم واقع حالهم وحال المؤمنين في مشهد حي يجسم حقيقة الحال : ( أفمن يمشي مكبا على وجهه أهدى ? أم من يمشي سويا على صراط مستقيم ? ) . . والذي يمشي مكبا على وجهه إما أن يكون هو الذي يمشي على وجهه فعلا لا على رجليه في استقامة كما خلقه الله ، وإما أن يكون هو الذي يعثر في طريقه فينكب على وجهه ، ثم ينهض ليعثر من جديد ! وهذه كتلك حال بائسة تعاني المشقة والعسر والتعثر ، ولا تنتهي إلى هدى ولا خير ولا وصول ! وأين هي من حال الذي يمشي مستقيما سويا في طريق لا عوج فيه ولا عثرات ، وهدفه أمامه واضح مرسوم ? ! إن الحال الأولى هي حال الشقي المنكود الضال عن طريق الله ، المحروم من هداه ، الذي يصطدم بنواميسه ومخلوقاته ، لأنه يعترضها في سيره ، ويتخذ له مسارا غير مسارها ، وطريقا غير طريقها ، فهو أبدا في تعثر ، وأبدا في عناء ، وأبدا في ضلال . والحال الثانية هي حال السعيد المجدود المهتدي إلى الله ، الممتع بهداه ، الذي يسير وفق نواميسه في الطريق اللاحب المعمور ، الذي يسلكه موكب الإيمان والحمد والتمجيد . وهو موكب هذا الوجود كله بما فيه من أحياء وأشياء . إن حياة الإيمان هي اليسر والاستقامة والقصد . وحياة الكفر هي العسر والتعثر والضلال . . فأيهما أهدى ? وهل الأمر في حاجة إلى جواب ? إنما هو سؤال التقرير والإيجاب ! ويتوارى السؤال والجواب ليتراءى للقلب هذا المشهد الحي الشاخص المتحرك . . مشهد جماعة يمشون على وجوههم ، أو يتعثرون وينكبون على وجوههم لا هدف لهم ولا طر","67:23":"- سيد قطب وعلى ذكر الهدى والضلال ، يذكرهم بما وهبهم الله من وسائل الهدى ، وأدوات الإدراك ثم لم ينتفعوا بها ، ولم يكونوا من الشاكرين : ( قل : هو الذي أنشأكم ، وجعل لكم السمع والأبصار والأفئدة ، قليلا ما تشكرون ) . . وحقيقة أن الله هو الذي أنشأ الإنسان ، حقيقة تلح على العقل البشري ، وتثبت ذاتها بتوكيد يصعب رده . فالإنسان قد وجد - وهو أرفع وأعلم وأقدر ما يعلم من الخلائق - وهو لم يوجد نفسه ، فلا بد أن يكون هناك من هو أرفع وأعلم وأقدر منه أوجده . . ولا مفر من الاعتراف بخالق . فوجود الإنسان ذاته يواجهه بهذه الحقيقة . والمماراة فيها نوع من المماحكة لا يستحق الاحترام . والقرآن يذكر هذه الحقيقة هنا ليذكر بجانبها ما زود الله به الإنسان من وسائل المعرفة . . ( وجعل لكم السمع والأبصار والأفئدة ) . . وما قابل الإنسان به هذه النعمة : نعمة الإنشاء ونعمة السمع والأبصار والأفئدة : ( قليلا ما تشكرون ) . . والسمع والأبصار معجزتان كبيرتان عرف عنهما بعض خواصهما العجيبة . والأفئدة التي يعبر بها القرآن عن قوة الإدراك والمعرفة ، معجزة أعجب وأغرب . ولم يعرف بعد عنها إلا القليل . وهي سر الله في هذا المخلوق الفريد . . وللعلم الحديث محاولات في معرفة شيء عن معجزتي السمع والبصر نذكر منها لمحة : \" تبدأ حاسة السمع بالأذن الخارجية ، ولا يعلم الا الله أين تنتهي . ويقول العلم : إن الاهتزاز الذي يحدثه الصوت في الهواء ينقل إلى الأذن ، التي تنظم دخوله ، ليقع على طبلة الأذن . وهذه تنقلها إلى التيه داخل الأذن . \" والتيه يشتمل على نوع من الأقنية بين لولبية ونصف مستديرة . وفي القسم اللولبي وحده أربعة آلاف قوس صغيرة متصلة بعصب السمع في الرأس .","67:24":"- سيد قطب ثم يذكرهم أن الله لم ينشئ البشر ويمنحهم هذه الخصائص عبثا ولا جزافا لغير قصد ولا غاية . إنما هي فرصة الحياة للابتلاء . ثم الجزاء في يوم الجزاء : ( قل : هو الذي ذرأكم في الأرض وإليه تحشرون ) . . والذرء : الإكثار . ويحمل كذلك معنى الانتشار . والحشر : الجمع بعد النشر في الأرجاء . وهما حركتان متقابلتان من الناحية التصورية ، تقابلهما من الناحية المعنوية . ذلك مشهد للإكثار من الخلق ونشرهم أو نثرهم في الأرض . وهذا مشهد لجمعهم منها وحشرهم بعد النشر والنثر ! ويجمعهما السياق في آية واحدة ، ليتقابل المشهدان في الحس والتصور على طريقة القرآن . وليتذكر البشر وهم منتشرون في الأرض أن هناك غاية هم صائرون إليها ، هي الجمع والحشر . وأن هناك أمرا وراء هذا ، ووراء الابتلاء بالموت والحياة . الآية السابقة الآية التالية المقارنة مع تفسير آخر × التفاسير تفاسير مختارة المنتخب في تفسير القرآن الكريم للمجلس الأعلى للشؤون الإسلامية (المنتخب) [حول التفسير] العنوان: المنتخب في تفسير القرآن الكريم. المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (البغوي) [حول التفسير] العنوان: معالم التنزيل للبغوي (ت 516هـ). المؤلف: الحسين بن مسعود بن محمد البغوي، المعروف بابن الفراء أو الفراء، ويلقب بمحيي السنة. حافظ محدث مفسر من فقهاء الشافعية، والبغوي نسبة إلى بَغَا من قرى خراسان. نبذة عن الكتاب: من","67:25":"- سيد قطب ثم يحكي شكهم في هذا الحشر ، وارتيابهم في هذا الوعد : ( ويقولون متى هذا الوعد إن كنتم صادقين ? ) . . وهو سؤال الشاك المستريب . كما أنه سؤال المماحك المتعنت . فإن معرفة موعد هذا الوعد وميقاته لا تقدم ولا تؤخر ؛ ولا علاقة لها بحقيقته ، وهو أنه يوم الجزاء بعد الابتلاء . ويستوي بالقياس إليهم أن يجيء غدا أو أن يجيء بعد ملايين السنين . . فالمهم أنه آت ، وأنهم محشورون فيه ، وأنهم مجازون بما عملوا في الحياة . ومن ثم لم يطلع الله أحدا من خلقه على موعده ، لأنه لا مصلحة لهم في معرفته ، ولا علاقة لهذا بطبيعة هذا اليوم وحقيقته ، ولا أثر له في التكاليف التي يطالب الناس بها استعدادا لملاقاته ، بل المصلحة والحكمة في إخفاء ميقاته عن الخلق كافة ، واختصاص الله بعلم ذلك الموعد ، دون الخلق جميعا : الآية السابقة الآية التالية المقارنة مع تفسير آخر × التفاسير تفاسير مختارة المنتخب في تفسير القرآن الكريم للمجلس الأعلى للشؤون الإسلامية (المنتخب) [حول التفسير] العنوان: المنتخب في تفسير القرآن الكريم. المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (البغوي) [حول التفسير] العنوان: معالم التنزيل للبغوي (ت 516هـ). المؤلف: الحسين بن مسعود بن محمد البغوي، المعروف بابن الفراء أو الفراء، ويلقب بمحيي السنة. حافظ محدث مفسر من فقهاء الشافعية، والبغوي نسبة إلى بَغَا من قرى خراسان. نبذة عن الكتاب","67:26":"- سيد قطب ( قل إنما العلم عند الله ، وإنما أنا نذير مبين ) . وهنا يبرز بجلاء فارق ما بين الخالق والمخاليق . وتتجرد ذات الله ووحدانيته بلا شبيه ولا شريك . ويتمحض العلم له سبحانه . ويقف الخلق - بما فيهم الرسل والملائكة - في مقامهم متأدبين عند مقام الألوهية العظيم : ( قل : إنما العلم عند الله . وإنما أنا نذير مبين ) . . وظيفتي الإنذار ، ومهمتي البيان . أما العلم فعند صاحب العلم الواحد بلا شريك . الآية السابقة الآية التالية المقارنة مع تفسير آخر × التفاسير تفاسير مختارة المنتخب في تفسير القرآن الكريم للمجلس الأعلى للشؤون الإسلامية (المنتخب) [حول التفسير] العنوان: المنتخب في تفسير القرآن الكريم. المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (البغوي) [حول التفسير] العنوان: معالم التنزيل للبغوي (ت 516هـ). المؤلف: الحسين بن مسعود بن محمد البغوي، المعروف بابن الفراء أو الفراء، ويلقب بمحيي السنة. حافظ محدث مفسر من فقهاء الشافعية، والبغوي نسبة إلى بَغَا من قرى خراسان. نبذة عن الكتاب: من أجلّ الكتب وأنبلها حاوٍ للصحيح من الأقوال , عارٍ عن الغموض والتكلف محلى بالأحاديث النبوية والآثار الغالب عليها الصحة . قال ابن تيمية رحمه الله: \"والبغوي تفسيرة مختصر من الثعلبي لكنه صان تفسيرة عن الأحاديث الموضوعة والآراء المبتدعة\" . وقد سئل رحمه الله عن أي التفاسير أقرب إلى الكتاب والس","67:27":"- سيد قطب وبينما هم يسألون في شك ويجابون في جزم ، يخيل السياق القرآني كأن هذا اليوم الذي يسألون عنه قد جاء ، والموعد الذي يشكون فيه قد حان ؛ وكأنما هم واجهوه الآن . فكان فيه ما كان : ( فلما رأوه زلفة سيئت وجوه الذين كفروا ، وقيل : هذا الذي كنتم به تدعون ) ! فقد رأوه قريبا مواجها لهم حاضرا أمامهم دون توقع ودون تمهيد . فسيئت وجوههم ، وبدا فيها الاستياء . ووجه إليهم التأنيب : ( وقيل : هذا الذي كنتم به تدعون ) . . هذا هو حاضرا قريبا . وهو الذي كنتم تدعون أنه لن يكون ! وهذه الطريقة في عرض ما سيكون تتكرر في القرآن ، لمواجهة حالة التكذيب أو الشك بمفاجأة شعورية تصويرية تقف المكذب أو الشاك وجها لوجه مع مشهد حاضر لما يكذب به أو يشك فيه . ثم هي في الوقت ذاته تصور حقيقة . فهذا اليوم كائن في علم الله ؛ أما خط الزمن بينه وبين البشر فهو قائم بالقياس إلى البشر . وهي مسألة نسبية لا تمثل الحقيقة المجردة كما هي في حساب الله . ولو أذن الله لرأوه اللحظة كما هو في علم الله . فهذا الانتقال المفاجئ لهم من الدنيا إلى الآخرة ، ومن موقف الشك والارتياب إلى موقف المواجهة والمفاجأة ، يشير إلى حقيقة قائمة لو أذن الله بها لانكشفت لهم . في الوقت الذي يصور لهم هذه الحقيقة تصويرا يهز مشاعرهم . الآية السابقة الآية التالية المقارنة مع تفسير آخر × التفاسير تفاسير مختارة المنتخب في تفسير القرآن الكريم للمجلس الأعلى للشؤون الإسلامية (المنتخب) [حول التفسير] العنوان: المنتخب في تفسير القرآن الكريم. المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمه","67:28":"- سيد قطب ولقد كانوا يتربصون بالنبي [ صلى الله عليه وسلم ] والحفنة المؤمنة التي معه أن يهلكوا فيستريحوا منهم ؛ وكانوا يتواصون بينهم بالصبر عليه حتى يوافيه الأجل ، فتسكن هذه الزوبعة التي أثارتها الدعوة في صفوفهم . كما كانوا يتبجحون أحيانا فيزعمون أن الله سيهلك محمدا ومن معه لأنهم ضالون ، ولأنهم يكذبون على الله فيما يقولون ! فهنا أمام مشهد الحشر والجزاء ، ينبههم إلى أن أمنيتهم حتى لو تحققت لا تعصمهم هم من عاقبة الكفر والضلال . فأولى لهم أن يتدبروا أمرهم قبل هذا الموعد الذي واجههم به كأنه واقع بهم : ( قل : أرأيتم إن أهلكني الله ومن معي أو رحمنا ، فمن يجير الكافرين من عذاب أليم ? ) . . وهو سؤال يردهم إلى تدبر حالهم ، والتفكير في شأنهم ، وهو الأولى ! فما ينفعهم أن تتحقق أمانيهم فيهلك الله النبي ومن معه - كما لا ينقذهم بطبيعة الحال أن يرحم الله نبيه ومن معه . والله باق لا يموت . وهو الذي ذرأهم في الأرض وإليه يحشرون . . ولكنه لا يقول لهم : فمن يجيركم من عذاب أليم ? ولا ينص على أنهم كافرون . إنما يلوح لهم بالعذاب الذي ينتظر الكافرين : ( فمن يجير الكافرين من عذاب أليم ) . . وهو أسلوب في الدعوة حكيم ، يخوفهم من ناحية ، ويدع لهم فرصة للتراجع عن موقفهم من ناحية . فلو جابههم بأنهم كافرون ، وأنه لا مفر لهم من العذاب الأليم . . فربما جهلوا وحمقوا وأخذتهم العزة بالإثم أمام الاتهام المباشر والتهديد . ففي بعض الحالات يكون أسلوب التلميح أفعل في النفس من أسلوب التصريح ! الآية السابقة الآية التالية المقارنة مع تفسير آخر × التفاسير تفاسير مختارة المنتخب في تفسير القرآن الكريم للمجلس الأعلى للشؤون الإسلامية (المنتخب) [حول التفسير] العنوان: المنتخب في تفسير القرآن الكريم. المؤلف: لجنة علماء الأزهر -","67:29":"- سيد قطب ثم يترقى من هذه التسوية بين الأمرين ، إلى تقرير موقف المؤمنين من ربهم وثقتهم به وتوكلهم عليه ، مع التلميح إلى اطمئنانهم لأيمانهم ، وثقتهم بهداهم ، وبأن الكافرين في ضلال مبين . ( قل : هو الرحمن آمنا به وعليه توكلنا . فستعلمون من هو في ضلال مبين ) . . وذكر صفة ( الرحمن ) هنا يشير إلى رحمته العميقة الكبيرة برسوله والمؤمنين معه ؛ فهو لن يهلكهم كما يتمنى الكافرون أو كما يدعون . ويوجه النبي [ صلى الله عليه وسلم ] إلى إبراز الصلة التي تربطهم بربهم الرحمن . صلة الإيمان ( آمنا به ) . . وصلة التوكل ( وعليه توكلنا ) . . عليه وحده . . والتعبير يشي بالقربى بينهم وبين الرحمن . والله - سبحانه - هو الذي يتفضل على رسوله وعلى المؤمنين فيأذن له بإعلان هذه القربى ، ويوجهه إلى هذا الإعلان . وكأنما ليقول له : لا تخف مما يقوله الكفار . فأنت ومن معك موصولون بي منتسبون إلي . وأنت مأذون مني في أن تظهر هذه الكرامة ، وهذا المقام ! فقل لهم . . . وهذا ود من الله وتكريم . . ثم ذلك التهديد الملفوف : ( فستعلمون من هو في ضلال مبين ) . . وهو أسلوب كذلك من شأنه أن يخلخل الإصرار على الجحود ؛ ويدعوهم إلى مراجعة موقفهم مخافة أن يكونوا هم الضالين ! فيتعرضوا للعذاب الذي سبق ذكره في الآية : ( فمن يجير الكافرين من عذاب أليم ? ) وفي الوقت ذاته لا يجبههم بأنهم ضالون فعلا ، حتى لا تأخذهم العزة بالإثم . وهو أسلوب في الدعوة يناسب بعض حالات النفوس . . الآية السابقة الآية التالية المقارنة مع تفسير آخر × التفاسير تفاسير مختارة المنتخب في تفسير القرآن الكريم للمجلس الأعلى للشؤون الإسلامية (المنتخب) [حول التفسير] العنوان: المنتخب في تفسير القرآن الكريم. المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة ","67:30":"- سيد قطب وأخيرا يجيء الإيقاع الأخير في السورة يلمح لهم بعذاب الدنيا قبل عذاب الآخرة ، وذلك بحرمانهم من سبب الحياة الأول وهو الماء : ( قل : أرأيتم إن أصبح ماؤكم غورا فمن يأتيكم بماء معين ? ) . . والماء الغور : الغائر الذاهب في الأرض لا يقدرون عليه . والمعين : النابع الفائض المتدفق . وهي لمسة قريبة في حياتهم ، إن كانوا ما يزالون يستبعدون ذلك اليوم ويشكون فيه . . والملك بيد الله وهو على كل شيء قدير . فكيف لو توجهت إرادته إلى حرمانهم مصدر الحياة القريب ! ثم يدعهم يتدبرون ما يكون لو أذن الله بوقوع هذا المحذور ! ختام السورة: وهكذا تنتهي هذه السورة ، وينتهي هذا الحشد من الإيقاعات واللمسات ، وهذه الرحلات والجولات . في آفاق وأغوار وأبعاد مترامية الأطراف . وكل آية على وجه التقريب كانت إيقاعا خاصا . أو كانت رحلة في عالم مجهول مغيب ، أو منظور لا تلتفت إليه الأنظار والقلوب . إنها سورة ضخمة . سورة أكبر من حجمها وحيزها وعدد آياتها . وكأنما هي سهام تشير إلى بعيد ، ويكاد كل سهم يستقل بكشف عالم جديد ! وهي تبني من قواعد التصور الإسلامي جوانب رئيسية هامة ؛ فهي تقر في الضمير حقيقة القدرة المطلقة ، وحقيقة الهيمنة المطلقة . وحقيقة الإبتلاء بالموت والحياة تمهيدا للحشر والجزاء . وحقيقة الكمال والجمال في صنعة الله . وحقيقة العلم المطلق بالسر والنجوى . وحقيقة مصدر الرزق . وحقيقة حفظ الله للخلائق ، وحضوره سبحانه - مع كل مخلوق . . . وجملة من هذه الحقائق التي يقوم عليها تصور المسلم لربه . وتصوره للوجود وارتباطه بخالق الوجود . هذا التصور الذي ينبثق منه منهج حياة المؤمن كله . مع ربه . ومع نفسه . ومع الناس . ومع الأحياء . ومع الكون كله من أحياء وأشياء . والذي يتكيف به شعوره وضميره وشخصيته وقيمه وموازينه ، و"};

Object.keys(ST).forEach(function(vk){
  // Always add ST tafsir (override existing)
  var n=ST[vk].v;
  var existing = D.tafsir[vk] ? D.tafsir[vk].tafsir : [];
  var scholars = [{scholar:"التفسير الميسر",text:ST[vk].t}];
  // Keep existing scholars (like ibn kathir) if present
  for(var i=0;i<existing.length;i++){
    if(existing[i].scholar !== "التفسير الميسر") scholars.push(existing[i]);
  }

  if(true){
    D.tafsir[vk]={
      tafsir:scholars,
      videos:[
        {scholar:"الشيخ النابلسي",url:"https://www.youtube.com/results?search_query=النابلسي+سورة+الملك+الآية+"+n},
        {scholar:"الشيخ الشعراوي",url:"https://www.youtube.com/results?search_query=الشعراوي+سورة+الملك+الآية+"+n},

var sVK=null,sW=null,cTab=0;
function toAr(n){return n.toString().replace(/[0-9]/g,function(d){return "٠١٢٣٤٥٦٧٨٩".charAt(parseInt(d));});}
function clrSel(){document.querySelectorAll(".qw,.vnum").forEach(function(e){e.classList.remove("sel-w","sel-v");});}
function normalizeAr(t){
  t=t.replace(/\u0640\u0670/g,"\u0627"); // ـٰ → ا
  t=t.replace(/\u0640/g,""); // tatweel
  t=t.replace(/[\u0671\u0622\u0623\u0625\u0627]/g,"\u0627"); // alef variants → ا
  t=t.replace(/\u0649/g,"\u064A"); // ى → ي
  t=t.replace(/[\u0610-\u061A\u064B-\u065F\u0670\u06D6-\u06ED]/g,""); // diacritics
  return t.trim();
}

function lookupWord(word){
  // Direct lookup first
  if(D.wordData[word]) return D.wordData[word];
  // Normalized lookup
  var nw=normalizeAr(word);
  for(var k in D.wordData){
    if(normalizeAr(k)===nw) return D.wordData[k];
  }
  return null;
}

function clkWord(el){

    closeBubble(); return;
  }
  clrSel(); el.classList.add("sel-w");
  sW=word; sVK=vk;
  document.getElementById("bubble-title").style.display="none";
  document.getElementById("bubble-tabs").style.display="none";
  // Show loading

function showBubble(el){
  var bubble=document.getElementById("bubble");
  var rect=el.getBoundingClientRect();
  // Width adapts to content
  bubble.style.width="auto";
  bubble.style.maxWidth=Math.min(window.innerWidth*0.85, 340)+"px";
  bubble.classList.add("show");
  // Position above the element
  var bh=bubble.offsetHeight;
  var top=rect.top+window.scrollY-bh-14;
  if(top<window.scrollY+8) top=rect.bottom+window.scrollY+14;
  var bw=bubble.offsetWidth;
  var left=(window.innerWidth-bw)/2;
  bubble.style.top=top+"px";
  bubble.style.left=left+"px";
  // Arrow position
  var arrowLeft=rect.left+rect.width/2-left;
  arrowLeft=Math.max(20,Math.min(bw-20,arrowLeft));
  document.querySelector(".bubble-arrow").style.left=arrowLeft+"px";
  document.querySelector(".bubble-arrow-inner").style.left=arrowLeft+"px";
}

            '<div style="padding:8px 14px;background:#0d0d0d;direction:rtl">' +

            '</div>' +
            '</div>';
          player.style.display = 'flex';
        }
      };
    });
  }
  // Apply stored font size
  setTimeout(applyTafsirFont, 30);
}

function enablePiP(){
  var iframe = document.getElementById('yt-frame');
  if(iframe){
    // Request PiP on the iframe video element
    try {
      iframe.contentWindow.postMessage('{"event":"command","func":"requestPictureInPicture","args":""}', '*');
    } catch(e) {}
    // Also try via document PiP API
    if(document.pictureInPictureEnabled){
      // Hide the overlay, video continues in PiP
      var player = document.getElementById('yt-player-container');
      if(player) player.style.display = 'none';
    }
  }
}

function closeYtPlayer(){

// Draggable bubble — direct touch on bubble
(function(){
  var sx,sy,sl,st,drag=false;
  var NON_DRAG = ["BUTTON","A","INPUT","SELECT","TEXTAREA"];

  function initDrag(){
    var b=document.getElementById("bubble");

    b.addEventListener("touchstart",function(e){
      var el=e.target;
      while(el && el!==b){
        if(NON_DRAG.indexOf(el.tagName)>-1) return;
        if(el.classList.contains("bubble-body")) return;
        el=el.parentNode;
      }
      var t=e.touches[0];
      drag=true;
      sx=t.clientX; sy=t.clientY;
      sl=b.offsetLeft; st=b.offsetTop;
      b.style.transition="none";
      b.style.animation="none";
    },{passive:true});

    window.addEventListener("touchmove",function(e){
      if(!drag)return;
      e.preventDefault();
      var t=e.touches[0];
      var nl=sl+(t.clientX-sx);
      var nt=st+(t.clientY-sy);
      nl=Math.max(4,Math.min(window.innerWidth-b.offsetWidth-4,nl));
      nt=Math.max(4,Math.min(window.innerHeight-b.offsetHeight-4,nt));
      b.style.left=nl+"px";
      b.style.top=nt+"px";
    },{passive:false});

    window.addEventListener("touchend",function(){drag=false;});

    // Mouse
    b.addEventListener("mousedown",function(e){
      var el=e.target;
      while(el && el!==b){
        if(NON_DRAG.indexOf(el.tagName)>-1) return;
        if(el.classList.contains("bubble-body")) return;
        el=el.parentNode;
      }
      drag=true;
      sx=e.clientX; sy=e.clientY;
      sl=b.offsetLeft; st=b.offsetTop;
      b.style.cursor="grabbing";
      e.preventDefault();
    });
    window.addEventListener("mousemove",function(e){
      if(!drag)return;
      var nl=sl+(e.clientX-sx);
      var nt=st+(e.clientY-sy);
      nl=Math.max(4,Math.min(window.innerWidth-b.offsetWidth-4,nl));
      nt=Math.max(4,Math.min(window.innerHeight-b.offsetHeight-4,nt));
      b.style.left=nl+"px";
      b.style.top=nt+"px";
    });
    window.addEventListener("mouseup",function(){
      if(drag){drag=false;document.getElementById("bubble").style.cursor="grab";}
    });
  }

  if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",initDrag);
  } else {
    setTimeout(initDrag,200);
  }
})();

var FD={"67:1":"مقدمة السورة: سورة الملك مكية وآياتها ثلاثون هذا الجزء كله من السور المكية .  كما كان الجزء الذي سبقه كله من السور المدنية .  ولكل منهما طابع مميز ،  وطعم خاص .  .  وبعض مطالع السور في هذا الجزء من بواكير ما نزل من القرآن كمطلع سورة \" المدثر \" ومطلع سورة \" المزمل \" .  كما أن فيه سورا يحتمل أن تكون قد نزلت بعد البعثة بحوالي ثلاث سنوات كسورة \" القلم \" .  وبحوالي عشر سنوات كسورة \" الجن \" التي يروى أنها نزلت في عودة رسول الله صلى الله عليه وسلم من الطائف ،  حيث أوذي من ثقيف .  ثم صرف الله إليه نفرا من الجن فاستمعوا إليه وهو يرتل القرآن ،  مما حكته سورة الجن في هذا الجزء .  وكانت هذه الرحلة بعد وفاة خديجة وأبي طالب قبيل الهجرة بعام أو عامين .  وإن كانت هناك رواية أخرى هي الأرجح بأن السورة نزلت في أوائل البعثة . والقرآن المكي يعالج - في الغالب - إنشاء العقيدة .  في الله وفي الوحي ،  وفي اليوم الآخر .  وإنشاء التصور المنبثق من هذه العقيدة لهذا الوجود وعلاقته بخالقه .  والتعريف بالخالق تعريفا يجعل الشعور به حيا في القلب ،  مؤثرا موجها موحيا بالمشاعر اللائقة بعبد يتجه إلى رب ،  وبالأدب الذي يلزمه العبد مع الرب ،  وبالقيم والموازين التي يزن بها المسلم الأشياء والأحداث والأشخاص .  وقد رأينا نماذج من هذا في السور المكية السابقة ،  وسنرى نماذج منه في هذا الجزء . والقرآن المدني يعالج - في الغالب - تطبيق تلك العقيدة وذاك التصور وهذه الموازين في الحياة الواقعية  ؛ وحمل النفوس على الإضطلاع بأمانة العقيدة والشريعة في معترك الحياة ،  والنهوض بتكاليفها في عالم الضمير وعالم الظاهر سواء .  وقد رأينا نماذج من هذا في السور المدنية السابقة ومنها سور الجزء الماضي . وهذه السورة الأولى - سورة تبارك - تعالج إنشاء تصور جديد للوجود وعلاقاته بخا","67:2":"( الذي خلق الموت والحياة ليبلوكم أيكم أحسن عملا ،  وهو العزيز الغفور ) .  . ومن آثار تمكنه المطلق من الملك وتصريفه له ،  وآثار قدرته على كل شيء وطلاقة إرادته .  .  أنه خلق الموت والحياة .  والموت يشمل الموت السابق على الحياة والموت اللاحق لها .  والحياة تشمل الحياة الأولى والحياة الآخرة .  وكلها من خلق الله كما تقرر هذه الآية ،  التي تنشئ هذه الحقيقة في التصور الإنساني  ؛  وتثير إلى جانبها اليقظة لما وراءها من قصد وابتلاء .  فليست المسألة مصادفة بلا تدبير .  وليست كذلك جزافا بلا غاية .  إنما هو الإبتلاء لأظهار المكنون في علم الله من سلوك الأناسي على الأرض ، واستحقاقهم للجزاء على العمل : ( ليبلوكم أيكم أحسن عملا ) .  .  واستقرار هذه الحقيقة في الضمير يدعه أبدا يقظا حذرا متلفتا واعيا للصغيرة والكبيرة في النية المستسرة والعمل الظاهر .  ولا يدعه يغفل أو يلهو .  كذلك لا يدعه يطمئن أو يستريح . ومن ثم يجيء التعقيب : ( وهو العزيز الغفور ) ليسكب الطمأنينة في القلب الذي يرعى الله ويخشاه .  فالله عزيز غالب ولكنه غفور مسامح .  فإذا استيقظ القلب ،  وشعر أنه هنا للإبتلاء والاختبار ،  وحذر وتوقى ،  فإن له أن يطمئن إلى غفران الله ورحمته وأن يقر عندها ويستريح  ! إن الله في الحقيقة التي يصورها الإسلام لتستقر في القلوب ،  لا يطارد البشر ،  ولا يعنتهم ،  ولا يحب أن يعذبهم .  إنما يريد لهم أن يتيقظوا لغاية وجودهم  ؛  وأن يرتفعوا إلى مستوى حقيقتهم  ؛  وأن يحققوا تكريم الله لهم بنفخة روحه في هذا الكيان وتفضيله على كثير من خلقه .  فإذا تم لهم هذا فهناك الرحمة السابغة والعون الكبير والسماحة الواسعة والعفو عن كثير .","67:3":"ثم يربط هذه الحقيقة بالكون كله في أكبر وأرفع مجاليه  ؛  كما يربط به من الناحية الأخرى حقيقة الجزاء في الآخرة ، بعد الابتلاء بالموت والحياة : الذي خلق سبع سماوات طباقا ،  ما ترى في خلق الرحمن من تفاوت ،  فارجع البصر هل ترى من فطور ? ثم ارجع البصر كرتين ينقلب إليك البصر خاسئا وهو حسير .  ولقد زينا السماء الدنيا بمصابيح ،  وجعلناها رجوما للشياطين ،  واعتدنا لهم عذاب السعير .  وللذين كفروا بربهم عذاب جهنم ،  وبئس المصير .  إذا ألقوا فيها سمعوا لها شهيقا وهي تفور .  تكاد تميز من الغيظ ، كلما ألقي فيها فوج سألهم خزنتها : ألم يأتكم نذير ? قالوا : بلى  !  قد جاءنا نذير فكذبنا وقلنا : ما نزل الله من شيء ،  إن أنتم إلا في ضلال كبير . وقالوا : لو كنا نسمع أو نعقل ما كنا في أصحاب السعير .  فاعترفوا بذنبهم فسحقا لأصحاب السعير  !  . وكل ما في هذه الآيات آثار لمدلول الآية الأولى ،  ومظاهر للهيمنة المتصرفة في الملك ،  وللقدرة التي لا يقيدها قيد .  ثم هي بعد ذلك تصديق للآية الثانية من خلق الموت والحياة للابتلاء ،  ثم الجزاء .  . والسماوات السبع الطباق التي تشير إليها الآية لا يمكن الجزم بمدلولها ،  استقاء من نظريات الفلك ،  فهذه النظريات قابلة للتعديل والتصحيح ،  كلما تقدمت وسائل الرصد والكشف .  ولا يجوز تعليق مدلول الآية بمثل هذه الكشوف القابلة للتعديل والتصحيح .  ويكفي أن نعرف أن هناك سبع سماوات .  وأنها طباق بمعنى أنها طبقات على أبعاد متفاوتة . والقرآن يوجه النظر إلى خلق الله ،  في السماوات بصفة خاصة وفي كل ما خلق بصفة عامة .  يوجه النظر إلى خلق الله ،  وهو يتحدى بكماله كمالا يرد البصر عاجزا كليلا مبهورا مدهوشا . ( ما ترى في خلق الرحمن من تفاوت ) .  .  فليس هناك خلل ولا نقص ولا اضطراب .  . ( فارجع البصر ) .  .  وانظر مرة أخرى للتأكد والتثبت (","67:4":"( ثم ارجع البصر كرتين ) فربما فاتك شيء في النظرة السابقة لم تتبينه ،  فأعد النظر ثم أعده ( ينقلب إليك البصر خاسئا وهو حسير ) .  . وأسلوب التحدي من شأنه أن يثير الاهتمام والجد في النظر إلى السماوات وإلى خلق الله كله .  وهذه النظرة الحادة الفاحصة المتأملة المتدبرة هي التي يريد القرآن أن يثيرها وأن يبعثها .  فبلادة الألفة تذهب بروعة النظرة إلى هذا الكون الرائع العجيب الجميل الدقيق ،  الذي لا تشبع العين من تملي جماله وروعته ،  ولا يشبع القلب من تلقي إيحاءاته وأيماءاته  ؛  ولا يشبع العقل من تدبر نظامه ودقته .  والذي يعيش منه من يتأمله بهذه العين في مهرجان إلهي باهر رائع ،  لا تخلق بدائعه ،  لأنها أبدا متجددة للعين والقلب والعقل . والذي يعرف شيئا عن طبيعة هذا الكون ونظامه - كما كشف العلم الحديث عن جوانب منها - يدركه الدهش والذهول .  ولكن روعة الكون لا تحتاج إلى هذا العلم .  فمن نعمة الله على البشر أن أودعهم القدرة على التجاوب مع هذا الكون بمجرد النظر والتأمل  ؛  فالقلب يتلقى إيقاعات هذا الكون الهائل الجميل تلقيا مباشرا حين يتفتح ويستشرف .  ثم يتجاوب مع هذه الإيقاعات تجاوب الحي مع الحي  ؛  قبل أن يعلم بفكره وبأرصاده شيئا عن هذا الخلق الهائل العجيب . ومن ثم يكل القرآن الناس إلى النظر في هذا الكون ،  وإلى تملي مشاهده وعجائبه .  ذلك أن القرآن يخاطب الناس جميعا ،  وفي كل عصر .  يخاطب ساكن الغابة وساكن الصحراء ،  كما يخاطب ساكن المدينة ورائد البحار .  وهو يخاطب الأمي الذي لم يقرأ ولم يخط حرفا ،  كما يخاطب العالم الفلكي والعالم الطبيعي والعالم النظري سواء .  وكل واحد من هؤلاء يجد في القرآن ما يصله بهذا الكون ،  وما يثير في قلبه التأمل والاستجابة والمتاع .","67:5":"والجمال في تصميم هذا الكون مقصود كالكمال .  بل إنهما اعتباران لحقيقة واحدة .  فالكمال يبلغ درجة الجمال . ومن ثم يوجه القرآن النظر إلى جمال السماوات بعد أن وجه النظر إلى كمالها : ( ولقد زينا السماء الدنيا بمصابيح ) .  . وما السماء الدنيا ? لعلها هي الأقرب إلى الأرض وسكانها المخاطبين بهذا القرآن .  ولعل المصابيح المشار إليها هنا هي النجوم والكواكب الظاهرة للعين ،  التي نراها حين ننظر إلى السماء .  فذلك يتسق مع توجيه المخاطبين إلى النظر في السماء .  وما كانوا يملكون إلا عيونهم ،  وما تراه من أجرام مضيئة تزين السماء . ومشهد النجوم في السماء جميل .  ما في هذا شك .  جميل جمالا يأخذ بالقلوب .  وهو جمال متجدد تتعدد ألوانه بتعدد أوقاته  ؛  ويختلف من صباح إلى مساء ،  ومن شروق إلى غروب ،  ومن الليلة القمراء إلى الليلة الظلماء .  ومن مشهد الصفاء إلى مشهد الضباب والسحاب .  .  بل إنه ليختلف من ساعة لساعة .  ومن مرصد لمرصد .  ومن زاوية لزاوية .  .  وكله جمال وكله يأخذ بالألباب . هذه النجمة الفريدة التي توصوص هناك ،  وكأنها عين جميلة ،  تلتمع بالمحبة والنداء  ! وهاتان النجمتان المنفردتان هناك ،  وقد خلصتا من الزحام تتناجيان  ! وهذه المجموعات المتضامة المتناثرة هنا وهناك ،  وكأنها في حلقة سمر في مهرجان السماء .  وهي تجتمع وتفترق كأنها رفاق ليلة في مهرجان  ! وهذا القمر الحالم الساهي ليلة .  والزاهي المزهو ليلة .  والمنكسر الخفيض ليلة .  والوليد المتفتح للحياة ليلة .  والفاني الذي يدلف للفناء ليلة .  .   ! وهذا الفضاء الوسيع الذي لا يمل البصر امتداده ،  ولا يبلغ البصر آماده . إنه الجمال .  الجمال الذي يملك الإنسان أن يعيشه ويتملاه ،  ولكن لا يجد له وصفا فيما يملك من الألفاظ والعبارات  ! والقرآن يوجه النفس إلى جمال السماء ،  وإلى جمال الكون كله ،  لأ","67:6":"فالرجوم في الدنيا وعذاب السعير في الآخرة لأولئك الشياطين .  ولعل مناسبة ذكر هذا ،  الذي أعده الله للشياطين في الدنيا والآخرة هي ذكر السماء أولا ،  ثم يجيء بعد من ذكر الذين كفروا .  والعلاقة بين الشياطين والذين كفروا علاقة ملحوظة .  فلما ذكر مصابيح السماء ذكر اتخاذها رجوما للشياطين . ولما ذكر ما أعد للشياطين من عذاب السعير ذكر بعده ما أعده للذين كفروا من أتباع هؤلاء الشياطين : ( وللذين كفروا بربهم عذاب جهنم وبئس المصير ) .  .  المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (البغوي) [حول التفسير] العنوان: معالم التنزيل للبغوي (ت 516هـ). المؤلف: الحسين بن مسعود بن محمد البغوي، المعروف بابن الفراء أو الفراء، ويلقب بمحيي السنة. حافظ محدث مفسر من فقهاء الشافعية، والبغوي نسبة إلى بَغَا من قرى خراسان. نبذة عن الكتاب: من أجلّ الكتب وأنبلها حاوٍ للصحيح من الأقوال , عارٍ عن الغموض والتكلف محلى بالأحاديث النبوية والآثار الغالب عليها الصحة . قال ابن تيمية رحمه الله: \"والبغوي تفسيرة مختصر من الثعلبي لكنه صان تفسيرة عن الأحاديث الموضوعة والآراء المبتدعة\" . وقد سئل رحمه الله عن أي التفاسير أقرب إلى الكتاب والسنة ؟ الزمخشري أم القرطبي أم البغوي ؟ أو غير هؤلاء ؟ فأجاب : وأما التفاسير الثلاثة المسؤول عنها فأسلمها","67:7":"ثم يرسم مشهدا لجهنم هذه ، وهي تستقبل الذين كفروا في غيظ وحنق شديد : ( إذا ألقوا فيها سمعوا لها شهيقا وهي تفور .  تكاد تميز من الغيظ  !  ) .  . وجهنم هنا مخلوقة حية ،  تكظم غيظها ،  فترتفع أنفاسها في شهيق وتفور  ؛  ويملأ جوانحها الغيظ فتكاد تتمزق من الغيظ الكظيم وهي تنطوي على بغض وكره يبلغ إلى حد الغيظ والحنق على الكافرين  ! والتعبير في ظاهره يبدو مجازا تصويريا لحالة جهنم .  ولكنه - فيما نحس - يقرر حقيقة .  فكل خليقة من خلائق الله حية ذات روح من نوعها .  وكل خليقة تعرف ربها وتسبح بحمده  ؛  وتدهش حين ترى الإنسان يكفر بخالقه ،  وتتغيظ لهذا الجحود المنكر الذي تنكره فطرتها وتنفر منه روحها .  وهذه الحقيقة وردت في القرآن في مواضع شتى تشعر بأنها تقرر حقيقة مكنونة في كل شيء في هذا الوجود . فقد جاء بصريح العبارة في القرآن : ( تسبح له السماوات السبع والأرض ومن فيهن ،  وإن من شيء إلا يسبح بحمده ،  ولكن لا تفقهون تسبيحهم ) .  . وورد كذلك : ( يا جبال أوبي معه والطير ) .  .  وهي تعبيرات صريحة مباشرة لا مجال فيها للتأويل . كذلك ورد ( ثم استوى إلى السماء وهي دخان فقال لها وللأرض : ائتيا طوعا أو كرها قالتا : أتينا طائعين ) .  .  مما يحتمل أن يقال فيه إنه مجاز تصويري لحقيقة خضوع السماء والأرض لناموس الله .  ولكن هذا التأويل لا ضرورة له .  بل هو أبعد من المعنى المباشر الصريح . ووردت صفة جهنم هذه . كما ورد في موضع آخر تعبير عن دهشة الكائنات وغيظها للشرك بربها : ( لقد جئتم شيئا إدا .  تكاد السماوات يتفطرن منه وتنشق الأرض ،  وتخر الجبال هدا ،  أن دعوا للرحمن ولدا ،  وما ينبغي للرحمن أن يتخذ ولدا ) .  . وكل هذه النصوص تشير إلى حقيقة ،  حقيقة إيمان الوجود كله بخالقه ،  وتسبيح كل شيء بحمده .  ودهشة الخلائق وارتياعها لشذوذ الإنسان حين يكفر ،  ويشذ عن هذا الموكب  ؛  وتحفز هذه الخلائق للانقضاض على الإنسان في غيظ وحنق  ؛  كالذي يط","67:8":"ثم يرسم مشهدا لجهنم هذه ، وهي تستقبل الذين كفروا في غيظ وحنق شديد : ( إذا ألقوا فيها سمعوا لها شهيقا وهي تفور .  تكاد تميز من الغيظ  !  ) .  . وجهنم هنا مخلوقة حية ،  تكظم غيظها ،  فترتفع أنفاسها في شهيق وتفور  ؛  ويملأ جوانحها الغيظ فتكاد تتمزق من الغيظ الكظيم وهي تنطوي على بغض وكره يبلغ إلى حد الغيظ والحنق على الكافرين  ! والتعبير في ظاهره يبدو مجازا تصويريا لحالة جهنم .  ولكنه - فيما نحس - يقرر حقيقة .  فكل خليقة من خلائق الله حية ذات روح من نوعها .  وكل خليقة تعرف ربها وتسبح بحمده  ؛  وتدهش حين ترى الإنسان يكفر بخالقه ،  وتتغيظ لهذا الجحود المنكر الذي تنكره فطرتها وتنفر منه روحها .  وهذه الحقيقة وردت في القرآن في مواضع شتى تشعر بأنها تقرر حقيقة مكنونة في كل شيء في هذا الوجود . فقد جاء بصريح العبارة في القرآن : ( تسبح له السماوات السبع والأرض ومن فيهن ،  وإن من شيء إلا يسبح بحمده ،  ولكن لا تفقهون تسبيحهم ) .  . وورد كذلك : ( يا جبال أوبي معه والطير ) .  .  وهي تعبيرات صريحة مباشرة لا مجال فيها للتأويل . كذلك ورد ( ثم استوى إلى السماء وهي دخان فقال لها وللأرض : ائتيا طوعا أو كرها قالتا : أتينا طائعين ) .  .  مما يحتمل أن يقال فيه إنه مجاز تصويري لحقيقة خضوع السماء والأرض لناموس الله .  ولكن هذا التأويل لا ضرورة له .  بل هو أبعد من المعنى المباشر الصريح . ووردت صفة جهنم هذه . كما ورد في موضع آخر تعبير عن دهشة الكائنات وغيظها للشرك بربها : ( لقد جئتم شيئا إدا .  تكاد السماوات يتفطرن منه وتنشق الأرض ،  وتخر الجبال هدا ،  أن دعوا للرحمن ولدا ،  وما ينبغي للرحمن أن يتخذ ولدا ) .  . وكل هذه النصوص تشير إلى حقيقة ،  حقيقة إيمان الوجود كله بخالقه ،  وتسبيح كل شيء بحمده .  ودهشة الخلائق وارتياعها لشذوذ الإنسان حين يكفر ،  ويشذ عن هذا الموكب  ؛  وتحفز هذه","67:9":"والجواب في ذلة وانكسار واعتراف بالحمق والغفلة ، بعد التبجح والإنكار واتهام الرسل بالضلال : ( قالوا : بلى  !  قد جاءنا نذير فكذبنا ، وقلنا : ما نزل الله من شيء .  إن أنتم إلا في ضلال كبير . وقالوا : لو كنا نسمع أو نعقل ما كنا في أصحاب السعير  !  ) .  . فالذي يسمع أو يعقل ،  لا يورد نفسه هذا المورد الوبيء .  ولا يجحد بمثل ما جحد به أولئك المناكيد .  ولا يسارع باتهام الرسل بالضلال على هذا النحو المتبجح الوقح ،  الذي لا يستند في الإنكار إلى دليل . ثم ينكر ويدعي ذلك الادعاء العريض على رسل الله الصادقين يقول : ( ما نزل الله من شيء : إن أنتم إلا في ضلال كبير ) !  المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (البغوي) [حول التفسير] العنوان: معالم التنزيل للبغوي (ت 516هـ). المؤلف: الحسين بن مسعود بن محمد البغوي، المعروف بابن الفراء أو الفراء، ويلقب بمحيي السنة. حافظ محدث مفسر من فقهاء الشافعية، والبغوي نسبة إلى بَغَا من قرى خراسان. نبذة عن الكتاب: من أجلّ الكتب وأنبلها حاوٍ للصحيح من الأقوال , عارٍ عن الغموض والتكلف محلى بالأحاديث النبوية والآثار الغالب عليها الصحة . قال ابن تيمية رحمه الله: \"والبغوي تفسيرة مختصر من الثعلبي لكنه صان تفسيرة عن ال","67:10":"المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (البغوي) [حول التفسير] العنوان: معالم التنزيل للبغوي (ت 516هـ). المؤلف: الحسين بن مسعود بن محمد البغوي، المعروف بابن الفراء أو الفراء، ويلقب بمحيي السنة. حافظ محدث مفسر من فقهاء الشافعية، والبغوي نسبة إلى بَغَا من قرى خراسان. نبذة عن الكتاب: من أجلّ الكتب وأنبلها حاوٍ للصحيح من الأقوال , عارٍ عن الغموض والتكلف محلى بالأحاديث النبوية والآثار الغالب عليها الصحة . قال ابن تيمية رحمه الله: \"والبغوي تفسيرة مختصر من الثعلبي لكنه صان تفسيرة عن الأحاديث الموضوعة والآراء المبتدعة\" . وقد سئل رحمه الله عن أي التفاسير أقرب إلى الكتاب والسنة ؟ الزمخشري أم القرطبي أم البغوي ؟ أو غير هؤلاء ؟ فأجاب : وأما التفاسير الثلاثة المسؤول عنها فأسلمها من البدعة والأحاديث الضعيفة - البغوي . تصفح التفسير تيسير الكريم المنان في تفسير القرآن لابن سعدي (ابن سعدي) [حول التفسير] العنوان: تيسير الكريم الرحمن في تفسير كلام المنان للسعدي  (ت  1376 هـ). المؤلف: السعدي، عبد الرحمن بن ناصر، عالم سعودي، كان ذا معرفة بالفقه أصوله وفروعه. نبذة عن الكتاب: من تفاسير السلفية التي عنيت بالعقيدة بما تشمله من توحيد الربوبية، وتوحيد الإلهية، وتوحيد الأسماء والصفات.  وقد صيغ بأسلوب سهل","67:11":"( فاعترفوا بذنبهم فسحقا لأصحاب السعير ) .  . والسحق البعد .  وهو دعاء عليهم من الله بعد اعترافهم بذنبهم في الموقف الذي لم يؤمنوا به ولم يصدقوا بوقوعه .  والدعاء من الله قضاء .  فهم مبعدون من رحمته .  لا رجاء لهم في مغفرة ،  ولا إقالة لهم من عذاب .  وهم أصحاب السعير الملازمون له .  ويا لها من صحبة  !  وياله من مصير  ! وهذا العذاب ،  عذاب السعير ،  في جهنم التي تشهق بأنفاسها وهي تفور ،  عذاب شديد مروع حقا .  والله لا يظلم أحدا .  ونحسب - والله أعلم - أن النفس التي تكفر بربها - وقد أودع فطرتها حقيقة الإيمان ودليله – هي نفس فرغت من كل خير .  كما فرغت من كل صفة تجعل لها اعتبارا في الوجود ،  فهي كالحجر الذي توقد به جهنم .  وقد انتهت إلى نكسة وارتكاس مكانها هذه النار ،  إلى غير نجاة منها ولا فرار  ! والنفس التي تكفر بالله في الأرض تظل تنتكس وترتكس في كل يوم تعيشه ،  حتى تنتهي إلى صورة بشعة مسيخة شنيعة ،  صورة منكرة جهنمية نكيرة .  صورة لا يماثلها شيء في هذا الكون في بشاعتها ومسخها وشناعتها .  فكل شيء روحه مؤمنة ،  وكل شيء يسبح بحمد ربه ،  وكل شيء فيه هذ ام المنان للسعدي  (ت  1","67:15":"ثم ينتقل بهم السياق من ذوات أنفسهم التي خلقها الله ،  إلى الأرض التي خلقها لهم ، وذللها وأودعها أسباب الحياة : ( هو الذي جعل لكم الأرض ذلولا ،  فامشوا في مناكبها وكلوا من رزقه ،  وإليه النشور ) .  . والناس لطول ألفتهم لحياتهم على هذه الأرض  ؛  وسهولة استقرارهم عليها ،  وسيرهم فيها ،  واستغلالهم لتربتها ومائها وهوائها وكنوزها وقواها وأرزاقها جميعا .  .  ينسون نعمة الله في تذليلها لهم وتسخيرها .  والقرآن يذكرهم هذه النعمة الهائلة ،  ويبصرهم بها ،  في هذا التعبير الذي يدرك منه كل أحد وكل جيل بقدر ما ينكشف له من علم هذه الأرض الذلول . والأرض الذلول كانت تعني في أذهان المخاطبين القدامى ،  هذه الأرض المذللة للسير فيها بالقدم وعلى الدابة ،  وبالفلك التي تمخر البحار .  والمذللة للزرع والجني والحصاد .  والمذللة للحياة فيها بما تحويه من هواء وماء وتربة تصلح للزرع والإنبات . وهي مدلولات مجملة يفصلها العلم - فيما اهتدى إليه حتى اليوم - تفصيلا يمد في مساحة النص القرآني في الإدراك . فمما يقوله العلم في مدلول الأرض الذلول : إن هذا الوصف : ( ذلولا ) .  .  الذي يطلق عادة على الدابة ،  مقصود في إطلاقه على الأرض  !  فالأرض هذه التي نراها ثابتة مستقرة ساكنة ،  هي دابة متحركة .  .  بل رامحة راكضة مهطعة  !  !  وهي في الوقت ذاته ذلول لا تلقي براكبها على ظهرها ،  ولا تتعثر خطاها ،  ولا تخضه وتهزه وترهقه كالدابة غير الذلول  !  ثم هي دابة حلوب مثلما هي ذلول  ! إن هذه الدابة التي نركبها تدور حول نفسها بسرعة ألف ميل في الساعة ،  ثم تدور مع هذا حول الشمس بسرعة حوالي خمسة وستين ألف ميل في الساعة .  ثم تركض هي والشمس والمجموعة الشمسية كلها","67:16":"والآن - وبينما هم في هذا الأمان على ظهر الأرض الذلول ،  وفي هذا اليسر الفائض بإذن الله وأمره .  .  الآن يهز هذه الأرض الساكنة من تحت أقدامهم هزا ويرجها رجا فإذا هي تمور .  ويثير الجو من حولهم فإذا هو حاصب يضرب الوجوه والصدور .  .  يهز هذه الأرض في حسهم ويثير هذا الحاصب في تصورهم ،  لينتبهوا من غفلة الأمان والقرار ،  ويمدوا بأبصارهم إلى السماء وإلى الغيب ، ويعلقوا قلوبهم بقدر الله : ( أأمنتم من في السماء أن يخسف بكم الأرض فإذا هي تمور ? أم أمنتم من في السماء أن يرسل عليكم حاصبا ? فستعلمون كيف نذير  !  ولقد كذب الذين من قبلهم .  فكيف كان نكير ? ) .  . والبشر الذين يعيشون على ظهر هذه الدابة الذلول ،  ويحلبونها فينالون من رزق الله فيها نصيبهم المعلوم  !  يعرفون كيف تتحول إلى دابة غير ذلول ولا حلوب ،  في بعض الأحيان ،  عندما يأذن الله بأن تضطرب قليلا فيرتج كل شيء فوق ظهرها أو يتحطم  !  ويمور كل ما عليها ويضطرب فلا تمسكه قوة ولا حيلة .  ذلك عند الزلازل والبراكين ،  التي تكشف عن الوحش الجامح ،  الكامن في الدابة الذلول ،  التي يمسك الله بزمامها فلا تثور إلا بقدر ،  ولا تجمح إلا ثواني معدودات يتحطم فيها كل ما شيد الإنسان على ظهرها  ؛  أو يغوص في جوفها عندما تفتح أحد أفواهها وتخسف كسفه منها .  .  وهي تمور .  .  البشر ولا يملكون من هذا الأمر شيئا ولا يستطيعون . وهم يبدون في هول الزلزال والبركان والخسف كالفئران الصغيرة محصورة في قفص الرعب ،  من حيث كانت آمنة لاهية غافلة عن القدرة الكبرى الممسكة بالزمام  ! والبشر كذلك يشهدون العواصف الجامحة الحاصبة التي تدمر وتخرب ،  وتحرق وتصعق .  وهم بإزائها ضعاف عاجزون ،  بكل ما يعلمون وما يعملون .  والعاصفة حين تزأر وتضرب ب","67:17":"والآن - وبينما هم في هذا الأمان على ظهر الأرض الذلول ،  وفي هذا اليسر الفائض بإذن الله وأمره .  .  الآن يهز هذه الأرض الساكنة من تحت أقدامهم هزا ويرجها رجا فإذا هي تمور .  ويثير الجو من حولهم فإذا هو حاصب يضرب الوجوه والصدور .  .  يهز هذه الأرض في حسهم ويثير هذا الحاصب في تصورهم ،  لينتبهوا من غفلة الأمان والقرار ،  ويمدوا بأبصارهم إلى السماء وإلى الغيب ، ويعلقوا قلوبهم بقدر الله : ( أأمنتم من في السماء أن يخسف بكم الأرض فإذا هي تمور ? أم أمنتم من في السماء أن يرسل عليكم حاصبا ? فستعلمون كيف نذير  !  ولقد كذب الذين من قبلهم .  فكيف كان نكير ? ) .  . والبشر الذين يعيشون على ظهر هذه الدابة الذلول ،  ويحلبونها فينالون من رزق الله فيها نصيبهم المعلوم  !  يعرفون كيف تتحول إلى دابة غير ذلول ولا حلوب ،  في بعض الأحيان ،  عندما يأذن الله بأن تضطرب قليلا فيرتج كل شيء فوق ظهرها أو يتحطم  !  ويمور كل ما عليها ويضطرب فلا تمسكه قوة ولا حيلة .  ذلك عند الزلازل والبراكين ،  التي تكشف عن الوحش الجامح ،  الكامن في الدابة الذلول ،  التي يمسك الله بزمامها فلا تثور إلا بقدر ،  ولا تجمح إلا ثواني معدودات يتحطم فيها كل ما شيد الإنسان على ظهرها  ؛  أو يغوص في جوفها عندما تفتح أحد أفواهها وتخسف كسفه منها .  .  وهي تمور .  .  البشر ولا يملكون من هذا الأمر شيئا ولا يستطيعون . وهم يبدون في هول الزلزال والبركان والخسف كالفئران الصغيرة محصورة في قفص الرعب ،  من حيث كانت آمنة لاهية غافلة عن القدرة الكبرى الممسكة بالزمام  ! والبشر كذلك يشهدون العواصف الجامحة الحاصبة التي تدمر وتخرب ،  وتحرق وتصعق .  وهم بإزائها ضعاف عاجزون ،  بكل ما يعلمون وما يعملون .  والعاصفة","67:18":"ويضرب لهم الأمثلة من واقع البشرية ، ومن وقائع الغابرين المكذبين : ( ولقد كذب الذين من قبلهم ،  فكيف كان نكير ? ) .  . والنكير الإنكار وما يتبعه من الآثار ،  ولقد أنكر الله ممن كذبوا قبلهم أن يكذبوا . وهو يسألهم : ( فكيف كان نكير ? ) وهم يعلمون كيف كان ،  فقد كانت آثار الدمار والخراب تصف لهم كيف كان هذا النكير  !  وكيف كان ما أعقبه من تدمير  ! والأمان الذي ينكره الله على الناس ،  هو الأمان الذي يوحي بالغفلة عن الله وقدرته وقدره ،  وليس هو الاطمئنان إلى الله ورعايته ورحمته .  فهذا غير ذاك .  فالمؤمن يطمئن إلى ربه ،  ويرجو رحمته وفضله .  ولكن هذا لا يقوده إلى الغفلة والنسيان والانغمار في غمرة الأرض ومتاعها ،  إنما يدعوه إلى التطلع الدائم ،  والحياء من الله ،  والحذر من غضبه ،  والتوقي من المخبوء في قدره ،  مع الإخبات والاطمئنان . قال الإمام أحمد - بإسناده - عن عائشة - رضي الله عنها - أنها قالت : \" ما رأيت رسول الله [ صلى الله عليه وسلم ] مستجمعا ضاحكا حتى أرى منه لهواته .  إنما كان يبتسم . وقالت : كان رسول الله [ صلى الله عليه وسلم ] إذا رأى غيما أو ريحا عرف ذلك في وجهه . قالت : يا رسول الله إن الناس إذا رأوا الغيم فرحوا رجاء أن يكون فيه المطر ،  وأراك إذا رأيته عرفت في وجهك الكراهية .  فقال رسول الله - صلى الله عليه وعلى آله وسلم - : \" يا عائشة ما يؤمنني أن يكون فيه عذاب ? قد عذب قوم بالريح .  وقد رأى قوم العذاب وقالوا ،  هذا عارض ممطرنا \" فهذا هو الإحساس اليقظ الدائم بالله وقدره ،  وبما قصه القرآن من هذا في سيره .  وهو لا ينافي الاطمئنان إلى رحمة الله وتوقع فضله . ثم هو إرجاع جميع الأسباب الظاهرة إلى السبب الأول .  ورد الأمر بحاله وكليته إلى من بيده الملك وهو على كل","67:19":"بعدئذ ينتقل بهم من لمسة التهديد والنذير ،  إلى لمسة التأمل والتفكير .  في مشهد يرونه كثيرا ،  ولا يتدبرونه إلا قليلا .  وهو مظهر من مظاهر القدرة ،  وأثر من آثار التدبير الإلهي اللطيف . ( أولم يروا إلى الطير فوقهم صافات ويقبضن ? ما يمسكهن إلا الرحمن ،  إنه بكل شيء بصير ) .  . وهذه الخارقة التي تقع في كل لحظة ،  تنسينا بوقوعها المتكرر ،  ما تشي به من القدرة والعظمة .  ولكن تأمل هذا الطير ،  وهو يصف جناحيه ويفردهما ،  ثم يقبضهما ويضمهما ، وهو في الحالين : حالة الصف الغالبة ،  وحالة القبض العارضة يظل في الهواء ،  يسبح فيه سباحة في يسر وسهولة  ؛  ويأتي بحركات يخيل إلى الناظر أحيانا أنها حركات استعراضية لجمال التحليق والانقضاض والارتفاع  ! تأمل هذا المشهد ،  ومتابعة كل نوع من الطير في حركاته الخاصة بنوعه ،  لا يمله النظر ،  ولا يمله القلب .  وهو متعة فوق ما هو مثار تفكير وتدبر في صنع الله البديع ،  الذي يتعانق فيه الكمال والجمال  ! والقرآن يشير بالنظر إلى هذا المشهد المثير : ( أولم يروا إلى الطير فوقهم صافات ويقبضن ? ) .  . ثم يوحي بما وراءه من التدبير والتقدير : ( ما يمسكهن إلا الرحمن ) .  . والرحمن يمسكهن بنواميس الوجود المتناسقة ذلك التناسق العجيب ،  الملحوظ فيه كل صغيرة وكبيرة ،  المحسوب فيه حساب الخلية والذرة .  .  النواميس التي تكفل توافر آلاف الموافقات في الأرض والجو وخلقة الطير ،  لتتم هذه الخارقة وتتكرر ،  وتظل تتكرر بانتظام . والرحمن يمسكهن بقدرته القادرة التي لا تكل ،  وعنايته الحاضرة التي لا تغيب .  وهي التي تحفظ هذه النواميس أبدا في عمل وفي تناسق وفي انتظام . فلا تفتر ولا تختل ولا","67:20":"ثم يلمس قلوبهم لمسة أخرى تعود بهم إلى مشهد البأس والفزع من الخسف والحاصب ،  بعد أن جال بهم هذه الجولة مع الطير السابح الآمن . فيردد قلوبهم بين شتى اللمسات عودا وبدءا كما يعلم الله من أثر هذا الترداد في قلوب العباد : ( أم من هذا الذي هو جند لكم ينصركم من دون الرحمن ? إن الكافرون إلا في غرور ) .  . وقد خوفهم الخسف وخوفهم الحاصب ،  وذكرهم مصائر الغابرين الذين أنكر الله عليهم فأصابهم التدمير . فهو يعود ليسألهم : من هو هذا الذي ينصرهم ويحميهم من الله ،  غير الله ? من هو هذا الذي يدفع عنهم بأس الرحمن إلا الرحمن ? ( إن الكافرون إلا في غرور ) .  .  غرور يهيئ لهم أنهم في أمن وفي حماية وفي اطمئنان ،  وهم يتعرضون لغضب الرحمن وبأس الرحمن ،  بلا شفاعة لهم من إيمان ولا عمل يستنزل رحمة الرحمن .  المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (البغوي) [حول التفسير] العنوان: معالم التنزيل للبغوي (ت 516هـ). المؤلف: الحسين بن مسعود بن محمد البغوي، المعروف بابن الفراء أو الفراء، ويلقب بمحيي السنة. حافظ محدث مفسر من فقهاء الشافعية، والبغوي","67:21":"ولمسة أخرى في الرزق الذي يستمتعون به ،  وينسون مصدره ،  ثم لا يخشون ذهابه ، ثم يلجون في التبجح والإعراض : ( أم من هذا الذي يرزقكم إن أمسك رزقه ? بل لجوا في عتو ونفور ) .  . ورزق البشر كله - كما سلف - معقود بإرادة الله في أول أسبابه ،  في تصميم هذا الكون وفي عناصر الأرض والجو وهي أسباب لا قدرة للبشر عليها إطلاقا ،  ولا تتعلق بعملهم بتاتا .  فهي أسبق منهم في الوجود ،  وهي أكبر منهم في الطاقة ،  وهي أقدر منهم على محو كل أثر للحياة حين يشاء الله . فمن يرزق البشر إن أمسك الماء ،  أو أمسك الهواء ،  أو أمسك العناصر الأولى التي منها ينشأ وجود الأشياء ? إن مدلول الرزق أوسع مدى وأقدم عهدا وأعمق جذورا مما يتبادر إلى الذهن عندما يسمع هذه الكلمة .  ومرد كل صغيرة وكبيرة فيه إلى قدرة الله وقدره ،  وإرساله للأسباب وإمساكها حين يشاء . وفي هذا المدلول الكبير الواسع العميق تنطوي سائر المدلولات القريبة لكلمة الرزق ،  مما يتوهم الإنسان أنها من كسبه وفي طوقه ،  كالعمل ،  والإبداع ،  والإنتاج .  .  وكلها مرتبطة بقيام الأسباب والعناصر الأولى من جهة ومتوقفة على هبة الله للأفراد والأمم من جهة أخرى .  فأي نفس يتنفسه العامل ،  وأي حركة يتحركها ،  إلا من رزق الله ،  الذي أنشأه ،  ومنحه المقدرة والطاقة ،  وخلق له النفس الذي يتنفسه ،  والمادة التي تحترق في جسده فتمنحه القدرة على الحركة ? وأي جهد عقلي يبذله مخترع إلا وهو من رزق الله الذي منحه القدرة على التفكير والإبداع ? وأي إنتاج ينتجه عامل أو مبدع إلا في مادة هي من صنع الله ابتداء ،  وإلا بأسباب كونية وإنسانية هي من رزق الله أصلا ? .  . ( أم من هذا الذي يرزقكم إن أمسك رزقه ? !  ) .  . ( بل لجوا في عتو ونفور ) . و","67:22":"ولقد كانوا - مع هذا - يتهمون النبي [ صلى الله عليه وسلم ] ومن معه بالضلال  ؛  ويزعمون لأنفسهم أنهم أهدى سبيلا  !  كما يصنع أمثالهم مع الدعاة إلى الله في كل زمان . ومن ثم يصور لهم واقع حالهم وحال المؤمنين في مشهد حي يجسم حقيقة الحال : ( أفمن يمشي مكبا على وجهه أهدى ? أم من يمشي سويا على صراط مستقيم ? ) .  .  والذي يمشي مكبا على وجهه إما أن يكون هو الذي يمشي على وجهه فعلا لا على رجليه في استقامة كما خلقه الله ،  وإما أن يكون هو الذي يعثر في طريقه فينكب على وجهه ،  ثم ينهض ليعثر من جديد  !  وهذه كتلك حال بائسة تعاني المشقة والعسر والتعثر ،  ولا تنتهي إلى هدى ولا خير ولا وصول  !  وأين هي من حال الذي يمشي مستقيما سويا في طريق لا عوج فيه ولا عثرات ،  وهدفه أمامه واضح مرسوم ? ! إن الحال الأولى هي حال الشقي المنكود الضال عن طريق الله ،  المحروم من هداه ،  الذي يصطدم بنواميسه ومخلوقاته ،  لأنه يعترضها في سيره ،  ويتخذ له مسارا غير مسارها ،  وطريقا غير طريقها ،  فهو أبدا في تعثر ،  وأبدا في عناء ،  وأبدا في ضلال . والحال الثانية هي حال السعيد المجدود المهتدي إلى الله ،  الممتع بهداه ،  الذي يسير وفق نواميسه في الطريق اللاحب المعمور ،  الذي يسلكه موكب الإيمان والحمد والتمجيد .  وهو موكب هذا الوجود كله بما فيه من أحياء وأشياء . إن حياة الإيمان هي اليسر والاستقامة والقصد .  وحياة الكفر هي العسر والتعثر والضلال .  . فأيهما أهدى ? وهل الأمر في حاجة إلى جواب ? إنما هو سؤال التقرير والإيجاب  ! ويتوارى السؤال والجواب ليتراءى للقلب هذا المشهد الحي الشاخص المتحرك .  .  مشهد جماعة يمشون على وجوههم ،  أو يتعثرون وينكبون على وجوههم لا هدف لهم ولا طر","67:23":"وعلى ذكر الهدى والضلال ،  يذكرهم بما وهبهم الله من وسائل الهدى ،  وأدوات الإدراك ثم لم ينتفعوا بها ، ولم يكونوا من الشاكرين : ( قل : هو الذي أنشأكم ،  وجعل لكم السمع والأبصار والأفئدة ،  قليلا ما تشكرون ) .  . وحقيقة أن الله هو الذي أنشأ الإنسان ،  حقيقة تلح على العقل البشري ،  وتثبت ذاتها بتوكيد يصعب رده .  فالإنسان قد وجد - وهو أرفع وأعلم وأقدر ما يعلم من الخلائق - وهو لم يوجد نفسه ،  فلا بد أن يكون هناك من هو أرفع وأعلم وأقدر منه أوجده .  .  ولا مفر من الاعتراف بخالق .  فوجود الإنسان ذاته يواجهه بهذه الحقيقة .  والمماراة فيها نوع من المماحكة لا يستحق الاحترام . والقرآن يذكر هذه الحقيقة هنا ليذكر بجانبها ما زود الله به الإنسان من وسائل المعرفة .  . ( وجعل لكم السمع والأبصار والأفئدة ) .  . وما قابل الإنسان به هذه النعمة : نعمة الإنشاء ونعمة السمع والأبصار والأفئدة : ( قليلا ما تشكرون ) .  . والسمع والأبصار معجزتان كبيرتان عرف عنهما بعض خواصهما العجيبة .  والأفئدة التي يعبر بها القرآن عن قوة الإدراك والمعرفة ،  معجزة أعجب وأغرب .  ولم يعرف بعد عنها إلا القليل .  وهي سر الله في هذا المخلوق الفريد .  . وللعلم الحديث محاولات في معرفة شيء عن معجزتي السمع والبصر نذكر منها لمحة : \" تبدأ حاسة السمع بالأذن الخارجية ،  ولا يعلم الا الله أين تنتهي . ويقول العلم : إن الاهتزاز الذي يحدثه الصوت في الهواء ينقل إلى الأذن ،  التي تنظم دخوله ،  ليقع على طبلة الأذن .  وهذه تنقلها إلى التيه داخل الأذن . \" والتيه يشتمل على نوع من الأقنية بين لولبية ونصف مستديرة .  وفي القسم اللولبي وحده أربعة آلاف قوس صغيرة متصلة بعصب السمع في الرأس .","67:24":"ثم يذكرهم أن الله لم ينشئ البشر ويمنحهم هذه الخصائص عبثا ولا جزافا لغير قصد ولا غاية .  إنما هي فرصة الحياة للابتلاء . ثم الجزاء في يوم الجزاء : ( قل : هو الذي ذرأكم في الأرض وإليه تحشرون ) .  . والذرء : الإكثار .  ويحمل كذلك معنى الانتشار . والحشر : الجمع بعد النشر في الأرجاء .  وهما حركتان متقابلتان من الناحية التصورية ،  تقابلهما من الناحية المعنوية .  ذلك مشهد للإكثار من الخلق ونشرهم أو نثرهم في الأرض .  وهذا مشهد لجمعهم منها وحشرهم بعد النشر والنثر  !  ويجمعهما السياق في آية واحدة ،  ليتقابل المشهدان في الحس والتصور على طريقة القرآن .  وليتذكر البشر وهم منتشرون في الأرض أن هناك غاية هم صائرون إليها ،  هي الجمع والحشر .  وأن هناك أمرا وراء هذا ،  ووراء الابتلاء بالموت والحياة .  المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (البغوي) [حول التفسير] العنوان: معالم التنزيل للبغوي (ت 516هـ). المؤلف: الحسين بن مسعود بن محمد البغوي، المعروف بابن الفراء أو الفراء، ويلقب بمحيي السنة. حافظ محدث مفسر من فقهاء الشافعية، والبغوي نسبة إلى بَغَا من قرى خراسان. نبذة عن الكتاب: من","67:25":"ثم يحكي شكهم في هذا الحشر ، وارتيابهم في هذا الوعد : ( ويقولون متى هذا الوعد إن كنتم صادقين ? ) .  . وهو سؤال الشاك المستريب .  كما أنه سؤال المماحك المتعنت .  فإن معرفة موعد هذا الوعد وميقاته لا تقدم ولا تؤخر  ؛  ولا علاقة لها بحقيقته ،  وهو أنه يوم الجزاء بعد الابتلاء .  ويستوي بالقياس إليهم أن يجيء غدا أو أن يجيء بعد ملايين السنين .  .  فالمهم أنه آت ،  وأنهم محشورون فيه ،  وأنهم مجازون بما عملوا في الحياة . ومن ثم لم يطلع الله أحدا من خلقه على موعده ،  لأنه لا مصلحة لهم في معرفته ،  ولا علاقة لهذا بطبيعة هذا اليوم وحقيقته ،  ولا أثر له في التكاليف التي يطالب الناس بها استعدادا لملاقاته ،  بل المصلحة والحكمة في إخفاء ميقاته عن الخلق كافة ،  واختصاص الله بعلم ذلك الموعد ، دون الخلق جميعا :  المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (البغوي) [حول التفسير] العنوان: معالم التنزيل للبغوي (ت 516هـ). المؤلف: الحسين بن مسعود بن محمد البغوي، المعروف بابن الفراء أو الفراء، ويلقب بمحيي السنة. حافظ محدث مفسر من فقهاء الشافعية، والبغوي نسبة إلى بَغَا من قرى خراسان. نبذة عن الكتاب","67:26":"( قل إنما العلم عند الله ،  وإنما أنا نذير مبين ) . وهنا يبرز بجلاء فارق ما بين الخالق والمخاليق .  وتتجرد ذات الله ووحدانيته بلا شبيه ولا شريك .  ويتمحض العلم له سبحانه .  ويقف الخلق - بما فيهم الرسل والملائكة - في مقامهم متأدبين عند مقام الألوهية العظيم : ( قل : إنما العلم عند الله .  وإنما أنا نذير مبين ) .  .  وظيفتي الإنذار ،  ومهمتي البيان .  أما العلم فعند صاحب العلم الواحد بلا شريك .  المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (البغوي) [حول التفسير] العنوان: معالم التنزيل للبغوي (ت 516هـ). المؤلف: الحسين بن مسعود بن محمد البغوي، المعروف بابن الفراء أو الفراء، ويلقب بمحيي السنة. حافظ محدث مفسر من فقهاء الشافعية، والبغوي نسبة إلى بَغَا من قرى خراسان. نبذة عن الكتاب: من أجلّ الكتب وأنبلها حاوٍ للصحيح من الأقوال , عارٍ عن الغموض والتكلف محلى بالأحاديث النبوية والآثار الغالب عليها الصحة . قال ابن تيمية رحمه الله: \"والبغوي تفسيرة مختصر من الثعلبي لكنه صان تفسيرة عن الأحاديث الموضوعة والآراء المبتدعة\" . وقد سئل رحمه الله عن أي التفاسير أقرب إلى الكتاب والس","67:27":"وبينما هم يسألون في شك ويجابون في جزم ،  يخيل السياق القرآني كأن هذا اليوم الذي يسألون عنه قد جاء ،  والموعد الذي يشكون فيه قد حان  ؛  وكأنما هم واجهوه الآن . فكان فيه ما كان : ( فلما رأوه زلفة سيئت وجوه الذين كفروا ، وقيل : هذا الذي كنتم به تدعون ) ! فقد رأوه قريبا مواجها لهم حاضرا أمامهم دون توقع ودون تمهيد .  فسيئت وجوههم ،  وبدا فيها الاستياء . ووجه إليهم التأنيب : ( وقيل : هذا الذي كنتم به تدعون ) .  .  هذا هو حاضرا قريبا .  وهو الذي كنتم تدعون أنه لن يكون  ! وهذه الطريقة في عرض ما سيكون تتكرر في القرآن ،  لمواجهة حالة التكذيب أو الشك بمفاجأة شعورية تصويرية تقف المكذب أو الشاك وجها لوجه مع مشهد حاضر لما يكذب به أو يشك فيه . ثم هي في الوقت ذاته تصور حقيقة .  فهذا اليوم كائن في علم الله  ؛  أما خط الزمن بينه وبين البشر فهو قائم بالقياس إلى البشر .  وهي مسألة نسبية لا تمثل الحقيقة المجردة كما هي في حساب الله .  ولو أذن الله لرأوه اللحظة كما هو في علم الله .  فهذا الانتقال المفاجئ لهم من الدنيا إلى الآخرة ،  ومن موقف الشك والارتياب إلى موقف المواجهة والمفاجأة ،  يشير إلى حقيقة قائمة لو أذن الله بها لانكشفت لهم .  في الوقت الذي يصور لهم هذه الحقيقة تصويرا يهز مشاعرهم .  المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه المجلس الأعلى للشؤون الإسلامية بجمهورية مصر العربية، طبعات كثيرة منها الطبعة العشرون، بتاريخ 1423هـ- 2002م. تصفح التفسير معالم التنزيل في تفسير القرآن الكريم للبغوي (الب","67:28":"ولقد كانوا يتربصون بالنبي [ صلى الله عليه وسلم ] والحفنة المؤمنة التي معه أن يهلكوا فيستريحوا منهم  ؛  وكانوا يتواصون بينهم بالصبر عليه حتى يوافيه الأجل ،  فتسكن هذه الزوبعة التي أثارتها الدعوة في صفوفهم .  كما كانوا يتبجحون أحيانا فيزعمون أن الله سيهلك محمدا ومن معه لأنهم ضالون ،  ولأنهم يكذبون على الله فيما يقولون  !  فهنا أمام مشهد الحشر والجزاء ،  ينبههم إلى أن أمنيتهم حتى لو تحققت لا تعصمهم هم من عاقبة الكفر والضلال . فأولى لهم أن يتدبروا أمرهم قبل هذا الموعد الذي واجههم به كأنه واقع بهم : ( قل : أرأيتم إن أهلكني الله ومن معي أو رحمنا ،  فمن يجير الكافرين من عذاب أليم ? ) .  . وهو سؤال يردهم إلى تدبر حالهم ،  والتفكير في شأنهم ،  وهو الأولى  !  فما ينفعهم أن تتحقق أمانيهم فيهلك الله النبي ومن معه - كما لا ينقذهم بطبيعة الحال أن يرحم الله نبيه ومن معه .  والله باق لا يموت .  وهو الذي ذرأهم في الأرض وإليه يحشرون .  . ولكنه لا يقول لهم : فمن يجيركم من عذاب أليم ? ولا ينص على أنهم كافرون . إنما يلوح لهم بالعذاب الذي ينتظر الكافرين : ( فمن يجير الكافرين من عذاب أليم ) .  .  وهو أسلوب في الدعوة حكيم ،  يخوفهم من ناحية ،  ويدع لهم فرصة للتراجع عن موقفهم من ناحية .  فلو جابههم بأنهم كافرون ،  وأنه لا مفر لهم من العذاب الأليم .  .  فربما جهلوا وحمقوا وأخذتهم العزة بالإثم أمام الاتهام المباشر والتهديد . ففي بعض الحالات يكون أسلوب التلميح أفعل في النفس من أسلوب التصريح  !  المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلح","67:29":"ثم يترقى من هذه التسوية بين الأمرين ،  إلى تقرير موقف المؤمنين من ربهم وثقتهم به وتوكلهم عليه ،  مع التلميح إلى اطمئنانهم لأيمانهم ،  وثقتهم بهداهم ،  وبأن الكافرين في ضلال مبين . ( قل : هو الرحمن آمنا به وعليه توكلنا .  فستعلمون من هو في ضلال مبين ) .  . وذكر صفة ( الرحمن ) هنا يشير إلى رحمته العميقة الكبيرة برسوله والمؤمنين معه  ؛  فهو لن يهلكهم كما يتمنى الكافرون أو كما يدعون . ويوجه النبي [ صلى الله عليه وسلم ] إلى إبراز الصلة التي تربطهم بربهم الرحمن .  صلة الإيمان ( آمنا به ) .  .  وصلة التوكل ( وعليه توكلنا ) .  .  عليه وحده .  .  والتعبير يشي بالقربى بينهم وبين الرحمن .  والله - سبحانه - هو الذي يتفضل على رسوله وعلى المؤمنين فيأذن له بإعلان هذه القربى ،  ويوجهه إلى هذا الإعلان . وكأنما ليقول له : لا تخف مما يقوله الكفار .  فأنت ومن معك موصولون بي منتسبون إلي .  وأنت مأذون مني في أن تظهر هذه الكرامة ،  وهذا المقام  !  فقل لهم .  .  .  وهذا ود من الله وتكريم .  . ثم ذلك التهديد الملفوف : ( فستعلمون من هو في ضلال مبين ) .  .  وهو أسلوب كذلك من شأنه أن يخلخل الإصرار على الجحود  ؛ ويدعوهم إلى مراجعة موقفهم مخافة أن يكونوا هم الضالين  !  فيتعرضوا للعذاب الذي سبق ذكره في الآية : ( فمن يجير الكافرين من عذاب أليم ? ) وفي الوقت ذاته لا يجبههم بأنهم ضالون فعلا ،  حتى لا تأخذهم العزة بالإثم .  وهو أسلوب في الدعوة يناسب بعض حالات النفوس .  .  المؤلف: لجنة علماء الأزهر - المجلس الأعلى للشؤون الإسلامية. نبذة عن الكتاب: تفسير بأسلوب عصري مبسط واضح، وجيز بعيد عن الخلافات المذهبية، والمصطلحات الفنية والحشو والتعقيدات اللفظية. طبعه","67:30":"وأخيرا يجيء الإيقاع الأخير في السورة يلمح لهم بعذاب الدنيا قبل عذاب الآخرة ، وذلك بحرمانهم من سبب الحياة الأول وهو الماء : ( قل : أرأيتم إن أصبح ماؤكم غورا فمن يأتيكم بماء معين ? ) .  . والماء الغور : الغائر الذاهب في الأرض لا يقدرون عليه . والمعين : النابع الفائض المتدفق .  وهي لمسة قريبة في حياتهم ،  إن كانوا ما يزالون يستبعدون ذلك اليوم ويشكون فيه .  .  والملك بيد الله وهو على كل شيء قدير .  فكيف لو توجهت إرادته إلى حرمانهم مصدر الحياة القريب  ! ثم يدعهم يتدبرون ما يكون لو أذن الله بوقوع هذا المحذور  ! ختام السورة: وهكذا تنتهي هذه السورة ،  وينتهي هذا الحشد من الإيقاعات واللمسات ،  وهذه الرحلات والجولات .  في آفاق وأغوار وأبعاد مترامية الأطراف .  وكل آية على وجه التقريب كانت إيقاعا خاصا .  أو كانت رحلة في عالم مجهول مغيب ،  أو منظور لا تلتفت إليه الأنظار والقلوب . إنها سورة ضخمة .  سورة أكبر من حجمها وحيزها وعدد آياتها .  وكأنما هي سهام تشير إلى بعيد ،  ويكاد كل سهم يستقل بكشف عالم جديد  ! وهي تبني من قواعد التصور الإسلامي جوانب رئيسية هامة  ؛  فهي تقر في الضمير حقيقة القدرة المطلقة ،  وحقيقة الهيمنة المطلقة .  وحقيقة الإبتلاء بالموت والحياة تمهيدا للحشر والجزاء .  وحقيقة الكمال والجمال في صنعة الله .  وحقيقة العلم المطلق بالسر والنجوى .  وحقيقة مصدر الرزق .  وحقيقة حفظ الله للخلائق ،  وحضوره سبحانه - مع كل مخلوق .  .  .  وجملة من هذه الحقائق التي يقوم عليها تصور المسلم لربه .  وتصوره للوجود وارتباطه بخالق الوجود .  هذا التصور الذي ينبثق منه منهج حياة المؤمن كله .  مع ربه .  ومع نفسه .  ومع الناس .  ومع الأحياء .  ومع الكون كله من أحياء وأشياء .  والذي يتكيف به شعوره وضميره وشخصيته وقيمه وموازينه ،  واستقباله للحياة .  .  ."};
function boldQuran(text){
  // Bold text between ﴿ and ﴾
  text = text.replace(/﴿([^﴾]+)﴾/g, "<strong style='font-weight:bold;color:#0d0d0d'>﴿$1﴾</strong>");
  // Bold text between { and }
  text = text.replace(/\{([^}]+)\}/g, "<strong style='font-weight:bold;color:#0d0d0d'>{$1}</strong>");
  return text;
}

// Auto-fit lines to full width
function fitLines(){
  var mushaf=document.getElementById("mushaf");
  var availW=mushaf.clientWidth - 32; // padding 16px each side
  var lines=document.querySelectorAll(".line:not(.line-header):not(.line-basmala)");
  lines.forEach(function(line){
    var size=28;
    line.style.fontSize=size+"px";
    var iter=0;
    while(line.scrollWidth < availW-2 && iter<30){
      size+=0.5;
      line.style.fontSize=size+"px";
      iter++;
    }
    while(line.scrollWidth > availW && iter<60){
      size-=0.2;
      line.style.fontSize=size+"px";
      iter++;
    }
  });
}
window.addEventListener("load", fitLines);
window.addEventListener("resize", fitLines);

    bw.style.background = "#b8952a"; bw.style.color = "white"; bw.style.fontWeight = "bold";
    bv.style.background = "white"; bv.style.color = "#b8952a"; bv.style.fontWeight = "normal";
    // HIDE verse marks first
    var vws = document.querySelectorAll(".qw.has-tafsir");
    for(var i=0;i<vws.length;i++){ vws[i].style.borderBottom = "none"; }
    // SHOW word marks (after, so they override)
    var wds = document.querySelectorAll(".qw.has-def");
    for(var i=0;i<wds.length;i++){ wds[i].style.borderBottom = "3px solid #b8952a"; }
  } else {
    bv.style.background = "#b8952a"; bv.style.color = "white"; bv.style.fontWeight = "bold";
    bw.style.background = "white"; bw.style.color = "#b8952a"; bw.style.fontWeight = "normal";
    // HIDE word marks
    var wds = document.querySelectorAll(".qw.has-def");
    for(var i=0;i<wds.length;i++){ wds[i].style.borderBottom = "none"; }
    // SHOW verse marks — underline all words of verses with tafsir
    var vws = document.querySelectorAll(".qw.has-tafsir");
    for(var i=0;i<vws.length;i++){ vws[i].style.borderBottom = "3px solid #b8952a"; }
  }
  clrSel();
  closeBubble();
}

// Single click — behavior depends on active mode
document.querySelectorAll(".qw").forEach(function(el){
  el.onclick = function(){
    if(cMode === 'word'){
      clkWord(this);
    } else {
      clkVerse(this);
    }
  };
});

// Verse number always opens verse
document.querySelectorAll(".vnum").forEach(function(el){
  el.onclick = function(){clkVerse(this);};
});
</script>
